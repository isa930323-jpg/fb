<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIFF 測試</title>
  <script src="https://static.line-sdn.net/liff/edge/2.1/sdk.js"></script>
</head>
<body>
  <h1>LIFF 連線測試</h1>
  <div id="status">載入中...</div>
  <div id="userInfo"></div>

  <script>
    (async function() {
      const statusDiv = document.getElementById('status');
      const userDiv = document.getElementById('userInfo');
      
      try {
        statusDiv.innerText = '1. 初始化 LIFF...';
        await liff.init({ liffId: '2009073006-LOgV46pS' });
        statusDiv.innerText = '2. LIFF 初始化完成';
        
        statusDiv.innerText = '3. 檢查是否在 LINE 環境...';
        if (!liff.isInClient()) {
          statusDiv.innerText = '⚠️ 不在 LINE App 中，請用 LINE 打開此網頁';
          userDiv.innerText = '請將此連結貼到 LINE 聊天室中打開';
          return;
        }
        
        statusDiv.innerText = '4. 檢查登入狀態...';
        if (!liff.isLoggedIn()) {
          statusDiv.innerText = '5. 未登入，跳轉登入中...';
          liff.login();
          return;
        }
        
        statusDiv.innerText = '5. 已登入，取得個人資料...';
        const profile = await liff.getProfile();
        
        statusDiv.innerText = '✅ 成功！';
        userDiv.innerHTML = `
          <p><strong>你的 LINE 名稱：</strong> ${profile.displayName}</p>
          <p><strong>使用者 ID：</strong> ${profile.userId}</p>
          <p><strong>大頭貼：</strong> <img src="${profile.pictureUrl}" width="80" style="border-radius: 50%;"></p>
        `;
        
      } catch (err) {
        statusDiv.innerText = '❌ 錯誤：' + err.message;
        console.error(err);
      }
    })();
  </script>
</body>
</html>
