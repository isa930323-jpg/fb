<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIFF 最簡測試</title>
</head>
<body>
  <h1>LIFF 最簡測試</h1>
  <div id="log"></div>

  <script>
    const logDiv = document.getElementById('log');
    
    function log(msg) {
      console.log(msg);
      logDiv.innerHTML += '<div>' + msg + '</div>';
    }
    
    log('1. 開始載入 SDK...');
    
    // 動態載入 SDK
    const script = document.createElement('script');
    script.src = 'https://static.line-sdn.net/liff/edge/2.0/sdk.js';
    script.onload = function() {
      log('2. SDK 載入成功！');
      log('3. liff 物件存在：' + (typeof liff !== 'undefined'));
      
      if (typeof liff !== 'undefined') {
        log('4. 開始初始化...');
        liff.init({ liffId: '2009073006-LOgV46pS' })
          .then(() => {
            log('5. 初始化成功！');
            log('6. isLoggedIn: ' + liff.isLoggedIn());
            if (!liff.isLoggedIn()) {
              log('7. 未登入，準備跳轉...');
              liff.login();
            } else {
              return liff.getProfile();
            }
          })
          .then(profile => {
            if (profile) {
              log('8. 取得資料成功！名稱：' + profile.displayName);
            }
          })
          .catch(err => {
            log('❌ 初始化失敗：' + err.message);
          });
      }
    };
    script.onerror = function() {
      log('❌ SDK 載入失敗（網路問題）');
    };
    document.head.appendChild(script);
  </script>
</body>
</html>
