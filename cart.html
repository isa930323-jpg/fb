<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIFF 測試</title>
  <!-- 改用 2.0 版本，相容性較高 -->
  <script src="https://static.line-sdn.net/liff/edge/2.0/sdk.js"></script>
</head>
<body>
  <h1>LIFF 連線測試 (v2.0)</h1>
  <div id="status">載入中...</div>
  <div id="userInfo"></div>

  <script>
    (function() {
      const statusDiv = document.getElementById('status');
      const userDiv = document.getElementById('userInfo');
      
      // 檢查 liff 物件是否載入
      if (typeof liff === 'undefined') {
        statusDiv.innerText = '❌ LIFF SDK 載入失敗';
        userDiv.innerText = 'LINE 版本可能太舊，請更新 LINE App';
        return;
      }
      
      statusDiv.innerText = 'LIFF SDK 已載入，初始化中...';
      
      liff.init({ liffId: '2009073006-LOgV46pS' })
        .then(() => {
          statusDiv.innerText = '初始化完成，檢查登入狀態...';
          
          if (!liff.isLoggedIn()) {
            statusDiv.innerText = '未登入，跳轉登入頁面...';
            liff.login();
            return;
          }
          
          return liff.getProfile();
        })
        .then(profile => {
          if (!profile) return;
          
          statusDiv.innerText = '✅ 成功取得資料！';
          userDiv.innerHTML = `
            <p><strong>LINE 名稱：</strong> ${profile.displayName}</p>
            <p><strong>使用者 ID：</strong> ${profile.userId}</p>
          `;
          
          // 嘗試填入購物車頁面的姓名欄位（如果存在的話）
          const nameInput = document.getElementById('custName');
          if (nameInput) nameInput.value = profile.displayName;
        })
        .catch(err => {
          statusDiv.innerText = '❌ 錯誤：' + err.message;
          console.error(err);
        });
    })();
  </script>
</body>
</html>
