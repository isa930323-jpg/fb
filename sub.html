<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂閱 / 取消訂閱｜蕨積文章摘要</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* ===== 共用樣式 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1a14;
      --moss: #3d5a38;
      --fern: #5a7a4a;
      --sage: #8aab7a;
      --mist: #d4e4c8;
      --cream: #f5f0e8;
      --stone: #9a9080;
      --paper: #faf7f2;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ----- 導覽列 (完整保留) ----- */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4vw; height: 72px;
      background: rgba(250,247,242,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(90,122,74,0.12);
    }
    nav.scrolled { box-shadow: 0 2px 24px rgba(61,90,56,0.10); }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .logo-mark { width: 38px; height: 38px; flex-shrink: 0; }
    .logo-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .logo-text {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--moss);
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }
    .logo-text span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--stone);
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
      white-space: nowrap;
    }
    .nav-links li {
      position: relative;
      padding: 0 2px;
    }
    .nav-links a {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--ink);
      text-decoration: none;
      padding-bottom: 3px;
      opacity: 0.75;
      display: inline-block;
    }
    .nav-links a:hover {
      opacity: 1;
      color: var(--fern);
    }
    .nav-contact {
      padding: 8px 20px !important;
      border: 1px solid var(--fern) !important;
      border-radius: 2px;
      color: var(--fern) !important;
      opacity: 1 !important;
      margin-left: 0.5rem;
    }
    .nav-contact:hover {
      background: var(--fern);
      color: white !important;
    }
    .has-dropdown > a::after { display: none; }

    .nav-links li .dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 18px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(250,247,242,0.98);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(90,122,74,0.14);
      border-top: 2px solid var(--fern);
      box-shadow: 0 12px 40px rgba(61,90,56,0.12);
      min-width: 148px;
      list-style: none;
      padding: 8px 0;
      z-index: 300;
    }
    .nav-links li:hover .dropdown,
    .nav-links li:focus-within .dropdown {
      display: block;
    }
    .nav-links li .dropdown::before {
      content: '';
      position: absolute;
      top: -7px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 6px solid var(--fern);
    }
    .dropdown li a {
      display: block;
      padding: 10px 20px;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--ink);
      opacity: 0.7;
      white-space: nowrap;
      text-decoration: none;
    }
    .dropdown li a:hover {
      opacity: 1;
      color: var(--fern);
      padding-left: 26px;
      background: rgba(90,122,74,0.04);
    }
    .dropdown li + li { border-top: 1px solid rgba(90,122,74,0.08); }

    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      width: 40px; height: 40px;
      cursor: pointer;
      background: none; border: none;
      flex-shrink: 0;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 1.5px;
      background: var(--moss);
      transition: transform 0.2s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    .mobile-menu {
      position: fixed; top: 72px; left: 0; right: 0; bottom: 0;
      background: #faf7f2;
      border-bottom: 1px solid rgba(90,122,74,0.15);
      padding: 0 6vw 40px;
      z-index: 99;
      overflow-y: auto;
      transform: translateX(100%);
      visibility: hidden;
      transition: transform 0.3s ease;
    }
    .mobile-menu.open { transform: translateX(0); visibility: visible; }
    .mobile-menu ul { list-style: none; }
    .mobile-menu > ul > li > a,
    .mobile-parent {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0;
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: var(--moss);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.1);
      cursor: pointer;
    }
    .mobile-parent:hover, .mobile-menu > ul > li > a:hover { color: var(--fern); }
    .mobile-caret { display: inline-block; transition: transform 0.2s; }
    .mobile-caret.open { transform: rotate(180deg); }
    .mobile-sub {
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .mobile-sub.open { max-height: 200px; }
    .mobile-sub li a {
      display: block;
      padding: 11px 0 11px 16px;
      font-size: 0.85rem;
      color: var(--stone);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.06);
      letter-spacing: 0.06em;
    }
    .mobile-sub li a:hover { color: var(--fern); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }

    /* ----- 頁面內容區域 ----- */
    .content {
      flex: 1;
      padding-top: 92px; /* 72px nav + 20px 間距 */
      padding-bottom: 40px;
    }

    /* ----- Footer (完整保留) ----- */
    footer {
      border-top: 1px solid rgba(90,122,74,0.15);
      padding: 40px 4vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      margin-top: auto;
    }
    .footer-logo {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--moss);
      letter-spacing: 0.05em;
    }
    .footer-copy {
      font-size: 0.75rem;
      color: var(--stone);
      letter-spacing: 0.1em;
    }
    .footer-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }
    .footer-links a {
      font-size: 0.75rem;
      color: var(--stone);
      text-decoration: none;
      letter-spacing: 0.08em;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .footer-links a:hover {
      opacity: 1;
      color: var(--fern);
    }
    @media (max-width: 768px) {
      footer {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
      .footer-links {
        justify-content: center;
        flex-wrap: wrap;
      }
    }    /* ===== 訂閱頁面專用樣式 ===== */
    .subscribe-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 2rem;
    }
    .subscribe-container h1 {
        font-family: 'Noto Serif TC', serif;
        color: var(--moss);
        margin-bottom: 0.5rem;
        font-size: 1.8rem;
    }
    .subtitle {
        color: var(--stone);
        margin-bottom: 2rem;
        font-size: 0.9rem;
    }
    .tab-buttons {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        border-bottom: 1px solid #e0dbd0;
    }
    .tab-btn {
        background: none;
        border: none;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        cursor: pointer;
        color: var(--stone);
        transition: all 0.2s;
        font-family: 'Noto Sans TC', sans-serif;
    }
    .tab-btn.active {
        color: var(--fern);
        border-bottom: 2px solid var(--fern);
        font-weight: 500;
    }
    .tab-pane {
        display: none;
    }
    .tab-pane.active {
        display: block;
    }
    .form-group {
        margin-bottom: 1.5rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--moss);
    }
    .form-group input, .form-group select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #e0dbd0;
        border-radius: 8px;
        font-size: 1rem;
        font-family: 'Noto Sans TC', sans-serif;
        background: white;
    }
    .form-group input:focus {
        outline: none;
        border-color: var(--fern);
    }
    .subscribe-container button {
        background: var(--fern);
        color: white;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 40px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 500;
        transition: background 0.2s;
    }
    .subscribe-container button:hover {
        background: var(--moss);
    }
    .message {
        margin-top: 1.5rem;
        padding: 1rem;
        border-radius: 8px;
        display: none;
    }
    .message.success {
        display: block;
        background: #d4e4c8;
        color: #2c5e2e;
    }
    .message.error {
        display: block;
        background: #f8d7da;
        color: #721c24;
    }
    @media (max-width: 768px) {
        .subscribe-container {
            padding: 1rem;
        }
        .tab-btn {
            padding: 0.5rem 1rem;
        }
    }
    
  </style>
</head>
<body>
  <!-- 放置導覽列的佔位元素 -->
  <div id="nav-placeholder"></div>

  <!-- 頁面主要內容區域 -->
  <main class="content">
    <div class="subscribe-container">
      <h1>🌿 蕨積</h1>
      <div class="subtitle">每日文章摘要訂閱服務</div>
      
      <div class="tab-buttons">
        <button class="tab-btn active" data-tab="subscribe">📧 訂閱</button>
        <button class="tab-btn" data-tab="unsubscribe">🔕 取消訂閱</button>
      </div>
      
      <!-- 訂閱表單 -->
      <div id="subscribe-pane" class="tab-pane active">
        <form id="subscribeForm">
          <div class="form-group">
            <label>姓名 *</label>
            <input type="text" id="sub-name" required placeholder="請輸入您的姓名">
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="sub-email" required placeholder="your@email.com">
          </div>
          
          <button type="submit">訂閱</button>
        </form>
      </div>
      
      <!-- 取消訂閱表單 -->
      <div id="unsubscribe-pane" class="tab-pane">
        <form id="unsubscribeForm">
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="unsub-email" required placeholder="your@email.com">
          </div>
          <button type="submit">取消訂閱</button>
        </form>
      </div>
      
      <div id="message" class="message"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <ul class="footer-links">
      <li><a href="shop.html">植物選品</a></li>
      <li><a href="consult.html">綠色顧問</a></li>
      <li><a href="fbnote.html">蕨望筆記</a></li>
      <li><a href="about.html">關於蕨積</a></li>
    </ul>
    <p class="footer-copy">© 2026 蕨積 FernBrom . All rights reserved.</p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // 載入共用導覽列
      fetch('nav.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('nav-placeholder').innerHTML = data;
          // 在導覽列插入後，重新綁定事件與初始化
          initNav();
        })
        .catch(err => {
          console.error('無法載入導覽列:', err);
          // 錯誤時的備用顯示
          document.getElementById('nav-placeholder').innerHTML = 
            '<nav style="background:var(--moss);color:white;padding:0 4vw;height:72px;display:flex;align-items:center;">' +
            '<span style="font-family:Noto Serif TC,serif;font-weight:900;">⚠️ 導覽列載入失敗，請確認 nav.html 是否存在</span>' +
            '</nav>';
        });

      function initNav() {
        // hamburger 事件
        var btn = document.getElementById('hamburger');
        var menu = document.getElementById('mobileMenu');
        if (btn && menu) {
          btn.addEventListener('click', function () {
            btn.classList.toggle('open');
            menu.classList.toggle('open');
          });
          menu.querySelectorAll('.mobile-link').forEach(function (a) {
            a.addEventListener('click', function () {
              btn.classList.remove('open');
              menu.classList.remove('open');
            });
          });
        }
        // 行動選單的展開折疊
        if (menu) {
          menu.querySelectorAll('.mobile-parent').forEach(function (parent) {
            parent.addEventListener('click', function () {
              var id = parent.getAttribute('data-target');
              var sub = document.getElementById(id);
              var caretId = 'caret-' + id.replace('sub-', '');
              var caret = document.getElementById(caretId);
              var opening = !sub.classList.contains('open');
              menu.querySelectorAll('.mobile-sub').forEach(function (s) { s.classList.remove('open'); });
              menu.querySelectorAll('.mobile-caret').forEach(function (c) { c.classList.remove('open'); });
              if (opening) {
                sub.classList.add('open');
                if (caret) caret.classList.add('open');
              }
            });
          });
        }
        // 滾動效果
        window.addEventListener('scroll', function () {
          var nav = document.getElementById('mainNav');
          if (nav) nav.classList.toggle('scrolled', window.scrollY > 20);
        });
        // 重新綁定 lucide 圖示
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }
    });
  </script>  <script>
    // 訂閱頁面 JavaScript
    (function() {
      const tabBtns = document.querySelectorAll('.tab-btn');
      const panes = {
        subscribe: document.getElementById('subscribe-pane'),
        unsubscribe: document.getElementById('unsubscribe-pane')
      };
      
      if (tabBtns.length > 0) {
        tabBtns.forEach(btn => {
          btn.addEventListener('click', () => {
            const tab = btn.getAttribute('data-tab');
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            Object.values(panes).forEach(pane => pane.classList.remove('active'));
            if (panes[tab]) panes[tab].classList.add('active');
            const messageDiv = document.getElementById('message');
            if (messageDiv) messageDiv.style.display = 'none';
          });
        });
      }
      
      const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwH5X_4_arrGY5_BAbeO1-IdNYgFL4dnDWNnPzcVtsr7sJiGk5kNhDNQf9ssTGUcPx22A/exec';
      
      // 訂閱
      const subscribeForm = document.getElementById('subscribeForm');
      if (subscribeForm) {
        subscribeForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const name = document.getElementById('sub-name').value;
          const email = document.getElementById('sub-email').value;
          const preference = document.getElementById('sub-preference').value;
          const messageDiv = document.getElementById('message');
          
          messageDiv.className = 'message success';
          messageDiv.style.display = 'block';
          messageDiv.innerHTML = '📡 送出中，請稍候...';
          
          try {
            await fetch(APPS_SCRIPT_URL, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                action: 'subscribe',
                name: name,
                email: email,
                preference: preference
              })
            });
            
            messageDiv.className = 'message success';
            messageDiv.innerHTML = '✅ 訂閱申請已送出！<br>若 Email 未重複，將會收到摘要信件。';
            document.getElementById('subscribeForm').reset();
            
            setTimeout(() => {
              messageDiv.style.display = 'none';
            }, 5000);
          } catch (error) {
            messageDiv.className = 'message error';
            messageDiv.innerHTML = '❌ 送出失敗，請稍後再試。';
          }
        });
      }
      
      // 取消訂閱
      const unsubscribeForm = document.getElementById('unsubscribeForm');
      if (unsubscribeForm) {
        unsubscribeForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('unsub-email').value;
          const messageDiv = document.getElementById('message');
          
          try {
            const response = await fetch(`${APPS_SCRIPT_URL}?action=unsubscribe&email=${encodeURIComponent(email)}`);
            const text = await response.text();
            
            messageDiv.className = 'message success';
            messageDiv.style.display = 'block';
            messageDiv.innerHTML = text.includes('成功') ? '✅ 已取消訂閱，您將不再收到摘要信件。' : '❌ ' + text;
            document.getElementById('unsubscribeForm').reset();
          } catch (error) {
            messageDiv.className = 'message error';
            messageDiv.style.display = 'block';
            messageDiv.innerHTML = '❌ 操作失敗，請稍後再試。';
          }
        });
      }
    })();
  </script>
  
</body>
</html>
