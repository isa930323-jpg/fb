<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生活隨筆 — 蕨積｜碳盤查・ESG・永續生活</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1a14;
      --moss: #3d5a38;
      --fern: #5a7a4a;
      --sage: #8aab7a;
      --mist: #d4e4c8;
      --cream: #f5f0e8;
      --stone: #9a9080;
      --paper: #faf7f2;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 主內容區 - 避開固定導覽列，導覽列樣式完全由 nav.html 提供 */
    .content {
      flex: 1;
      padding-top: 92px;
      padding-bottom: 60px;
    }

    .blog-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* 標題區 */
    .blog-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .blog-header h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 2.5rem;
      color: var(--moss);
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }
    .blog-header p {
      color: var(--stone);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    /* 標籤檢索區 */
    .tag-search-section {
      background: white;
      border-radius: 40px;
      padding: 20px 28px;
      margin-bottom: 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.03);
      border: 1px solid rgba(90,122,74,0.1);
    }
    .tag-search-title {
      font-size: 0.85rem;
      color: var(--stone);
      letter-spacing: 0.1em;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .tag {
      display: inline-block;
      padding: 6px 18px;
      background: var(--cream);
      color: var(--fern);
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(90,122,74,0.2);
    }
    .tag:hover {
      background: var(--mist);
      transform: translateY(-2px);
    }
    .tag.active {
      background: var(--fern);
      color: white;
      border-color: var(--fern);
    }
    .search-input-group {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .search-input {
      flex: 1;
      padding: 12px 20px;
      border: 1px solid rgba(90,122,74,0.2);
      border-radius: 40px;
      font-size: 0.9rem;
      background: var(--paper);
      transition: all 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--fern);
      background: white;
    }
    .search-btn, .clear-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 40px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .search-btn {
      background: var(--moss);
      color: white;
    }
    .search-btn:hover {
      background: var(--fern);
    }
    .clear-btn {
      background: transparent;
      border: 1px solid var(--stone);
      color: var(--stone);
    }
    .clear-btn:hover {
      background: var(--cream);
    }
    .result-count {
      margin-top: 16px;
      font-size: 0.8rem;
      color: var(--stone);
      text-align: right;
    }

    /* 文章卡片 */
    .post-card {
      background: white;
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      border: 1px solid rgba(90,122,74,0.08);
      transition: all 0.2s;
    }
    .post-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(61,90,56,0.08);
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .post-author {
      font-size: 0.8rem;
      color: var(--sage);
      letter-spacing: 0.05em;
    }
    .post-date {
      font-size: 0.75rem;
      color: var(--stone);
    }
    .post-content {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 20px;
    }
    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(90,122,74,0.1);
    }
    .post-tag {
      display: inline-block;
      padding: 4px 14px;
      background: var(--cream);
      color: var(--fern);
      border-radius: 30px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .post-tag:hover {
      background: var(--mist);
    }

    /* 載入更多 */
    .load-more-section {
      text-align: center;
      margin-top: 40px;
    }
    .load-more-btn {
      padding: 12px 32px;
      background: transparent;
      border: 1px solid var(--fern);
      color: var(--fern);
      border-radius: 40px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .load-more-btn:hover {
      background: var(--fern);
      color: white;
    }
    .load-more-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 空狀態 */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--stone);
    }
    .empty-state i {
      display: block;
      font-size: 48px;
      margin-bottom: 16px;
    }

    /* 載入動畫 */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--fern);
    }
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--mist);
      border-top: 2px solid var(--fern);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Footer - 保持與品牌一致 */
    footer {
      border-top: 1px solid rgba(90,122,74,0.15);
      padding: 40px 4vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      margin-top: auto;
    }
    .footer-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }
    .footer-links a {
      font-size: 0.75rem;
      color: var(--stone);
      text-decoration: none;
      letter-spacing: 0.08em;
      opacity: 0.7;
    }
    .footer-links a:hover {
      opacity: 1;
      color: var(--fern);
    }
    .footer-copy {
      font-size: 0.75rem;
      color: var(--stone);
    }
    @media (max-width: 768px) {
      footer {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
      .footer-links {
        justify-content: center;
        flex-wrap: wrap;
      }
      .post-card {
        padding: 24px;
      }
      .content {
        padding-top: 82px;
      }
    }
    
    /* 導覽列容器 - 確保高度正確 */
    #nav-placeholder {
      min-height: 72px;
    }
    
    /* 確保導覽列載入後樣式正確，避免任何覆蓋 */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <!-- 導覽列佔位符，由 nav.html 動態載入 -->
  <div id="nav-placeholder"></div>

  <main class="content">
    <div class="blog-container">
      <div class="blog-header">
        <h1>🌿 生活隨筆</h1>
        <p>碳盤查 · ESG · 永續 · 植物與日常</p>
      </div>

      <!-- 標籤檢索區 -->
      <div class="tag-search-section">
        <div class="tag-search-title">
          <i data-lucide="tag" size="16"></i> 探索標籤
        </div>
        <div class="tag-cloud" id="tagCloud"></div>
        <div class="search-input-group">
          <input type="text" id="tagInput" class="search-input" placeholder="輸入 #標籤 或關鍵字..." autocomplete="off">
          <button class="search-btn" id="searchBtn">🔍 檢索</button>
          <button class="clear-btn" id="clearBtn">✕ 清除</button>
        </div>
        <div class="result-count" id="resultCount"></div>
      </div>

      <!-- 文章列表區 -->
      <div id="postsContainer"></div>
      
      <!-- 載入更多按鈕 -->
      <div class="load-more-section" id="loadMoreSection">
        <button class="load-more-btn" id="loadMoreBtn">載入更多文章</button>
      </div>
    </div>
  </main>

  <footer>
    <ul class="footer-links">
      <li><a href="about.html">關於蕨積</a></li>
      <li><a href="lifestyle.html">碳生活專欄</a></li>
      <li><a href="greenlab.html">ESG 觀點</a></li>
    </ul>
    <p class="footer-copy">© 2026 蕨積 FernBrom · 生活隨筆</p>
  </footer>

  <script>
    // ==================== 全域變數 ====================
    let allMessages = [];
    let filteredMessages = [];
    let currentPage = 1;
    const POSTS_PER_PAGE = 3;
    let currentSearchTag = '';
    
    // 預設標籤列表
    const defaultTags = ['#碳盤查', '#ESG', '#永續', '#生活', '#鹿角蕨', '#植物', '#環保', '#碳中和'];
    
    // ==================== 輔助函數 ====================
    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
    
    // 從文章中提取所有標籤
    function extractTagsFromText(text) {
      const tagRegex = /#[\u4e00-\u9fa5a-zA-Z0-9]+/g;
      const matches = text.match(tagRegex);
      return matches ? [...new Set(matches)] : [];
    }
    
    // 取得所有文章中的標籤
    function getAllTagsFromMessages(messages) {
      const tagsSet = new Set();
      messages.forEach(msg => {
        const tags = extractTagsFromText(msg.text);
        tags.forEach(tag => tagsSet.add(tag));
      });
      defaultTags.forEach(tag => tagsSet.add(tag));
      return Array.from(tagsSet).sort();
    }
    
    // 渲染標籤雲
    function renderTagCloud(tags, activeTag = '') {
      const container = document.getElementById('tagCloud');
      if (!container) return;
      if (tags.length === 0) {
        container.innerHTML = '<span style="color: var(--stone); font-size:0.8rem;">尚無標籤</span>';
        return;
      }
      container.innerHTML = tags.map(tag => `
        <span class="tag ${activeTag === tag ? 'active' : ''}" data-tag="${escapeHtml(tag).replace(/"/g, '&quot;')}">${escapeHtml(tag)}</span>
      `).join('');
      
      // 綁定標籤點擊事件
      document.querySelectorAll('.tag').forEach(el => {
        el.removeEventListener('click', tagClickHandler);
        el.addEventListener('click', tagClickHandler);
      });
    }
    
    function tagClickHandler(e) {
      const tagText = e.currentTarget.getAttribute('data-tag') || e.currentTarget.innerText;
      if (tagText) {
        searchByTagText(tagText);
      }
    }
    
    // 根據標籤篩選
    function filterMessagesByTag(tag) {
      if (!tag) return [...allMessages];
      return allMessages.filter(msg => {
        const tags = extractTagsFromText(msg.text);
        return tags.includes(tag);
      });
    }
    
    // 執行搜尋
    function performSearch(tag) {
      if (!tag) {
        filteredMessages = [...allMessages];
        currentSearchTag = '';
      } else {
        filteredMessages = filterMessagesByTag(tag);
        currentSearchTag = tag;
      }
      currentPage = 1;
      renderPosts();
      updateTagCloudActive(tag);
      
      const countSpan = document.getElementById('resultCount');
      if (countSpan) {
        if (tag && filteredMessages.length > 0) {
          countSpan.innerHTML = `📌 找到 ${filteredMessages.length} 篇關於 ${escapeHtml(tag)} 的文章`;
        } else if (tag && filteredMessages.length === 0) {
          countSpan.innerHTML = `🔍 沒有找到關於 ${escapeHtml(tag)} 的文章`;
        } else {
          countSpan.innerHTML = `📖 共 ${allMessages.length} 篇文章`;
        }
      }
    }
    
    function searchByTag() {
      const input = document.getElementById('tagInput');
      let tag = input.value.trim();
      if (tag && !tag.startsWith('#')) {
        tag = '#' + tag;
      }
      performSearch(tag);
    }
    
    function searchByTagText(tag) {
      const input = document.getElementById('tagInput');
      if (input) input.value = tag;
      performSearch(tag);
    }
    
    function clearSearch() {
      const input = document.getElementById('tagInput');
      if (input) input.value = '';
      performSearch('');
    }
    
    function updateTagCloudActive(activeTag) {
      const tags = getAllTagsFromMessages(allMessages);
      renderTagCloud(tags, activeTag);
    }
    
    function getCurrentPagePosts() {
      const end = currentPage * POSTS_PER_PAGE;
      return filteredMessages.slice(0, end);
    }
    
    function hasMore() {
      return currentPage * POSTS_PER_PAGE < filteredMessages.length;
    }
    
    function loadMore() {
      const totalPages = Math.ceil(filteredMessages.length / POSTS_PER_PAGE);
      if (currentPage < totalPages) {
        currentPage++;
        renderPosts();
      }
    }
    
    function formatContentWithTags(text) {
      return text.replace(/(#[#\u4e00-\u9fa5a-zA-Z0-9]+)/g, '<span style="color: var(--fern); font-weight: 500;">$1</span>');
    }
    
    function renderPosts() {
      const container = document.getElementById('postsContainer');
      const loadMoreBtn = document.getElementById('loadMoreBtn');
      const postsToShow = getCurrentPagePosts();
      
      if (!container) return;
      
      if (filteredMessages.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i>📭</i>
            <p>${currentSearchTag ? '沒有找到相關標籤的文章' : '目前還沒有任何文章'}</p>
            <p style="font-size:0.8rem; margin-top:8px;">${currentSearchTag ? '試試其他標籤吧！' : '快用 LINE 傳送訊息，加入 #標籤 吧！'}</p>
          </div>
        `;
        if (loadMoreBtn) loadMoreBtn.style.display = 'none';
        return;
      }
      
      container.innerHTML = postsToShow.map(post => {
        const tags = extractTagsFromText(post.text);
        const displayName = post.displayName || '蕨友';
        const time = new Date(post.timestamp);
        const dateStr = `${time.getFullYear()}.${String(time.getMonth()+1).padStart(2,'0')}.${String(time.getDate()).padStart(2,'0')}`;
        
        return `
          <article class="post-card">
            <div class="post-header">
              <span class="post-author">✍️ ${escapeHtml(displayName)}</span>
              <span class="post-date">📅 ${dateStr}</span>
            </div>
            <div class="post-content">${formatContentWithTags(escapeHtml(post.text))}</div>
            ${tags.length > 0 ? `
              <div class="post-tags">
                ${tags.map(tag => `<span class="post-tag" data-tag="${escapeHtml(tag).replace(/"/g, '&quot;')}">${escapeHtml(tag)}</span>`).join('')}
              </div>
            ` : ''}
          </article>
        `;
      }).join('');
      
      // 綁定文章內標籤點擊事件
      document.querySelectorAll('.post-tag').forEach(el => {
        el.removeEventListener('click', postTagClickHandler);
        el.addEventListener('click', postTagClickHandler);
      });
      
      if (loadMoreBtn) {
        if (hasMore()) {
          loadMoreBtn.style.display = 'inline-block';
          loadMoreBtn.disabled = false;
        } else {
          loadMoreBtn.style.display = 'none';
        }
      }
    }
    
    function postTagClickHandler(e) {
      const tagText = e.currentTarget.getAttribute('data-tag') || e.currentTarget.innerText;
      if (tagText) {
        searchByTagText(tagText);
      }
    }
    
    // 載入所有文章
    async function loadMessages() {
      const container = document.getElementById('postsContainer');
      if (container) container.innerHTML = '<div class="loading">載入文章...</div>';
      
      try {
        const API_URL = 'https://linephotobot.onrender.com/api/messages';
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const messages = await response.json();
        allMessages = messages.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        filteredMessages = [...allMessages];
        
        const allTags = getAllTagsFromMessages(allMessages);
        renderTagCloud(allTags);
        
        currentPage = 1;
        renderPosts();
        
        const countSpan = document.getElementById('resultCount');
        if (countSpan) {
          countSpan.innerHTML = `📖 共 ${allMessages.length} 篇文章`;
        }
        
      } catch (error) {
        console.error('載入文章失敗:', error);
        if (container) {
          container.innerHTML = `
            <div class="empty-state">
              <i>⚠️</i>
              <p>載入失敗，請稍後再試</p>
              <p style="font-size:0.8rem; margin-top:8px;">${escapeHtml(error.message)}</p>
            </div>
          `;
        }
      }
    }
    
    // 初始化頁面 - 只載入導覽列和文章，不重複定義任何導覽列功能
    function initPage() {
      const navPlaceholder = document.getElementById('nav-placeholder');
      if (navPlaceholder) {
        fetch('nav.html')
          .then(response => {
            if (!response.ok) throw new Error('nav.html 載入失敗');
            return response.text();
          })
          .then(html => {
            navPlaceholder.innerHTML = html;
            // 導覽列內建的下拉選單功能會自動運作，不需額外處理
            // 重新初始化 lucide 圖示（如果有）
            if (typeof lucide !== 'undefined' && lucide.createIcons) {
              setTimeout(() => lucide.createIcons(), 100);
            }
          })
          .catch(err => console.warn('導覽列載入錯誤:', err));
      }
      
      // 綁定頁面按鈕事件
      const searchBtn = document.getElementById('searchBtn');
      const clearBtn = document.getElementById('clearBtn');
      const loadMoreBtn = document.getElementById('loadMoreBtn');
      const tagInput = document.getElementById('tagInput');
      
      if (searchBtn) {
        searchBtn.removeEventListener('click', searchByTag);
        searchBtn.addEventListener('click', searchByTag);
      }
      if (clearBtn) {
        clearBtn.removeEventListener('click', clearSearch);
        clearBtn.addEventListener('click', clearSearch);
      }
      if (loadMoreBtn) {
        loadMoreBtn.removeEventListener('click', loadMore);
        loadMoreBtn.addEventListener('click', loadMore);
      }
      if (tagInput) {
        tagInput.removeEventListener('keypress', handleKeyPress);
        tagInput.addEventListener('keypress', handleKeyPress);
      }
      
      // 載入文章
      loadMessages();
      
      // 定時重新整理
      if (window.refreshInterval) clearInterval(window.refreshInterval);
      window.refreshInterval = setInterval(loadMessages, 60000);
    }
    
    function handleKeyPress(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        searchByTag();
      }
    }
    
    // 啟動初始化
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPage);
    } else {
      initPage();
    }
    
    // 頁面卸載時清理定時器
    window.addEventListener('beforeunload', function() {
      if (window.refreshInterval) clearInterval(window.refreshInterval);
    });
  </script>
</body>
</html>
