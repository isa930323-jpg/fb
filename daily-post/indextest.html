<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蕨積管理後台 — 植物 x 工程 x 碳生活</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* ===== 共用樣式 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1a14;
      --moss: #3d5a38;
      --fern: #5a7a4a;
      --sage: #8aab7a;
      --mist: #d4e4c8;
      --cream: #f5f0e8;
      --stone: #9a9080;
      --paper: #faf7f2;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ----- 導覽列 (完整保留) ----- */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4vw; height: 72px;
      background: rgba(250,247,242,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(90,122,74,0.12);
    }
    nav.scrolled { box-shadow: 0 2px 24px rgba(61,90,56,0.10); }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .logo-mark { width: 38px; height: 38px; flex-shrink: 0; }
    .logo-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .logo-text {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--moss);
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }
    .logo-text span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--stone);
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
      white-space: nowrap;
    }
    .nav-links li {
      position: relative;
      padding: 0 2px;
    }
    .nav-links a {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--ink);
      text-decoration: none;
      padding-bottom: 3px;
      opacity: 0.75;
      display: inline-block;
    }
    .nav-links a:hover {
      opacity: 1;
      color: var(--fern);
    }
    .nav-contact {
      padding: 8px 20px !important;
      border: 1px solid var(--fern) !important;
      border-radius: 2px;
      color: var(--fern) !important;
      opacity: 1 !important;
      margin-left: 0.5rem;
    }
    .nav-contact:hover {
      background: var(--fern);
      color: white !important;
    }
    .has-dropdown > a::after { display: none; }

    .nav-links li .dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 18px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(250,247,242,0.98);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(90,122,74,0.14);
      border-top: 2px solid var(--fern);
      box-shadow: 0 12px 40px rgba(61,90,56,0.12);
      min-width: 148px;
      list-style: none;
      padding: 8px 0;
      z-index: 300;
    }
    .nav-links li:hover .dropdown,
    .nav-links li:focus-within .dropdown {
      display: block;
    }
    .nav-links li .dropdown::before {
      content: '';
      position: absolute;
      top: -7px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 6px solid var(--fern);
    }
    .dropdown li a {
      display: block;
      padding: 10px 20px;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--ink);
      opacity: 0.7;
      white-space: nowrap;
      text-decoration: none;
    }
    .dropdown li a:hover {
      opacity: 1;
      color: var(--fern);
      padding-left: 26px;
      background: rgba(90,122,74,0.04);
    }
    .dropdown li + li { border-top: 1px solid rgba(90,122,74,0.08); }

    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      width: 40px; height: 40px;
      cursor: pointer;
      background: none; border: none;
      flex-shrink: 0;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 1.5px;
      background: var(--moss);
      transition: transform 0.2s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    .mobile-menu {
      position: fixed; top: 72px; left: 0; right: 0; bottom: 0;
      background: #faf7f2;
      border-bottom: 1px solid rgba(90,122,74,0.15);
      padding: 0 6vw 40px;
      z-index: 99;
      overflow-y: auto;
      transform: translateX(100%);
      visibility: hidden;
      transition: transform 0.3s ease;
    }
    .mobile-menu.open { transform: translateX(0); visibility: visible; }
    .mobile-menu ul { list-style: none; }
    .mobile-menu > ul > li > a,
    .mobile-parent {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0;
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: var(--moss);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.1);
      cursor: pointer;
    }
    .mobile-parent:hover, .mobile-menu > ul > li > a:hover { color: var(--fern); }
    .mobile-caret { display: inline-block; transition: transform 0.2s; }
    .mobile-caret.open { transform: rotate(180deg); }
    .mobile-sub {
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .mobile-sub.open { max-height: 200px; }
    .mobile-sub li a {
      display: block;
      padding: 11px 0 11px 16px;
      font-size: 0.85rem;
      color: var(--stone);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.06);
      letter-spacing: 0.06em;
    }
    .mobile-sub li a:hover { color: var(--fern); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }

    /* ===== 管理頁面專用樣式 ===== */
    .content {
      flex: 1;
      padding-top: 92px;
      padding-bottom: 40px;
    }
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
    }
    /* 標題區 */
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #e0d6cc;
    }
    .admin-header h1 {
      color: var(--moss);
      font-size: 1.8rem;
      font-family: 'Noto Serif TC', serif;
    }
    .admin-header p {
      color: var(--stone);
      margin-top: 0.3rem;
      font-size: 0.85rem;
    }
    .trigger-btn {
      background: var(--fern);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: transform 0.2s;
    }
    .trigger-btn:hover {
      transform: translateY(-2px);
      background: var(--moss);
    }
    /* 統計卡片 */
    .stats {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 1rem 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      flex: 1;
      min-width: 100px;
      text-align: center;
      border: 1px solid rgba(90,122,74,0.1);
    }
    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      color: var(--fern);
    }
    .stat-label {
      color: var(--stone);
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }
    /* 篩選列 */
    .filters {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      align-items: center;
    }
    .filter-btn {
      padding: 0.4rem 1rem;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      background: #e8e0d8;
      color: #4a5b4e;
    }
    .filter-btn.active {
      background: var(--fern);
      color: white;
    }
    .filter-btn:hover {
      transform: translateY(-1px);
    }
    .search-box {
      padding: 0.4rem 0.8rem;
      border-radius: 30px;
      border: 1px solid #ddd;
      font-size: 0.85rem;
      width: 200px;
    }
    .refresh-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
    }
    /* 文章表格 */
    .article-table {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      border: 1px solid rgba(90,122,74,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      padding: 1rem;
      background: #f5f0ea;
      font-weight: 600;
      color: var(--moss);
    }
    td {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid #f0e8e0;
      vertical-align: middle;
    }
    tr:hover {
      background: #fef9f0;
    }
    .category-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.7rem;
      color: white;
    }
    .category-植物 { background: #4a7c59; }
    .category-永續 { background: #2c7a4d; }
    .category-碳盤查 { background: #1e6f5c; }
    .category-生活 { background: #b88b4a; }
    .category-未分類 { background: #aaa; }
    .article-link {
      color: var(--fern);
      text-decoration: none;
    }
    .article-link:hover {
      text-decoration: underline;
    }
    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      margin: 0 0.2rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .action-btn:hover {
      opacity: 1;
    }
    .view-btn { color: var(--fern); }
    .delete-btn { color: #c97e5a; }
    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--stone);
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--moss);
      color: white;
      padding: 0.8rem 1.2rem;
      border-radius: 30px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
    }
    .toast.show {
      opacity: 1;
    }
    @media (max-width: 768px) {
      .admin-container { padding: 0 1rem; }
      th, td { padding: 0.5rem; font-size: 0.85rem; }
      .stat-number { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <!-- 導覽列佔位元素 -->
  <div id="nav-placeholder"></div>

  <!-- 頁面主要內容區域：管理後台 -->
  <main class="content">
    <div class="admin-container">
      <div class="admin-header">
        <div>
          <h1>🌿 管理後台</h1>
          <p>文章管理・分類統計・手動發文</p>
        </div>
        <button class="trigger-btn" id="triggerBtn" onclick="triggerWorkflow()">
          🚀 手動發文
        </button>
      </div>

      <!-- 統計卡片 -->
      <div class="stats" id="statsArea">
        <div class="stat-card"><div class="stat-number" id="totalCount">-</div><div class="stat-label">總文章數</div></div>
        <div class="stat-card"><div class="stat-number" id="plantCount">-</div><div class="stat-label">植物</div></div>
        <div class="stat-card"><div class="stat-number" id="sustainCount">-</div><div class="stat-label">永續</div></div>
        <div class="stat-card"><div class="stat-number" id="carbonCount">-</div><div class="stat-label">碳盤查</div></div>
        <div class="stat-card"><div class="stat-number" id="lifeCount">-</div><div class="stat-label">生活</div></div>
      </div>

      <!-- 篩選列 -->
      <div class="filters">
        <button class="filter-btn active" data-filter="all">📋 全部</button>
        <button class="filter-btn" data-filter="植物">🌿 植物</button>
        <button class="filter-btn" data-filter="永續">♻️ 永續</button>
        <button class="filter-btn" data-filter="碳盤查">📊 碳盤查</button>
        <button class="filter-btn" data-filter="生活">🏡 生活</button>
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜尋標題...">
        <button class="refresh-btn" onclick="loadArticles()">🔄</button>
      </div>

      <!-- 文章表格 -->
      <div class="article-table">
        <table>
          <thead>
            <tr><th>日期</th><th>類別</th><th>標題</th><th>操作</th></tr>
          </thead>
          <tbody id="articleList">
            <tr><td colspan="4" class="loading">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <ul class="footer-links">
      <li><a href="shop.html">植物選品</a></li>
      <li><a href="consult.html">綠色顧問</a></li>
      <li><a href="fbnote.html">蕨望筆記</a></li>
      <li><a href="about.html">關於蕨積</a></li>
    </ul>
    <p class="footer-copy">© 2026 蕨積 FernBrom . All rights reserved.</p>
  </footer>

  <div id="toast" class="toast"></div>

  <script>
    let allArticles = [];

    // 載入文章列表
    async function loadArticles() {
      const tbody = document.getElementById('articleList');
      tbody.innerHTML = '<tr><td colspan="4" class="loading">載入中...</td></tr>';
      
      try {
        const response = await fetch('/daily-post/');
        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const links = doc.querySelectorAll('a');
        
        const articles = [];
        for (const link of links) {
          const href = link.getAttribute('href');
          if (href && href.endsWith('.html') && href !== 'index.html' && !href.includes('/')) {
            const filename = href;
            const date = filename.substring(0, 10);
            const titleRaw = filename.replace('.html', '').substring(11).replace(/-/g, ' / ');
            
            let category = '未分類';
            try {
              const articleRes = await fetch(`/daily-post/${filename}`);
              const articleHtml = await articleRes.text();
              const match = articleHtml.match(/<div class="category-tag">📌 (.+?)<\/div>/);
              if (match) category = match[1];
            } catch(e) {}
            
            articles.push({ filename, date, title: titleRaw, category });
          }
        }
        
        articles.sort((a, b) => b.date.localeCompare(a.date));
        allArticles = articles;
        updateStats();
        renderArticles();
        
      } catch (error) {
        console.error('載入失敗:', error);
        tbody.innerHTML = '<tr><td colspan="4" class="loading">載入失敗，請確認 daily-post 目錄是否存在</td></tr>';
      }
    }

    function updateStats() {
      const total = allArticles.length;
      const plant = allArticles.filter(a => a.category === '植物').length;
      const sustain = allArticles.filter(a => a.category === '永續').length;
      const carbon = allArticles.filter(a => a.category === '碳盤查').length;
      const life = allArticles.filter(a => a.category === '生活').length;
      
      document.getElementById('totalCount').innerText = total;
      document.getElementById('plantCount').innerText = plant;
      document.getElementById('sustainCount').innerText = sustain;
      document.getElementById('carbonCount').innerText = carbon;
      document.getElementById('lifeCount').innerText = life;
    }

    function renderArticles() {
      const filter = document.querySelector('.filter-btn.active')?.dataset.filter || 'all';
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      
      let filtered = allArticles;
      if (filter !== 'all') {
        filtered = filtered.filter(a => a.category === filter);
      }
      if (searchTerm) {
        filtered = filtered.filter(a => a.title.toLowerCase().includes(searchTerm));
      }
      
      const tbody = document.getElementById('articleList');
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="loading">沒有找到文章</td></tr>';
        return;
      }
      
      tbody.innerHTML = filtered.map(article => {
        const catClass = `category-${article.category === '未分類' ? '未分類' : article.category}`;
        return `
          <tr>
            <td>${article.date}</td>
            <td><span class="category-badge ${catClass}">${article.category}</span></td>
            <td><a href="/daily-post/${article.filename}" target="_blank" class="article-link">${article.title}</a></td>
            <td>
              <button class="action-btn view-btn" onclick="window.open('/daily-post/${article.filename}','_blank')">🔗</button>
              <button class="action-btn delete-btn" onclick="deleteArticle('${article.filename}')">🗑️</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function deleteArticle(filename) {
      if (confirm(`確定要刪除「${filename}」嗎？此操作無法復原。`)) {
        showToast('刪除功能需透過 GitHub 操作，請手動刪除檔案');
      }
    }

    async function triggerWorkflow() {
      showToast('正在觸發發文流程...');
      // 前端直接觸發 GitHub Actions 需要 Token，此處展示提醒
      showToast('請前往 GitHub Actions 手動觸發，或設定 ADMIN_TOKEN');
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // 事件綁定
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderArticles();
      });
    });
    document.getElementById('searchInput').addEventListener('input', () => renderArticles());

    // 初始化
    loadArticles();

    // 導覽列載入
    document.addEventListener('DOMContentLoaded', function () {
      fetch('nav.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('nav-placeholder').innerHTML = data;
          initNav();
        })
        .catch(err => {
          console.error('無法載入導覽列:', err);
          document.getElementById('nav-placeholder').innerHTML = 
            '<nav style="background:var(--moss);color:white;padding:0 4vw;height:72px;display:flex;align-items:center;">' +
            '<span style="font-family:Noto Serif TC,serif;font-weight:900;">🌿 蕨積</span>' +
            '</nav>';
        });

      function initNav() {
        var btn = document.getElementById('hamburger');
        var menu = document.getElementById('mobileMenu');
        if (btn && menu) {
          btn.addEventListener('click', function () {
            btn.classList.toggle('open');
            menu.classList.toggle('open');
          });
          menu.querySelectorAll('.mobile-link').forEach(function (a) {
            a.addEventListener('click', function () {
              btn.classList.remove('open');
              menu.classList.remove('open');
            });
          });
        }
        if (menu) {
          menu.querySelectorAll('.mobile-parent').forEach(function (parent) {
            parent.addEventListener('click', function () {
              var id = parent.getAttribute('data-target');
              var sub = document.getElementById(id);
              var caretId = 'caret-' + id.replace('sub-', '');
              var caret = document.getElementById(caretId);
              var opening = !sub.classList.contains('open');
              menu.querySelectorAll('.mobile-sub').forEach(function (s) { s.classList.remove('open'); });
              menu.querySelectorAll('.mobile-caret').forEach(function (c) { c.classList.remove('open'); });
              if (opening) {
                sub.classList.add('open');
                if (caret) caret.classList.add('open');
              }
            });
          });
        }
        window.addEventListener('scroll', function () {
          var nav = document.getElementById('mainNav');
          if (nav) nav.classList.toggle('scrolled', window.scrollY > 20);
        });
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }
    });
  </script>
</body>
</html>
