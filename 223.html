<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>蕨積 · 植物選品</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="cart.js"></script>

<style>

body{
font-family:sans-serif;
background:#faf7f2;
margin:0;
}

h1{
text-align:center;
color:#2d5a27;
}

.filter-container{
text-align:center;
margin:30px 0;
}

.filter-btn{

border:1px solid #2d5a27;
padding:8px 18px;
border-radius:20px;
background:white;
cursor:pointer;
margin:5px;
}

.filter-btn.active{
background:#2d5a27;
color:white;
}

#product-list{

max-width:1000px;
margin:auto;

display:grid;

grid-template-columns:repeat(auto-fill,minmax(220px,1fr));

gap:20px;

}

.product-card{

background:white;
padding:15px;
border-radius:12px;

box-shadow:0 4px 10px rgba(0,0,0,0.1);

text-align:center;

}

.product-card img{

width:100%;
height:180px;
object-fit:cover;
border-radius:8px;

}

.btn-add{

margin-top:10px;

background:#2d5a27;

color:white;

border:none;

padding:10px;

width:100%;

border-radius:8px;

cursor:pointer;

}

.pagination{

display:flex;

justify-content:center;

gap:10px;

margin:40px;

}

.pagination button{

padding:8px 20px;

border:1px solid #2d5a27;

background:white;

cursor:pointer;

border-radius:30px;

}

#cart-section{

max-width:500px;

margin:60px auto;

border:1px solid #ddd;

padding:25px;

border-radius:15px;

}

.form-input{

width:100%;

padding:10px;

margin:5px 0;

border:1px solid #ddd;

border-radius:5px;

}

</style>

</head>

<body>

<div id="nav-placeholder"></div>

<div style="height:72px"></div>

<h1>植物選品</h1>

<p style="text-align:center;max-width:700px;margin:auto;line-height:1.8">

每一株植物都有自己的生長節奏。<br>
如果你願意慢一點，它們會陪你很久。<br>
這些植物，大多來自一個持續多年的屋頂栽培計畫。

</p>

<div class="filter-container">

<button class="filter-btn active" onclick="filterProducts('全部',this)">全部</button>

<button class="filter-btn" onclick="filterProducts('鹿角蕨',this)">鹿角蕨</button>

<button class="filter-btn" onclick="filterProducts('積水鳳梨',this)">積水鳳梨</button>

<button class="filter-btn" onclick="filterProducts('其他植物',this)">其他植物</button>

</div>

<div id="product-list"></div>

<div class="pagination">

<button onclick="changePage(-1)">上一頁</button>

<span id="page-info"></span>

<button onclick="changePage(1)">下一頁</button>

</div>

<div id="cart-section">

<h3>🛒購物清單</h3>

<ul id="cart-items"></ul>

<p>總金額 $ <span id="total-price">0</span></p>

<input id="cust-name" class="form-input" placeholder="姓名">

<input id="cust-phone" class="form-input" placeholder="電話">

<input id="cust-email" class="form-input" placeholder="Email">

<button class="btn-add" onclick="submitOrder()">送出訂單</button>

</div>

<script>

const supa = supabase.createClient(

'https://wrreydnppkhhssbnmnno.supabase.co',

'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndycmV5ZG5wcGtoaHNzYm5tbm5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjI0MjYsImV4cCI6MjA4ODc5ODQyNn0.7520TxecGoqhjkIcY497sCt4oG7eqDtShK1OQJe3N7o'

)

let products=[]

let filtered=[]

let page=1

const perPage=8

function render(){

const list=document.getElementById("product-list")

let show=filtered.slice((page-1)*perPage,page*perPage)

list.innerHTML=show.map(p=>{

return`

<div class="product-card">

<img src="${p.image_url}">

<h3>${p.name}</h3>

<p>庫存 ${p.quantity} | $${p.price}</p>

<button class="btn-add"

onclick="Cart.addItem('${p.id}','${p.name}',${p.price},${p.quantity})">

加入購物車

</button>

</div>

`

}).join("")

document.getElementById("page-info").innerText=

`第 ${page} 頁 / 共 ${Math.ceil(filtered.length/perPage)}`

}

function changePage(d){

let max=Math.ceil(filtered.length/perPage)

page+=d

if(page<1)page=1

if(page>max)page=max

render()

}

function filterProducts(cat,btn){

document.querySelectorAll(".filter-btn")

.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

if(cat==="全部"){

filtered=[...products]

}else{

filtered=products.filter(p=>p.category===cat)

}

page=1

render()

}

function updateCartUI(){

const items=Cart.getItems()

document.getElementById("cart-items").innerHTML=

items.map((p,i)=>`

<li>

${p.name} x ${p.quantity}

<button onclick="Cart.removeItem(${i})">刪除</button>

</li>

`).join("")

document.getElementById("total-price").innerText=Cart.getTotal()

}

async function submitOrder(){

const items=Cart.getItems()

if(items.length===0) return alert("購物車是空的")

const order={

name:document.getElementById("cust-name").value,

phone:document.getElementById("cust-phone").value,

email:document.getElementById("cust-email").value,

items:items,

total:Cart.getTotal()

}

await fetch("https://linebot-oh5o.onrender.com/order",{

method:"POST",

headers:{'Content-Type':'application/json'},

body:JSON.stringify(order)

})

alert("訂單已送出")

localStorage.removeItem("myCart")

location.reload()

}

async function loadProducts(){

const {data}=await supa

.from("products")

.select("*")

.order("created_at")

products=data||[]

filtered=[...products]

render()

}

document.addEventListener("DOMContentLoaded",async()=>{

const nav=await fetch("nav.html")

document.getElementById("nav-placeholder").innerHTML=

await nav.text()

await loadProducts()

updateCartUI()

document.addEventListener("cartUpdated",()=>{

updateCartUI()

render()

})

const url=new URLSearchParams(location.search)

const cat=url.get("cat")

if(cat){

const btn=[...document.querySelectorAll(".filter-btn")]

.find(b=>b.innerText===cat)

if(btn) filterProducts(cat,btn)

}

})

</script>

</body>
</html>
