<!-- ========== 聯絡成功頁 contact-success.html ========== -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蕨積 — 聯絡我們</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* ===== 完整保留原 CSS ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1a14;
      --moss: #3d5a38;
      --fern: #5a7a4a;
      --sage: #8aab7a;
      --mist: #d4e4c8;
      --cream: #f5f0e8;
      --stone: #9a9080;
      --paper: #faf7f2;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4vw; height: 72px;
      background: rgba(250,247,242,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(90,122,74,0.12);
    }
    nav.scrolled { box-shadow: 0 2px 24px rgba(61,90,56,0.10); }
    .content {
      flex: 1;
      padding-top: 92px; /* 不改變 nav 間距 */
      padding-bottom: 40px;
    }
    footer {
      border-top: 1px solid rgba(90,122,74,0.15);
      padding: 40px 4vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      margin-top: auto;
    }
    .footer-links { display:flex; gap:24px; list-style:none; }
    .footer-links a { font-size:0.75rem; color:var(--stone); text-decoration:none; }
  </style>
</head>

<body>

<!-- 導覽列佔位 -->
<div id="nav-placeholder"></div>

<!-- 主要內容區 -->
<main class="content">
  <div style="
    max-width: 520px;
    margin: 0 auto;
    padding: 40px 20px;
    background: #fff;
    border: 1px solid rgba(90,122,74,0.12);
    box-shadow: 0 20px 60px rgba(61,90,56,0.08);
    text-align: center;
  ">
    <!-- 成功 icon -->
    <div style="
      font-size: 2rem;
      color: var(--fern);
      margin-bottom: 18px;
    ">✓</div>

    <!-- 主標 -->
    <h1 style="
      font-family: 'Noto Serif TC', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--moss);
      margin-bottom: 16px;
    ">感謝您的訊息</h1>

    <!-- 文字說明 -->
    <p style="
      font-size: 0.9rem;
      line-height: 1.8;
      color: var(--stone);
      margin-bottom: 32px;
    ">
      我們已收到您的來信，<br>
      將會盡快與您聯繫。<br><br>
      在城市裡，每一個關於植物與生活的提問，都值得被慢慢回應。
    </p>

    <!-- 回首頁按鈕 -->
    <a href="/" style="
      display: inline-block;
      padding: 10px 28px;
      border: 1px solid var(--fern);
      color: var(--fern);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      margin-bottom: 28px;
    "
    onmouseover="this.style.background='var(--fern)';this.style.color='#fff';"
    onmouseout="this.style.background='transparent';this.style.color='var(--fern)';"
    >
      回到首頁
    </a>

    <!-- 次導流 -->
    <div style="
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--stone);
      margin-bottom: 12px;
    ">或瀏覽其他頁面</div>

    <div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap;">
      <a href="123.html" style="color: var(--moss); text-decoration:none; font-size:0.8rem;">植物選品</a>
      <a href="67.html" style="color: var(--moss); text-decoration:none; font-size:0.8rem;">蕨望筆記</a>
      <a href="45.html" style="color: var(--moss); text-decoration:none; font-size:0.8rem;">綠色顧問</a>
    </div>
  </div>
</main>

<!-- Footer -->
<footer>
  <ul class="footer-links">
    <li><a href="123.html">植物選品</a></li>
    <li><a href="45.html">綠色顧問</a></li>
    <li><a href="67.html">蕨望筆記</a></li>
    <li><a href="89.html">關於蕨積</a></li>
  </ul>
  <p class="footer-copy">© 2026 蕨積 FernBrom . All rights reserved.</p>
</footer>

<script>
document.addEventListener('DOMContentLoaded', function () {
  // 載入共用導覽列
  fetch('nav.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('nav-placeholder').innerHTML = data;
      initNav();
    })
    .catch(err => {
      console.error('無法載入導覽列:', err);
      document.getElementById('nav-placeholder').innerHTML = 
        '<nav style="background:var(--moss);color:white;padding:0 4vw;height:72px;display:flex;align-items:center;">' +
        '<span style="font-family:Noto Serif TC,serif;font-weight:900;">⚠️ 導覽列載入失敗</span>' +
        '</nav>';
    });

  function initNav() {
    var btn = document.getElementById('hamburger');
    var menu = document.getElementById('mobileMenu');
    if (btn && menu) {
      btn.addEventListener('click', function () {
        btn.classList.toggle('open');
        menu.classList.toggle('open');
      });
    }
    window.addEventListener('scroll', function () {
      var nav = document.getElementById('mainNav');
      if (nav) nav.classList.toggle('scrolled', window.scrollY > 20);
    });
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
});
</script>

</body>
</html>
