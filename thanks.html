<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蕨積 — 聯絡我們</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* 完全不動你的CSS */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1a14;
      --moss: #3d5a38;
      --fern: #5a7a4a;
      --sage: #8aab7a;
      --mist: #d4e4c8;
      --cream: #f5f0e8;
      --stone: #9a9080;
      --paper: #faf7f2;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .content {
      flex: 1;
      padding-top: 120px;
      padding-bottom: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    footer {
      border-top: 1px solid rgba(90,122,74,0.15);
      padding: 40px 4vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
    }
    .footer-links { display:flex; gap:24px; list-style:none; }
    .footer-links a { font-size:0.75rem; color:var(--stone); text-decoration:none; }
  </style>
</head>

<body>

<div id="nav-placeholder"></div>

<main class="content">

  <div style="
    max-width: 620px;
    width: 92%;
    background: white;
    padding: 64px 42px;
    border: 1px solid rgba(90,122,74,0.12);
    box-shadow: 0 20px 60px rgba(61,90,56,0.08);
    text-align: center;
  ">

    <!-- 小標 -->
    <div style="
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: var(--stone);
      margin-bottom: 16px;
    ">
      MESSAGE SENT
    </div>

    <!-- icon -->
    <div style="
      font-size: 2rem;
      color: var(--fern);
      margin-bottom: 20px;
    ">✓</div>

    <!-- 主標 -->
    <h1 style="
      font-family: 'Noto Serif TC', serif;
      font-size: 1.9rem;
      font-weight: 600;
      color: var(--moss);
      margin-bottom: 18px;
    ">
      我們已收到你的訊息
    </h1>

    <!-- 內文 -->
    <p style="
      font-size: 0.92rem;
      line-height: 1.9;
      color: var(--stone);
      margin-bottom: 40px;
    ">
      在城市裡，關於植物與生活的每一個提問，<br>
      都值得被慢慢回應。<br><br>
      蕨積會在最短的時間內與你聯繫。
    </p>

    <!-- 主按鈕 -->
    <div style="margin-bottom: 36px;">
      <a href="/" style="
        display: inline-block;
        padding: 12px 32px;
        border: 1px solid var(--fern);
        color: var(--fern);
        text-decoration: none;
        font-size: 0.8rem;
        letter-spacing: 0.12em;
      "
      onmouseover="this.style.background='var(--fern)';this.style.color='#fff';"
      onmouseout="this.style.background='transparent';this.style.color='var(--fern)';"
      >
        回到首頁
      </a>
    </div>

    <!-- 分隔 -->
    <div style="
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--stone);
      margin-bottom: 20px;
    ">
      或繼續看看
    </div>

    <!-- 次導流 -->
    <div style="
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
    ">
      <a href="123.html" style="
        font-size: 0.8rem;
        color: var(--moss);
        text-decoration: none;
        letter-spacing: 0.08em;
      ">植物選品</a>

      <a href="67.html" style="
        font-size: 0.8rem;
        color: var(--moss);
        text-decoration: none;
        letter-spacing: 0.08em;
      ">蕨望筆記</a>

      <a href="45.html" style="
        font-size: 0.8rem;
        color: var(--moss);
        text-decoration: none;
        letter-spacing: 0.08em;
      ">綠色顧問</a>
    </div>

  </div>

</main>

<footer>
  <ul class="footer-links">
    <li><a href="123.html">植物選品</a></li>
    <li><a href="45.html">綠色顧問</a></li>
    <li><a href="67.html">蕨望筆記</a></li>
    <li><a href="89.html">關於蕨積</a></li>
  </ul>
  <p class="footer-copy">© 2026 蕨積 FernBrom . All rights reserved.</p>
</footer>

<script>
document.addEventListener('DOMContentLoaded', function () {
  fetch('nav.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('nav-placeholder').innerHTML = data;
      initNav();
    });

  function initNav() {
    var btn = document.getElementById('hamburger');
    var menu = document.getElementById('mobileMenu');
    if (btn && menu) {
      btn.addEventListener('click', function () {
        btn.classList.toggle('open');
        menu.classList.toggle('open');
      });
    }
    window.addEventListener('scroll', function () {
      var nav = document.getElementById('mainNav');
      if (nav) nav.classList.toggle('scrolled', window.scrollY > 20);
    });
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
});
</script>

</body>
</html>
