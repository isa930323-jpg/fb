<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蕨積 — 聯絡我們</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --ink: #1a1a14;
      --moss: #3d5a38;
      --fern: #5a7a4a;
      --sage: #8aab7a;
      --mist: #d4e4c8;
      --cream: #f5f0e8;
      --stone: #9a9080;
      --paper: #faf7f2;
    }
    body { font-family:'Noto Sans TC',sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; }

    /* ===== 共用導覽列佔位 ===== */
    #nav-placeholder { }

    main.content { flex:1; padding:100px 4vw 40px; }

    /* ----- 聯絡區容器 ----- */
    .contact-container { max-width:800px; margin:0 auto; }

    .page-header { text-align:center; margin-bottom:32px; }
    .page-header h1 { font-family:'Noto Serif TC', serif; font-size:2rem; font-weight:600; color:var(--moss); line-height:1.6; margin-bottom:8px; }
    .page-header p { font-size:1rem; color:var(--stone); line-height:1.8; margin-top:8px; }

    /* ----- 表單 ----- */
    form.contact-form { display:flex; flex-direction:column; gap:16px; margin-top:32px; }
    form.contact-form input,
    form.contact-form textarea {
      padding:12px 16px;
      border:1px solid rgba(90,122,74,0.2);
      border-radius:8px;
      font-size:0.95rem;
      font-family:'Noto Sans TC',sans-serif;
      width:100%;
      resize:none;
    }
    form.contact-form textarea { min-height:120px; }
    form.contact-form button {
      padding:12px 24px;
      background:var(--fern);
      color:white;
      border:none;
      border-radius:6px;
      font-weight:600;
      font-size:1rem;
      cursor:pointer;
      transition:0.2s;
      align-self:flex-start;
    }
    form.contact-form button:hover { background:var(--moss); }

    /* ----- 地址 & 地圖 ----- */
    .contact-info { margin-top:48px; display:flex; flex-wrap:wrap; gap:32px; justify-content:space-between; }
    .info-block { flex:1 1 250px; }
    .info-block h3 { font-family:'Noto Serif TC', serif; font-weight:600; color:var(--moss); margin-bottom:8px; }
    .info-block p { color:var(--stone); line-height:1.6; }
    .map-frame { width:100%; height:280px; border:none; border-radius:12px; margin-top:16px; }

    /* ----- 社群按鈕 ----- */
    .social-links { display:flex; gap:16px; margin-top:16px; }
    .social-links a {
      display:inline-block; padding:8px 12px; border-radius:6px; background:var(--mist); color:var(--moss); text-decoration:none; font-weight:500;
      transition:0.2s;
    }
    .social-links a:hover { background:var(--fern); color:white; }

    /* ----- Footer ----- */
    footer {
      border-top: 1px solid rgba(90,122,74,0.15);
      padding: 40px 4vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      margin-top: auto;
    }
    .footer-logo { font-family: 'Noto Serif TC', serif; font-weight: 900; font-size: 1.1rem; color: var(--moss); letter-spacing: 0.05em; }
    .footer-copy { font-size: 0.75rem; color: var(--stone); letter-spacing: 0.1em; }
    .footer-links { display: flex; gap: 24px; list-style: none; }
    .footer-links a { font-size: 0.75rem; color: var(--stone); text-decoration: none; letter-spacing: 0.08em; opacity: 0.7; transition: opacity 0.2s; }
    .footer-links a:hover { opacity:1; color:var(--fern); }
    @media(max-width:768px){
      .contact-info { flex-direction:column; }
      footer { flex-direction:column; gap:20px; text-align:center; }
      .footer-links { justify-content:center; flex-wrap:wrap; }
    }
  </style>
</head>
<body>

  <!-- 導覽列佔位 -->
  <div id="nav-placeholder"></div>

  <main class="content">
    <div class="contact-container">
      <div class="page-header">
        <h1>聯絡我們</h1>
        <p>我們喜歡聽你的故事，也喜歡把綠色帶進每個空間。留下訊息給我們，或只是想聊植物，都歡迎。</p>
      </div>

      <!-- 聯絡表單 -->
      <form class="contact-form" id="contactForm">
        <input type="text" name="name" placeholder="姓名" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="message" placeholder="您的訊息..." required></textarea>
        <button type="submit">送出訊息</button>
        <div id="formResponse" style="margin-top:8px; color:var(--fern); font-weight:500;"></div>
      </form>

      <!-- 地址與地圖 -->
      <div class="contact-info">
        <div class="info-block">
          <h3>地址</h3>
          <p>台北市中山區XX路XX號</p>
          <h3>聯絡方式</h3>
          <p>電話：02-1234-5678<br>Email：info@fernbrom.com</p>
          <div class="social-links">
            <a href="#" target="_blank">FB</a>
            <a href="#" target="_blank">Instagram</a>
            <a href="#" target="_blank">Line</a>
          </div>
        </div>
        <iframe class="map-frame" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3620.0000000000005!2d121.000000!3d25.000000!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2z5Y-w5Y2X5YyX!5e0!3m2!1szh-TW!2stw!4v1600000000000!5m2!1szh-TW!2stw" allowfullscreen="" loading="lazy"></iframe>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-logo">蕨積 FernBrom</div>
    <ul class="footer-links">
      <li><a href="123.html">植物選品</a></li>
      <li><a href="45.html">綠色顧問</a></li>
      <li><a href="67.html">蕨望筆記</a></li>
      <li><a href="89.html">關於蕨積</a></li>
    </ul>
    <p class="footer-copy">© 2026 蕨積 FernBrom . All rights reserved.</p>
  </footer>

  <!-- 表單簡單送出事件（可接 API 或 email） -->
  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e){
      e.preventDefault();
      const response = document.getElementById('formResponse');
      response.textContent = '訊息已送出，感謝您！';
      this.reset();
    });

    // 載入共用導覽列
    fetch('nav.html')
      .then(r => r.text())
      .then(html => { document.getElementById('nav-placeholder').innerHTML = html; })
      .catch(err => console.error(err));
  </script>

</body>
</html>
