<!DOCTYPE html>

<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>蕨積 · 植物選品</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

</head>

<body>

<div id="nav-placeholder"></div>

<h1 style="text-align:center;margin-top:40px;">
植物選品
</h1>

<p style="text-align:center;max-width:700px;margin:auto;line-height:1.8;">

每一株植物都有自己的生長節奏。<br>

如果你願意慢一點，它們會陪你很久。<br>

這些植物，大多來自一個持續多年的屋頂栽培計畫。<br>

在城市裡，我們嘗試讓植物重新回到生活中。

</p>

<div class="filter-container">

<button class="filter-btn active">全部</button>

<button class="filter-btn">鹿角蕨</button>

<button class="filter-btn">積水鳳梨</button>

<button class="filter-btn">其他植物</button>

</div>

<div id="product-list"></div>

<div id="cart-section">

<h3>🛒 購物清單</h3>

<ul id="cart-items"></ul>

<p>
總金額：
$ <span id="total-price">0</span>
</p>

<input type="text" id="cust-name" class="form-input" placeholder="姓名">

<input type="text" id="cust-phone" class="form-input" placeholder="電話">

<input type="email" id="cust-email" class="form-input" placeholder="Email">

<button class="btn-add" onclick="submitOrder()">
送出訂單
</button>

</div>

<div id="footer-placeholder"></div>

<script src="nav.js"></script>

<script src="cart.js"></script>

</body>

</html>
