<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>蕨積碳足跡 - 看見每一天的綠色貢獻</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: linear-gradient(135deg, #f0f9f0 0%, #e6f3e6 100%);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,40,0,0.08);
            padding: 1.25rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(46, 125, 50, 0.1);
        }
        
        .photo-container {
            aspect-ratio: 1/1;
            overflow: hidden;
            border-radius: 1.25rem;
            background: linear-gradient(45deg, #e8f5e8, #c8e6c9);
        }
        
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1.5rem 1rem;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,40,0,0.05);
            border: 1px solid rgba(76, 175, 80, 0.2);
        }
        
        .stat-value {
            font-size: 3rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 0.25rem;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #2e6b3e;
            font-weight: 500;
        }
        
        .stat-unit {
            font-size: 1rem;
            color: #4a7a4a;
            margin-left: 0.25rem;
        }
        
        .progress-bar {
            background: linear-gradient(90deg, #2e7d32, #4caf50);
        }
        
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .header-center-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 1rem 0 2rem 0;
        }

        .logo-title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 0.75rem 2rem;
            border-radius: 3rem;
            box-shadow: 0 10px 20px rgba(0,40,0,0.1);
        }

        .logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }

        .title-main {
            font-size: 1.8rem;
            font-weight: 900;
            color: #1e4a2a;
        }

        .title-sub {
            font-size: 0.85rem;
            color: #2e6b3e;
        }

        /* 搜尋框容器 */
        .search-container {
            position: relative;
            width: 100%;
            margin-bottom: 1.5rem;
        }
        
        .search-box {
            background: white;
            border: 2px solid #4caf50;
            border-radius: 3rem;
            padding: 1rem 1.5rem 1rem 3rem;
            width: 100%;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,40,0,0.1);
        }
        
        .search-box:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
        }
        
        /* 搜尋圖示 */
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: #4caf50;
            pointer-events: none;
        }
        
        /* 清除搜尋按鈕 */
        .clear-search {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: #e5e7eb;
            border: none;
            border-radius: 50%;
            width: 1.5rem;
            height: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            color: #4b5563;
        }
        
        .clear-search:hover {
            background: #d1d5db;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2e7d32;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .load-more-btn {
            background: white;
            border: 2px solid #2e7d32;
            color: #2e7d32;
            padding: 0.75rem 2rem;
            border-radius: 2rem;
            font-weight: 600;
            margin: 1rem auto;
            display: inline-block;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .load-more-btn:hover {
            background: #2e7d32;
            color: white;
        }
        
        .month-divider {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e4a2a;
            margin: 1.5rem 0 1rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid rgba(46, 125, 50, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .month-count {
            font-size: 0.9rem;
            color: #4a7a4a;
            background: rgba(70, 130, 70, 0.1);
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
        }

        .search-stats {
            font-size: 0.9rem;
            color: #2e6b3e;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            text-align: center;
            padding: 0.5rem;
            background: rgba(70, 130, 70, 0.1);
            border-radius: 2rem;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #666;
            font-size: 1.1rem;
        }
    </style>
</head>
<body class="p-4">
    <div class="max-w-lg mx-auto">
        <!-- 標頭 -->
        <div class="header-center-block">
            <div class="logo-title-container">
                <img src="/logo.png" alt="蕨積" class="logo" 
                     onerror="this.onerror=null; this.style.display='none'">
                <div class="title-group">
                    <h1 class="title-main">蕨積碳足跡</h1>
                    <p class="title-sub">看見每一天的綠色貢獻</p>
                </div>
            </div>
        </div>

        <!-- 統計卡片 - 加入單位標示 -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <!-- 正在照顧 -->
            <div class="stat-card">
                <div class="stat-value text-green-600" id="total-plants">0</div>
                <div class="stat-label">顆正在照顧</div>
            </div>
            
            <!-- 累積吸收 - 加入 kg 單位 -->
            <div class="stat-card">
                <div class="stat-value text-blue-600" id="total-carbon">0</div>
                <div class="stat-label">累積固碳量<span class="stat-unit">kg</span></div>
            </div>
        </div>

        <!-- 即時查詢輸入框（不需按Enter） -->
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="search-box" 
                   placeholder="輸入植物名稱即時查詢..." 
                   oninput="handleSearchInput()">
            <button id="clear-search-btn" class="clear-search hidden" onclick="clearSearch()">✕</button>
        </div>

        <!-- 查詢結果統計 -->
        <div id="search-stats" class="search-stats hidden"></div>

        <!-- 批次列表 -->
        <div id="batches-container" class="space-y-4"></div>
        
        <!-- 載入更多按鈕 -->
        <div id="load-more-container" class="text-center hidden">
            <button id="load-more-btn" class="load-more-btn" onclick="loadNextPage()">
                載入更多
            </button>
        </div>
        
        <!-- 載入中動畫 -->
        <div id="loading-spinner" class="loading-spinner hidden"></div>
        
        <!-- 頁尾說明 -->
        <div class="mt-8 text-[10px] text-green-700/40 text-center border-t border-green-200/50 pt-4">
            <p>🌱 每一天的養護，都在增加對地球的貢獻</p>
             <p class="mt-1">基於學理自主計算結果未經驗證</p>
             <p class="mt-1">數據基礎：參考農業試驗所植物固碳係數基算</p>
             <p class="mt-1">生物質碳匯估算(不確定度 ±20%) </p>
        </div>
    </div>

    <script>
        // 全域變數
        let currentPage = 1;
        let totalPages = 1;
        let isLoading = false;
        let currentSearch = '';
        let searchTimeout;
        let allFarms = [];

        // ========== 即時搜尋處理 ==========
        function handleSearchInput() {
            const searchInput = document.getElementById('search-input');
            const clearBtn = document.getElementById('clear-search-btn');
            
            // 顯示/隱藏清除按鈕
            if (searchInput.value.length > 0) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }
            
            // 清除之前的 timeout
            clearTimeout(searchTimeout);
            
            // 設定新的 timeout - 300ms 後執行搜尋
            searchTimeout = setTimeout(() => {
                currentSearch = searchInput.value;
                currentPage = 1;
                loadFarms(false);
            }, 300);
        }

        // 清除搜尋
        function clearSearch() {
            document.getElementById('search-input').value = '';
            document.getElementById('clear-search-btn').classList.add('hidden');
            currentSearch = '';
            currentPage = 1;
            loadFarms(false);
        }

        // ========== 載入統計摘要 ==========
        async function loadSummary() {
            try {
                const res = await fetch('/api/summary');
                if (!res.ok) throw new Error('無法載入統計');
                const data = await res.json();
                
                document.getElementById('total-plants').textContent = data.total_plants || 0;
                document.getElementById('total-carbon').textContent = data.total_carbon_kg || 0;
            } catch (e) {
                console.error('載入統計失敗:', e);
            }
        }

        // ========== 載入下一頁 ==========
        async function loadNextPage() {
            if (currentPage < totalPages && !isLoading) {
                currentPage++;
                await loadFarms(true);
            }
        }

        // ========== 載入批次資料 ==========
        async function loadFarms(isAppend = false) {
            if (isLoading) return;
            
            isLoading = true;
            document.getElementById('loading-spinner').classList.remove('hidden');
            document.getElementById('load-more-btn').disabled = true;
            
            try {
                let url = `/api/farms?page=${currentPage}&limit=5`;
                if (currentSearch) {
                    url += `&search=${encodeURIComponent(currentSearch)}`;
                }
                
                const res = await fetch(url);
                if (!res.ok) throw new Error('無法載入資料');
                
                const data = await res.json();
                
                totalPages = data.pagination.total_pages;
                
                // 顯示搜尋統計
                const statsDiv = document.getElementById('search-stats');
                if (currentSearch) {
                    statsDiv.classList.remove('hidden');
                    if (data.pagination.total_items === 0) {
                        statsDiv.innerHTML = `🔍 沒有找到「${currentSearch}」的植物`;
                    } else {
                        statsDiv.innerHTML = `🔍 找到 ${data.pagination.total_items} 筆「${currentSearch}」的植物`;
                    }
                } else {
                    statsDiv.classList.add('hidden');
                }
                
                if (!isAppend) {
                    allFarms = data.farms;
                    document.getElementById('batches-container').innerHTML = '';
                } else {
                    allFarms = [...allFarms, ...data.farms];
                }
                
                if (allFarms.length === 0 && !currentSearch) {
                    document.getElementById('batches-container').innerHTML = `
                        <div class="no-results">
                            🌱 還沒有植物資料，請等待第一株植物入庫
                        </div>
                    `;
                } else if (allFarms.length === 0 && currentSearch) {
                    document.getElementById('batches-container').innerHTML = `
                        <div class="no-results">
                            🌱 沒有找到符合「${currentSearch}」的植物
                        </div>
                    `;
                } else {
                    renderFarmsByMonth(allFarms);
                }
                
                // 顯示/隱藏載入更多按鈕
                const loadMoreContainer = document.getElementById('load-more-container');
                if (currentPage < totalPages) {
                    loadMoreContainer.classList.remove('hidden');
                } else {
                    loadMoreContainer.classList.add('hidden');
                }
                
            } catch (e) {
                console.error('載入失敗:', e);
                document.getElementById('batches-container').innerHTML = `
                    <div class="no-results">
                        ❌ 載入失敗，請稍後再試
                    </div>
                `;
            } finally {
                isLoading = false;
                document.getElementById('loading-spinner').classList.add('hidden');
                document.getElementById('load-more-btn').disabled = false;
            }
        }

        // ========== 依照入庫月份分組渲染 ==========
        function renderFarmsByMonth(farms) {
            const container = document.getElementById('batches-container');
            container.innerHTML = '';
            
            // 依月份分組
            const groups = {};
            farms.forEach(farm => {
                if (farm.in_date) {
                    const date = new Date(farm.in_date);
                    const monthKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                    if (!groups[monthKey]) groups[monthKey] = [];
                    groups[monthKey].push(farm);
                } else {
                    if (!groups['無日期']) groups['無日期'] = [];
                    groups['無日期'].push(farm);
                }
            });
            
            // 排序月份（新的在前）
            const sortedMonths = Object.keys(groups).sort().reverse();
            
            sortedMonths.forEach(month => {
                const monthDiv = document.createElement('div');
                monthDiv.className = 'month-divider';
                monthDiv.innerHTML = `
                    <span>📅 ${month === '無日期' ? '無日期' : month + ' 入庫'}</span>
                    <span class="month-count">${groups[month].length} 筆</span>
                `;
                container.appendChild(monthDiv);
                
                groups[month].forEach(farm => {
                    container.appendChild(createFarmCard(farm));
                });
            });
        }

        // ========== 建立單一卡片 ==========
        function createFarmCard(farm) {
            const card = document.createElement('div');
            card.className = 'card';
            
            const days = farm.carbon_absorption?.days || calculateDays(farm.in_date);
            const progressPercent = Math.min(100, Math.round((days / 365) * 100));
            
            card.innerHTML = `
                <div class="flex gap-4">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 flex-wrap mb-2">
                            <span class="font-black text-lg text-green-700">${farm.plant_name || '未命名'}</span>
                            <span class="badge bg-green-100 text-green-800">${farm.quantity} 株</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <div>
                                <div class="text-[10px] text-gray-400">已出貨</div>
                                <div class="font-bold text-purple-600">${farm.total_shipped || 0}</div>
                            </div>
                            <div>
                                <div class="text-[10px] text-gray-400">進貨日</div>
                                <div class="text-xs">${formatDate(farm.in_date)}</div>
                            </div>
                        </div>
                        
                        <!-- 時間軸進度條 -->
                        <div class="mt-2 mb-3">
                            <div class="flex justify-between text-[10px] text-gray-500 mb-1">
                                <span>養護 ${days} 天</span>
                                <span>${progressPercent}%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
                                <div class="progress-bar h-2 rounded-full" style="width: ${progressPercent}%"></div>
                            </div>
                        </div>
                        
                        <!-- 碳吸收卡片 -->
                        ${farm.carbon_absorption ? `
                            <div class="bg-gradient-to-r from-green-50 to-emerald-50 rounded-xl p-2">
                                <div class="flex justify-between items-center">
                                    <span class="text-xs font-medium text-green-700">碳吸收</span>
                                    <span class="text-xs text-gray-500">±20%</span>
                                </div>
                                <div class="text-lg font-bold text-green-700">
                                    ${farm.carbon_absorption.value} kg
                                </div>
                            </div>
                        ` : ''}
                    </div>
                    
                    <!-- 右側照片 -->
                    <div class="w-24 flex-shrink-0">
                        <div class="photo-container">
                            <img src="${farm.photo_url || 'https://via.placeholder.com/200?text=📸'}" 
                                 loading="lazy"
                                 onerror="this.src='https://via.placeholder.com/200?text=❌'"
                                 alt="植物照片">
                        </div>
                    </div>
                </div>
            `;
            
            return card;
        }

        // ========== 輔助函數 ==========
        function formatDate(dateStr) {
            if (!dateStr) return '無日期';
            try {
                const d = new Date(dateStr);
                return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
            } catch {
                return dateStr;
            }
        }

        function calculateDays(inDate) {
            if (!inDate) return 0;
            try {
                const today = new Date();
                const inDateObj = new Date(inDate);
                return Math.floor((today - inDateObj) / (1000 * 60 * 60 * 24));
            } catch {
                return 0;
            }
        }

        // ========== 初始化 ==========
        window.onload = async function() {
            await loadSummary();
            await loadFarms(false);
        };
    </script>
</body>
</html>
