<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>植物選品</title>
  <link rel="stylesheet" href="style.css">
  <script src="cart.js" defer></script>
</head>
<body>
  <!-- 導覽列佔位 -->
  <div id="nav-placeholder"></div>

  <section id="shop">
    <div class="filter-buttons">
      <button class="filter-btn" data-category="鹿角蕨">鹿角蕨</button>
      <button class="filter-btn" data-category="積水鳳梨">積水鳳梨</button>
      <button class="filter-btn" data-category="其他植物">其他植物</button>
      <button class="filter-btn" data-category="全部">全部</button>
    </div>

    <div id="products" class="products-grid">
      <!-- 商品渲染位置 -->
    </div>
  </section>

  <script>
    // 載入共用 nav
    fetch('nav.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('nav-placeholder').innerHTML = data
        if(typeof initNav === 'function') initNav()
      })

    // 假設這是購物車和產品渲染函數
    async function renderProducts() {
      const productsContainer = document.getElementById('products')
      productsContainer.innerHTML = ''
      const products = [
        {name:'鹿角蕨 A', category:'鹿角蕨'},
        {name:'積水鳳梨 B', category:'積水鳳梨'},
        {name:'其他植物 C', category:'其他植物'}
      ]
      products.forEach(p => {
        const div = document.createElement('div')
        div.className = 'product-card'
        div.dataset.category = p.category
        div.innerText = p.name
        productsContainer.appendChild(div)
      })
    }

    function filterProducts(category) {
      const cards = document.querySelectorAll('.product-card')
      cards.forEach(c => {
        if(category === '全部' || c.dataset.category === category){
          c.style.display = ''
        } else {
          c.style.display = 'none'
        }
      })
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await renderProducts()

      // 讀取網址參數並篩選
      const urlParams = new URLSearchParams(window.location.search)
      const category = urlParams.get('cat') || '全部'
      filterProducts(category)

      // 按鈕點擊篩選
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => filterProducts(btn.dataset.category))
      })
    })
  </script>
</body>
</html>
