<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生活隨筆 — 蕨積｜碳盤查・ESG・永續生活</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1a14;
      --moss: #3d5a38;
      --fern: #5a7a4a;
      --sage: #8aab7a;
      --mist: #d4e4c8;
      --cream: #f5f0e8;
      --stone: #9a9080;
      --paper: #faf7f2;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 導覽列 */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4vw; height: 72px;
      background: rgba(250,247,242,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(90,122,74,0.12);
    }
    nav.scrolled { box-shadow: 0 2px 24px rgba(61,90,56,0.10); }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .logo-mark { width: 38px; height: 38px; flex-shrink: 0; }
    .logo-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .logo-text {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--moss);
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }
    .logo-text span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--stone);
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
      white-space: nowrap;
    }
    .nav-links li { position: relative; padding: 0 2px; }
    .nav-links a {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--ink);
      text-decoration: none;
      padding-bottom: 3px;
      opacity: 0.75;
      display: inline-block;
    }
    .nav-links a:hover { opacity: 1; color: var(--fern); }
    .nav-contact {
      padding: 8px 20px !important;
      border: 1px solid var(--fern) !important;
      border-radius: 2px;
      color: var(--fern) !important;
      opacity: 1 !important;
      margin-left: 0.5rem;
    }
    .nav-contact:hover { background: var(--fern); color: white !important; }

    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      width: 40px; height: 40px;
      cursor: pointer;
      background: none; border: none;
      flex-shrink: 0;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 1.5px;
      background: var(--moss);
      transition: transform 0.2s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    .mobile-menu {
      position: fixed; top: 72px; left: 0; right: 0; bottom: 0;
      background: #faf7f2;
      border-bottom: 1px solid rgba(90,122,74,0.15);
      padding: 0 6vw 40px;
      z-index: 99;
      overflow-y: auto;
      transform: translateX(100%);
      visibility: hidden;
      transition: transform 0.3s ease;
    }
    .mobile-menu.open { transform: translateX(0); visibility: visible; }
    .mobile-menu ul { list-style: none; }
    .mobile-menu > ul > li > a,
    .mobile-parent {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0;
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: var(--moss);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.1);
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }

    /* 主內容區 */
    .content {
      flex: 1;
      padding-top: 92px;
      padding-bottom: 60px;
    }

    .blog-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* 標題區 */
    .blog-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .blog-header h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 2.5rem;
      color: var(--moss);
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }
    .blog-header p {
      color: var(--stone);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    /* 標籤檢索區 */
    .tag-search-section {
      background: white;
      border-radius: 40px;
      padding: 20px 28px;
      margin-bottom: 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.03);
      border: 1px solid rgba(90,122,74,0.1);
    }
    .tag-search-title {
      font-size: 0.85rem;
      color: var(--stone);
      letter-spacing: 0.1em;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .tag {
      display: inline-block;
      padding: 6px 18px;
      background: var(--cream);
      color: var(--fern);
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(90,122,74,0.2);
    }
    .tag:hover {
      background: var(--mist);
      transform: translateY(-2px);
    }
    .tag.active {
      background: var(--fern);
      color: white;
      border-color: var(--fern);
    }
    .search-input-group {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .search-input {
      flex: 1;
      padding: 12px 20px;
      border: 1px solid rgba(90,122,74,0.2);
      border-radius: 40px;
      font-size: 0.9rem;
      background: var(--paper);
      transition: all 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--fern);
      background: white;
    }
    .search-btn, .clear-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 40px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .search-btn {
      background: var(--moss);
      color: white;
    }
    .search-btn:hover {
      background: var(--fern);
    }
    .clear-btn {
      background: transparent;
      border: 1px solid var(--stone);
      color: var(--stone);
    }
    .clear-btn:hover {
      background: var(--cream);
    }
    .result-count {
      margin-top: 16px;
      font-size: 0.8rem;
      color: var(--stone);
      text-align: right;
    }

    /* 文章卡片 */
    .post-card {
      background: white;
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      border: 1px solid rgba(90,122,74,0.08);
      transition: all 0.2s;
    }
    .post-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(61,90,56,0.08);
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .post-author {
      font-size: 0.8rem;
      color: var(--sage);
      letter-spacing: 0.05em;
    }
    .post-date {
      font-size: 0.75rem;
      color: var(--stone);
    }
    .post-content {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 20px;
    }
    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(90,122,74,0.1);
    }
    .post-tag {
      display: inline-block;
      padding: 4px 14px;
      background: var(--cream);
      color: var(--fern);
      border-radius: 30px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .post-tag:hover {
      background: var(--mist);
    }

    /* 載入更多 */
    .load-more-section {
      text-align: center;
      margin-top: 40px;
    }
    .load-more-btn {
      padding: 12px 32px;
      background: transparent;
      border: 1px solid var(--fern);
      color: var(--fern);
      border-radius: 40px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .load-more-btn:hover {
      background: var(--fern);
      color: white;
    }
    .load-more-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 空狀態 */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--stone);
    }
    .empty-state i {
      display: block;
      font-size: 48px;
      margin-bottom: 16px;
    }

    /* 載入動畫 */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--fern);
    }
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--mist);
      border-top: 2px solid var(--fern);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Footer */
    footer {
      border-top: 1px solid rgba(90,122,74,0.15);
      padding: 40px 4vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      margin-top: auto;
    }
    .footer-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }
    .footer-links a {
      font-size: 0.75rem;
      color: var(--stone);
      text-decoration: none;
      letter-spacing: 0.08em;
      opacity: 0.7;
    }
    .footer-links a:hover {
      opacity: 1;
      color: var(--fern);
    }
    .footer-copy {
      font-size: 0.75rem;
      color: var(--stone);
    }
    @media (max-width: 768px) {
      footer {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
      .footer-links {
        justify-content: center;
        flex-wrap: wrap;
      }
      .post-card {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="content">
    <div class="blog-container">
      <div class="blog-header">
        <h1>🌿 生活隨筆</h1>
        <p>碳盤查 · ESG · 永續 · 植物與日常</p>
      </div>

      <!-- 標籤檢索區 -->
      <div class="tag-search-section">
        <div class="tag-search-title">
          <i data-lucide="tag" size="16"></i> 探索標籤
        </div>
        <div class="tag-cloud" id="tagCloud"></div>
        <div class="search-input-group">
          <input type="text" id="tagInput" class="search-input" placeholder="輸入 #標籤 或關鍵字..." autocomplete="off">
          <button class="search-btn" onclick="searchByTag()">🔍 檢索</button>
          <button class="clear-btn" onclick="clearSearch()">✕ 清除</button>
        </div>
        <div class="result-count" id="resultCount"></div>
      </div>

      <!-- 文章列表區 -->
      <div id="postsContainer"></div>
      
      <!-- 載入更多按鈕 -->
      <div class="load-more-section" id="loadMoreSection">
        <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">載入更多文章</button>
      </div>
    </div>
  </main>

  <footer>
    <ul class="footer-links">
      <li><a href="#">關於蕨積</a></li>
      <li><a href="#">碳生活專欄</a></li>
      <li><a href="#">ESG 觀點</a></li>
    </ul>
    <p class="footer-copy">© 2026 蕨積 FernBrom · 生活隨筆</p>
  </footer>

  <script>
    // 全域變數
    let allMessages = [];      // 所有文章
    let filteredMessages = []; // 檢索後的文章
    let currentPage = 1;
    const POSTS_PER_PAGE = 3;   // 首頁只顯示 3 篇，檢索後也以 3 篇為一頁
    let currentSearchTag = '';   // 目前檢索的標籤
    
    // 預設標籤列表（可從文章中自動提取，這裡先設定常用標籤）
    const defaultTags = ['#碳盤查', '#ESG', '#永續', '#生活', '#鹿角蕨', '#植物', '#環保', '#碳中和'];
    
    // 從文章中提取所有標籤（支援 #標籤 格式）
    function extractTagsFromText(text) {
      const tagRegex = /#[\u4e00-\u9fa5a-zA-Z0-9]+/g;
      const matches = text.match(tagRegex);
      return matches ? [...new Set(matches)] : [];
    }
    
    // 取得所有文章中的標籤（用於標籤雲）
    function getAllTagsFromMessages(messages) {
      const tagsSet = new Set();
      messages.forEach(msg => {
        const tags = extractTagsFromText(msg.text);
        tags.forEach(tag => tagsSet.add(tag));
      });
      // 加入預設標籤（讓介面更豐富）
      defaultTags.forEach(tag => tagsSet.add(tag));
      return Array.from(tagsSet).sort();
    }
    
    // 渲染標籤雲
    function renderTagCloud(tags, activeTag = '') {
      const container = document.getElementById('tagCloud');
      if (!container) return;
      if (tags.length === 0) {
        container.innerHTML = '<span style="color: var(--stone); font-size:0.8rem;">尚無標籤</span>';
        return;
      }
      container.innerHTML = tags.map(tag => `
        <span class="tag ${activeTag === tag ? 'active' : ''}" onclick="searchByTagText('${tag.replace(/'/g, "\\'")}')">${escapeHtml(tag)}</span>
      `).join('');
    }
    
    // 根據標籤搜尋
    function filterMessagesByTag(tag) {
      if (!tag) return [...allMessages];
      return allMessages.filter(msg => {
        const tags = extractTagsFromText(msg.text);
        return tags.includes(tag);
      });
    }
    
    // 搜尋功能（從輸入框）
    function searchByTag() {
      const input = document.getElementById('tagInput');
      let tag = input.value.trim();
      if (tag && !tag.startsWith('#')) {
        tag = '#' + tag;
      }
      currentSearchTag = tag;
      performSearch(tag);
    }
    
    // 點擊標籤搜尋
    function searchByTagText(tag) {
      currentSearchTag = tag;
      document.getElementById('tagInput').value = tag;
      performSearch(tag);
    }
    
    // 執行搜尋
    function performSearch(tag) {
      if (!tag) {
        filteredMessages = [...allMessages];
        currentSearchTag = '';
      } else {
        filteredMessages = filterMessagesByTag(tag);
      }
      currentPage = 1;
      renderPosts();
      updateTagCloudActive(tag);
      
      // 更新結果計數
      const countSpan = document.getElementById('resultCount');
      if (countSpan) {
        if (tag && filteredMessages.length > 0) {
          countSpan.innerHTML = `📌 找到 ${filteredMessages.length} 篇關於 ${escapeHtml(tag)} 的文章`;
        } else if (tag && filteredMessages.length === 0) {
          countSpan.innerHTML = `🔍 沒有找到關於 ${escapeHtml(tag)} 的文章`;
        } else {
          countSpan.innerHTML = `📖 共 ${allMessages.length} 篇文章`;
        }
      }
    }
    
    // 清除搜尋
    function clearSearch() {
      document.getElementById('tagInput').value = '';
      currentSearchTag = '';
      filteredMessages = [...allMessages];
      currentPage = 1;
      renderPosts();
      updateTagCloudActive('');
      const countSpan = document.getElementById('resultCount');
      if (countSpan) {
        countSpan.innerHTML = `📖 共 ${allMessages.length} 篇文章`;
      }
    }
    
    // 更新標籤雲的 active 狀態
    function updateTagCloudActive(activeTag) {
      const tags = getAllTagsFromMessages(allMessages);
      renderTagCloud(tags, activeTag);
    }
    
    // 載入更多
    function loadMore() {
      const totalPages = Math.ceil(filteredMessages.length / POSTS_PER_PAGE);
      if (currentPage < totalPages) {
        currentPage++;
        renderPosts();
      }
    }
    
    // 取得當前頁面要顯示的文章
    function getCurrentPagePosts() {
      const start = 0;
      const end = currentPage * POSTS_PER_PAGE;
      return filteredMessages.slice(start, end);
    }
    
    // 檢查是否還有更多
    function hasMore() {
      return currentPage * POSTS_PER_PAGE < filteredMessages.length;
    }
    
    // 渲染文章列表
    function renderPosts() {
      const container = document.getElementById('postsContainer');
      const loadMoreBtn = document.getElementById('loadMoreBtn');
      const postsToShow = getCurrentPagePosts();
      
      if (filteredMessages.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i>📭</i>
            <p>${currentSearchTag ? '沒有找到相關標籤的文章' : '目前還沒有任何文章'}</p>
            <p style="font-size:0.8rem; margin-top:8px;">${currentSearchTag ? '試試其他標籤吧！' : '快用 LINE 傳送訊息，加入 #標籤 吧！'}</p>
          </div>
        `;
        loadMoreBtn.style.display = 'none';
        return;
      }
      
      container.innerHTML = postsToShow.map(post => {
        const tags = extractTagsFromText(post.text);
        const displayName = post.displayName || '蕨友';
        const time = new Date(post.timestamp);
        const dateStr = `${time.getFullYear()}.${String(time.getMonth()+1).padStart(2,'0')}.${String(time.getDate()).padStart(2,'0')}`;
        
        return `
          <article class="post-card">
            <div class="post-header">
              <span class="post-author">✍️ ${escapeHtml(displayName)}</span>
              <span class="post-date">📅 ${dateStr}</span>
            </div>
            <div class="post-content">${formatContentWithTags(escapeHtml(post.text))}</div>
            ${tags.length > 0 ? `
              <div class="post-tags">
                ${tags.map(tag => `<span class="post-tag" onclick="searchByTagText('${tag.replace(/'/g, "\\'")}')">${escapeHtml(tag)}</span>`).join('')}
              </div>
            ` : ''}
          </article>
        `;
      }).join('');
      
      // 控制載入更多按鈕
      if (hasMore()) {
        loadMoreBtn.style.display = 'inline-block';
        loadMoreBtn.disabled = false;
      } else {
        loadMoreBtn.style.display = 'none';
      }
    }
    
    // 格式化內容，讓 #標籤 高亮
    function formatContentWithTags(text) {
      return text.replace(/(#[#\u4e00-\u9fa5a-zA-Z0-9]+)/g, '<span style="color: var(--fern); font-weight: 500;">$1</span>');
    }
    
    // 載入所有文章
    async function loadMessages() {
      const container = document.getElementById('postsContainer');
      container.innerHTML = '<div class="loading">載入文章...</div>';
      
      try {
        // 請確認這個 API 網址是否正確
        // 如果是跨專案，請改成完整網址：https://linephotobot.onrender.com/api/messages
        const API_URL = '/api/messages';
        
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const messages = await response.json();
        // 依時間排序（最新的在前）
        allMessages = messages.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        filteredMessages = [...allMessages];
        
        // 更新標籤雲
        const allTags = getAllTagsFromMessages(allMessages);
        renderTagCloud(allTags);
        
        // 顯示結果
        currentPage = 1;
        renderPosts();
        
        const countSpan = document.getElementById('resultCount');
        if (countSpan) {
          countSpan.innerHTML = `📖 共 ${allMessages.length} 篇文章`;
        }
        
      } catch (error) {
        console.error('載入文章失敗:', error);
        container.innerHTML = `
          <div class="empty-state">
            <i>⚠️</i>
            <p>載入失敗，請稍後再試</p>
            <p style="font-size:0.8rem; margin-top:8px;">${error.message}</p>
          </div>
        `;
      }
    }
    
    // 輔助函數
    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
    
    // 初始化導覽列
    document.addEventListener('DOMContentLoaded', function() {
      fetch('nav.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('nav-placeholder').innerHTML = data;
          initNav();
        })
        .catch(err => console.error('無法載入導覽列:', err));
      
      function initNav() {
        const btn = document.getElementById('hamburger');
        const menu = document.getElementById('mobileMenu');
        if (btn && menu) {
          btn.addEventListener('click', () => {
            btn.classList.toggle('open');
            menu.classList.toggle('open');
          });
        }
        window.addEventListener('scroll', () => {
          const nav = document.getElementById('mainNav');
          if (nav) nav.classList.toggle('scrolled', window.scrollY > 20);
        });
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }
      
      // 載入文章
      loadMessages();
    });
    
    // 自動重新整理（每 60 秒）
    setInterval(loadMessages, 60000);
  </script>
</body>
</html>
