<!-- ========== 主要頁面 index.html ========== -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蕨積 — 植物 x 工程 x 碳生活 | LINE 留言板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* ===== 共用樣式 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1a14;
      --moss: #3d5a38;
      --fern: #5a7a4a;
      --sage: #8aab7a;
      --mist: #d4e4c8;
      --cream: #f5f0e8;
      --stone: #9a9080;
      --paper: #faf7f2;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ----- 導覽列 (完整保留) ----- */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4vw; height: 72px;
      background: rgba(250,247,242,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(90,122,74,0.12);
    }
    nav.scrolled { box-shadow: 0 2px 24px rgba(61,90,56,0.10); }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .logo-mark { width: 38px; height: 38px; flex-shrink: 0; }
    .logo-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .logo-text {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--moss);
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }
    .logo-text span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--stone);
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
      white-space: nowrap;
    }
    .nav-links li {
      position: relative;
      padding: 0 2px;
    }
    .nav-links a {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--ink);
      text-decoration: none;
      padding-bottom: 3px;
      opacity: 0.75;
      display: inline-block;
    }
    .nav-links a:hover {
      opacity: 1;
      color: var(--fern);
    }
    .nav-contact {
      padding: 8px 20px !important;
      border: 1px solid var(--fern) !important;
      border-radius: 2px;
      color: var(--fern) !important;
      opacity: 1 !important;
      margin-left: 0.5rem;
    }
    .nav-contact:hover {
      background: var(--fern);
      color: white !important;
    }
    .has-dropdown > a::after { display: none; }

    .nav-links li .dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 18px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(250,247,242,0.98);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(90,122,74,0.14);
      border-top: 2px solid var(--fern);
      box-shadow: 0 12px 40px rgba(61,90,56,0.12);
      min-width: 148px;
      list-style: none;
      padding: 8px 0;
      z-index: 300;
    }
    .nav-links li:hover .dropdown,
    .nav-links li:focus-within .dropdown {
      display: block;
    }
    .nav-links li .dropdown::before {
      content: '';
      position: absolute;
      top: -7px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 6px solid var(--fern);
    }
    .dropdown li a {
      display: block;
      padding: 10px 20px;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--ink);
      opacity: 0.7;
      white-space: nowrap;
      text-decoration: none;
    }
    .dropdown li a:hover {
      opacity: 1;
      color: var(--fern);
      padding-left: 26px;
      background: rgba(90,122,74,0.04);
    }
    .dropdown li + li { border-top: 1px solid rgba(90,122,74,0.08); }

    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      width: 40px; height: 40px;
      cursor: pointer;
      background: none; border: none;
      flex-shrink: 0;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 1.5px;
      background: var(--moss);
      transition: transform 0.2s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    .mobile-menu {
      position: fixed; top: 72px; left: 0; right: 0; bottom: 0;
      background: #faf7f2;
      border-bottom: 1px solid rgba(90,122,74,0.15);
      padding: 0 6vw 40px;
      z-index: 99;
      overflow-y: auto;
      transform: translateX(100%);
      visibility: hidden;
      transition: transform 0.3s ease;
    }
    .mobile-menu.open { transform: translateX(0); visibility: visible; }
    .mobile-menu ul { list-style: none; }
    .mobile-menu > ul > li > a,
    .mobile-parent {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0;
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: var(--moss);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.1);
      cursor: pointer;
    }
    .mobile-parent:hover, .mobile-menu > ul > li > a:hover { color: var(--fern); }
    .mobile-caret { display: inline-block; transition: transform 0.2s; }
    .mobile-caret.open { transform: rotate(180deg); }
    .mobile-sub {
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .mobile-sub.open { max-height: 200px; }
    .mobile-sub li a {
      display: block;
      padding: 11px 0 11px 16px;
      font-size: 0.85rem;
      color: var(--stone);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.06);
      letter-spacing: 0.06em;
    }
    .mobile-sub li a:hover { color: var(--fern); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }

    /* ----- 頁面內容區域 ----- */
    .content {
      flex: 1;
      padding-top: 92px; /* 72px nav + 20px 間距 */
      padding-bottom: 40px;
    }

    /* ===== 留言板專屬樣式（不影響原有樣式） ===== */
    .message-board {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .message-board-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .message-board-header h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 2.2rem;
      color: var(--moss);
      margin-bottom: 12px;
      font-weight: 600;
    }
    
    .message-board-header p {
      color: var(--stone);
      font-size: 0.95rem;
      letter-spacing: 0.05em;
    }
    
    .refresh-btn {
      display: block;
      width: 140px;
      margin: 0 auto 30px auto;
      padding: 10px 20px;
      background: var(--moss);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Noto Sans TC', sans-serif;
    }
    
    .refresh-btn:hover {
      background: var(--fern);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(61,90,56,0.2);
    }
    
    .refresh-btn:active {
      transform: translateY(0);
    }
    
    .messages-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      overflow: hidden;
      border: 1px solid rgba(90,122,74,0.1);
    }
    
    .message-item {
      padding: 24px;
      border-bottom: 1px solid rgba(90,122,74,0.08);
      transition: background-color 0.2s;
    }
    
    .message-item:hover {
      background-color: rgba(90,122,74,0.02);
    }
    
    .message-item:last-child {
      border-bottom: none;
    }
    
    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .message-user {
      font-weight: 600;
      color: var(--fern);
      font-size: 1rem;
      font-family: 'Noto Serif TC', serif;
    }
    
    .message-time {
      color: var(--stone);
      font-size: 0.75rem;
      font-family: 'Noto Sans TC', sans-serif;
    }
    
    .message-text {
      color: var(--ink);
      line-height: 1.6;
      font-size: 1rem;
      word-break: break-word;
      white-space: pre-wrap;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--stone);
      font-size: 1rem;
    }
    
    .empty-state i {
      display: block;
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--fern);
      font-size: 1rem;
    }
    
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--mist);
      border-top: 2px solid var(--fern);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .message-count {
      text-align: center;
      margin-top: 24px;
      color: var(--stone);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }
    
    @media (max-width: 768px) {
      .message-board {
        padding: 16px;
      }
      
      .message-board-header h1 {
        font-size: 1.6rem;
      }
      
      .message-item {
        padding: 18px;
      }
      
      .message-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    /* ----- Footer (完整保留) ----- */
    footer {
      border-top: 1px solid rgba(90,122,74,0.15);
      padding: 40px 4vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      margin-top: auto;
    }
    .footer-logo {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--moss);
      letter-spacing: 0.05em;
    }
    .footer-copy {
      font-size: 0.75rem;
      color: var(--stone);
      letter-spacing: 0.1em;
    }
    .footer-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }
    .footer-links a {
      font-size: 0.75rem;
      color: var(--stone);
      text-decoration: none;
      letter-spacing: 0.08em;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .footer-links a:hover {
      opacity: 1;
      color: var(--fern);
    }
    @media (max-width: 768px) {
      footer {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
      .footer-links {
        justify-content: center;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <!-- 放置導覽列的佔位元素 -->
  <div id="nav-placeholder"></div>

  <!-- 頁面主要內容區域 - 嵌入留言板 -->
  <main class="content">
    <div class="message-board">
      <div class="message-board-header">
        <h1>📝 蕨望留言板</h1>
        <p>來自 LINE 社群的真實聲音</p>
      </div>
      
      <button class="refresh-btn" onclick="loadMessages()">⟳ 重新整理</button>
      
      <div class="messages-container" id="messagesContainer">
        <div class="loading">載入留言中...</div>
      </div>
      
      <div class="message-count" id="messageCount"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <ul class="footer-links">
      <li><a href="#">植物選品</a></li>
      <li><a href="#">綠色顧問</a></li>
      <li><a href="#">蕨望筆記</a></li>
      <li><a href="#">關於蕨積</a></li>
    </ul>
    <p class="footer-copy">© 2026 蕨積 FernBrom . All rights reserved.</p>
  </footer>

  <script>
    // ===== 留言板功能 =====
    async function loadMessages() {
      const container = document.getElementById('messagesContainer');
      const countSpan = document.getElementById('messageCount');
      
      container.innerHTML = '<div class="loading">載入留言中...</div>';
      
      try {
        // 這裡要改成你的 LINE Webhook 後端網址
        // 如果是同一個專案，直接寫 /api/messages
        // 如果是不同專案，請改成完整的網址，例如：
        // https://你的專案A名稱.onrender.com/api/messages
        const API_URL = 'https://linephotobot.onrender.com/api/messages';
        
        const response = await fetch(API_URL);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const messages = await response.json();
        
        if (messages.length === 0) {
          container.innerHTML = '<div class="empty-state"><i>📭</i><br>目前還沒有任何留言<br>快用 LINE 傳送訊息給我們吧！</div>';
          countSpan.textContent = '共 0 則留言';
          return;
        }
        
        // 依時間排序（新的在前）
        messages.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        
        container.innerHTML = messages.map(msg => `
          <div class="message-item">
            <div class="message-header">
              <span class="message-user">${escapeHtml(msg.displayName || '蕨友')}</span>
              <span class="message-time">${formatTime(msg.timestamp)}</span>
            </div>
            <div class="message-text">${escapeHtml(msg.text)}</div>
          </div>
        `).join('');
        
        countSpan.textContent = `共 ${messages.length} 則留言`;
        
      } catch (error) {
        console.error('載入留言失敗:', error);
        container.innerHTML = '<div class="empty-state" style="color: #ff6b6b;"><i>⚠️</i><br>載入留言失敗，請稍後再試</div>';
        countSpan.textContent = '';
      }
    }
    
    // 格式化時間顯示
    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMins / 60);
      const diffDays = Math.floor(diffHours / 24);
      
      if (diffMins < 1) {
        return '剛剛';
      } else if (diffMins < 60) {
        return `${diffMins} 分鐘前`;
      } else if (diffHours < 24) {
        return `${diffHours} 小時前`;
      } else if (diffDays < 7) {
        return `${diffDays} 天前`;
      } else {
        return date.toLocaleString('zh-TW', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        });
      }
    }
    
    // Escape HTML 特殊字元
    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
    
    // 導覽列初始化（保持原有功能）
    document.addEventListener('DOMContentLoaded', function () {
      // 載入共用導覽列
      fetch('nav.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('nav-placeholder').innerHTML = data;
          initNav();
        })
        .catch(err => {
          console.error('無法載入導覽列:', err);
          document.getElementById('nav-placeholder').innerHTML = 
            '<nav style="background:var(--moss);color:white;padding:0 4vw;height:72px;display:flex;align-items:center;">' +
            '<span style="font-family:Noto Serif TC,serif;font-weight:900;">⚠️ 導覽列載入失敗，請確認 nav.html 是否存在</span>' +
            '</nav>';
        });

      function initNav() {
        // hamburger 事件
        var btn = document.getElementById('hamburger');
        var menu = document.getElementById('mobileMenu');
        if (btn && menu) {
          btn.addEventListener('click', function () {
            btn.classList.toggle('open');
            menu.classList.toggle('open');
          });
          menu.querySelectorAll('.mobile-link').forEach(function (a) {
            a.addEventListener('click', function () {
              btn.classList.remove('open');
              menu.classList.remove('open');
            });
          });
        }
        // 行動選單的展開折疊
        if (menu) {
          menu.querySelectorAll('.mobile-parent').forEach(function (parent) {
            parent.addEventListener('click', function () {
              var id = parent.getAttribute('data-target');
              var sub = document.getElementById(id);
              var caretId = 'caret-' + id.replace('sub-', '');
              var caret = document.getElementById(caretId);
              var opening = !sub.classList.contains('open');
              menu.querySelectorAll('.mobile-sub').forEach(function (s) { s.classList.remove('open'); });
              menu.querySelectorAll('.mobile-caret').forEach(function (c) { c.classList.remove('open'); });
              if (opening) {
                sub.classList.add('open');
                if (caret) caret.classList.add('open');
              }
            });
          });
        }
        // 滾動效果
        window.addEventListener('scroll', function () {
          var nav = document.getElementById('mainNav');
          if (nav) nav.classList.toggle('scrolled', window.scrollY > 20);
        });
        // 重新綁定 lucide 圖示
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }
      
      // 載入留言板資料
      loadMessages();
    });
    
    // 自動重新整理（每30秒）
    setInterval(loadMessages, 30000);
  </script>
</body>
</html>
