<!-- ========== 主要頁面 index.html ========== -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>蕨積 AI 智能客服助手 | 蕨積</title>
  <meta name="description" content="蕨積 AI 智能客服助手 — 植物問題、植生牆顧問、溫室氣體盤查顧問、生活提案合作">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
  <style>
    /* ===== 共用樣式 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1a14;
      --moss: #3d5a38;
      --fern: #5a7a4a;
      --sage: #8aab7a;
      --mist: #d4e4c8;
      --cream: #f5f0e8;
      --stone: #9a9080;
      --paper: #faf7f2;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ----- 導覽列樣式 ----- */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4vw; height: 72px;
      background: rgba(250,247,242,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(90,122,74,0.12);
    }
    nav.scrolled { box-shadow: 0 2px 24px rgba(61,90,56,0.10); }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .logo-mark { width: 38px; height: 38px; flex-shrink: 0; }
    .logo-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .logo-text {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--moss);
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }
    .logo-text span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--stone);
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
      white-space: nowrap;
    }
    .nav-links li { position: relative; padding: 0 2px; }
    .nav-links a {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--ink);
      text-decoration: none;
      padding-bottom: 3px;
      opacity: 0.75;
      display: inline-block;
    }
    .nav-links a:hover { opacity: 1; color: var(--fern); }
    .nav-contact {
      padding: 8px 20px !important;
      border: 1px solid var(--fern) !important;
      border-radius: 2px;
      color: var(--fern) !important;
      opacity: 1 !important;
      margin-left: 0.5rem;
    }
    .nav-contact:hover { background: var(--fern); color: white !important; }

    .nav-links li .dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 18px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(250,247,242,0.98);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(90,122,74,0.14);
      border-top: 2px solid var(--fern);
      box-shadow: 0 12px 40px rgba(61,90,56,0.12);
      min-width: 148px;
      list-style: none;
      padding: 8px 0;
      z-index: 300;
    }
    .nav-links li:hover .dropdown,
    .nav-links li:focus-within .dropdown { display: block; }
    .nav-links li .dropdown::before {
      content: '';
      position: absolute;
      top: -7px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 6px solid var(--fern);
    }
    .dropdown li a {
      display: block;
      padding: 10px 20px;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--ink);
      opacity: 0.7;
      white-space: nowrap;
      text-decoration: none;
    }
    .dropdown li a:hover {
      opacity: 1;
      color: var(--fern);
      padding-left: 26px;
      background: rgba(90,122,74,0.04);
    }
    .dropdown li + li { border-top: 1px solid rgba(90,122,74,0.08); }

    .cart-nav-item {
      margin-left: 0.25rem;
    }
    .cart-icon-wrapper {
      display: flex;
      align-items: center;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 40px;
      background: rgba(90,122,74,0.08);
      transition: all 0.2s ease;
    }
    .cart-icon-wrapper:hover { background: rgba(90,122,74,0.15); }
    .cart-icon { font-size: 1.2rem; line-height: 1; }

    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      width: 40px; height: 40px;
      cursor: pointer;
      background: none; border: none;
      flex-shrink: 0;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 1.5px;
      background: var(--moss);
      transition: transform 0.2s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    .mobile-menu {
      position: fixed; top: 72px; left: 0; right: 0; bottom: 0;
      background: #faf7f2;
      border-bottom: 1px solid rgba(90,122,74,0.15);
      padding: 0 6vw 40px;
      z-index: 99;
      overflow-y: auto;
      transform: translateX(100%);
      visibility: hidden;
      transition: transform 0.3s ease;
    }
    .mobile-menu.open { transform: translateX(0); visibility: visible; }
    .mobile-menu ul { list-style: none; }
    .mobile-menu > ul > li > a,
    .mobile-parent {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0;
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: var(--moss);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.1);
      cursor: pointer;
    }
    .mobile-parent:hover, .mobile-menu > ul > li > a:hover { color: var(--fern); }
    .mobile-caret { display: inline-block; transition: transform 0.2s; }
    .mobile-caret.open { transform: rotate(180deg); }
    .mobile-sub {
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .mobile-sub.open { max-height: 200px; }
    .mobile-sub li a {
      display: block;
      padding: 11px 0 11px 16px;
      font-size: 0.85rem;
      color: var(--stone);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.06);
      letter-spacing: 0.06em;
    }
    .mobile-sub li a:hover { color: var(--fern); }
    .mobile-cart-item {
      margin-top: 12px;
      border-top: 1px solid rgba(90,122,74,0.15);
      padding-top: 12px;
    }
    .cart-mobile-link {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      background: rgba(90,122,74,0.08);
      border-radius: 40px;
      padding: 12px 16px !important;
      font-weight: 500;
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .cart-nav-item { display: none; }
    }
    @media (min-width: 769px) {
      .mobile-cart-item { display: none; }
    }

    /* ===== 頁面內容區域 ===== */
    .content {
      flex: 1;
      padding-top: 92px;
      padding-bottom: 40px;
    }

    /* ===== 聊天室模組樣式 ===== */
    .chat-section {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .chat-container {
      background: var(--cream);
      border-radius: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      border: 1px solid rgba(90, 122, 74, 0.15);
    }

    .chat-messages {
      height: 500px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f5f0e8;
    }

    .message {
      display: flex;
      max-width: 85%;
    }
    .message.user { align-self: flex-end; }
    .message.bot { align-self: flex-start; }

    .message-content {
      padding: 10px 14px;
      border-radius: 20px;
      word-wrap: break-word;
      font-size: 0.9rem;
      line-height: 1.4;
      max-width: 100%;
    }
    .user .message-content {
      background: linear-gradient(135deg, var(--moss) 0%, var(--fern) 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bot .message-content {
      background: white;
      color: var(--ink);
      border-bottom-left-radius: 4px;
      border: 1px solid #e0d6c5;
    }

    /* 輸入區域 */
    .chat-input-area {
      display: flex;
      flex-direction: column;
      padding: 16px;
      background: white;
      border-top: 1px solid #e0d6c5;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .chat-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd0bc;
      border-radius: 30px;
      outline: none;
      font-size: 0.9rem;
      background: #fffef8;
      font-family: inherit;
      min-width: 120px;
    }
    .chat-input:focus { border-color: var(--fern); }

    .action-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .send-button {
      padding: 10px 24px;
      background: linear-gradient(135deg, var(--moss) 0%, var(--fern) 100%);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .send-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* 底部功能按鈕 */
    .bottom-btn {
      background: none;
      border: 1px solid #ddd0bc;
      border-radius: 30px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--stone);
      transition: all 0.2s;
    }
    .bottom-btn:hover {
      background: var(--mist);
      border-color: var(--fern);
      color: var(--fern);
    }

    .system-message {
      text-align: center;
      font-size: 0.7rem;
      color: var(--stone);
      padding: 8px;
      font-style: italic;
    }

    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 450px;
      text-align: center;
      padding: 20px;
    }
    .login-icon { font-size: 64px; margin-bottom: 20px; }
    .login-btn {
      margin-top: 24px;
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--moss) 0%, var(--fern) 100%);
      color: white;
      border: none;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    /* 歷史記錄側邊欄 */
    .history-sidebar {
      position: fixed;
      left: -320px;
      top: 72px;
      width: 320px;
      height: calc(100vh - 72px);
      background: var(--paper);
      border-right: 1px solid rgba(90, 122, 74, 0.15);
      box-shadow: 2px 0 12px rgba(0, 0, 0, 0.05);
      transition: left 0.3s ease;
      z-index: 98;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .history-sidebar.open { left: 0; }
    .history-header {
      padding: 20px;
      border-bottom: 1px solid rgba(90, 122, 74, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-header h3 {
      font-family: 'Noto Serif TC', serif;
      color: var(--moss);
      font-size: 1rem;
    }
    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .history-item {
      padding: 12px;
      border-bottom: 1px solid rgba(90, 122, 74, 0.08);
      cursor: pointer;
      transition: background 0.2s;
    }
    .history-item:hover { background: rgba(90, 122, 74, 0.05); }
    .history-question {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .history-time {
      font-size: 0.7rem;
      color: var(--stone);
    }
    .history-overlay {
      position: fixed;
      top: 72px;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 97;
      display: none;
    }
    .history-overlay.open { display: block; }

    /* 小螢幕優化 */
    @media (max-width: 600px) {
      .chat-section { padding: 0 12px 20px; }
      .chat-messages { height: 400px; }
      .input-row { flex-direction: column; align-items: stretch; }
      .chat-input { width: 100%; }
      .action-buttons { justify-content: flex-end; }
      .history-sidebar { width: 100%; left: -100%; }
    }

    /* Footer */
    footer {
      border-top: 1px solid rgba(90,122,74,0.15);
      padding: 40px 4vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      margin-top: auto;
    }
    .footer-copy {
      font-size: 0.75rem;
      color: var(--stone);
      letter-spacing: 0.1em;
    }
    .footer-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }
    .footer-links a {
      font-size: 0.75rem;
      color: var(--stone);
      text-decoration: none;
      letter-spacing: 0.08em;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .footer-links a:hover {
      opacity: 1;
      color: var(--fern);
    }
    @media (max-width: 768px) {
      footer {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
      .footer-links {
        justify-content: center;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <!-- 歷史記錄遮罩 -->
  <div class="history-overlay" id="historyOverlay"></div>

  <!-- 歷史記錄側邊欄 -->
  <div class="history-sidebar" id="historySidebar">
    <div class="history-header">
      <h3>📋 對話記錄</h3>
      <button class="bottom-btn" id="closeHistory" style="background: none; padding: 4px 12px;">✕</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="system-message">尚無對話記錄</div>
    </div>
    <div style="padding: 12px;">
      <button class="bottom-btn" id="clearHistory" style="background: var(--mist); color: var(--moss); width: 100%; justify-content: center;">清除所有記錄</button>
    </div>
  </div>

  <!-- 頁面主要內容區域 -->
  <main class="content">
    <div class="chat-section">
      <div class="chat-container">
        <div class="chat-messages" id="messages">
          <div class="message bot">
            <div class="message-content">嗨！我是蕨積智能AI客服 🌿<br>請輸入問題 勿留任何個資於此 謝謝~~</div>
          </div>
        </div>

        <div class="chat-input-area">
          <div class="input-row">
            <input type="text" class="chat-input" id="input" placeholder="輸入訊息..." disabled>
            <div class="action-buttons">
              <button class="bottom-btn" id="historyBtn" title="對話記錄">📋 記錄</button>
              <button class="bottom-btn" id="logoutBtn" title="登出">🚪 登出</button>
              <button class="send-button" id="sendBtn" disabled>發送</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <ul class="footer-links">
      <li><a href="shop.html">植物選品</a></li>
      <li><a href="consult.html">綠色顧問</a></li>
      <li><a href="fbnote.html">蕨望筆記</a></li>
      <li><a href="about.html">關於蕨積</a></li>
    </ul>
    <p class="footer-copy">© 2026 蕨積 FernBrom . All rights reserved.</p>
  </footer>

  <script>
    // ========== 設定 ==========
    const API_BASE = 'https://fernbrom.onrender.com';
    const LIFF_ID = '2009770025-8rQ8gcnq';
    
    // ========== 全域變數 ==========
    let lineUserId = null;
    let isWaiting = false;
    let pollInterval = null;
    let chatHistory = [];
    
    // ========== DOM 元素 ==========
    const messagesDiv = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const historyBtn = document.getElementById('historyBtn');
    const historySidebar = document.getElementById('historySidebar');
    const historyOverlay = document.getElementById('historyOverlay');
    const closeHistory = document.getElementById('closeHistory');
    const clearHistoryBtn = document.getElementById('clearHistory');
    const historyList = document.getElementById('historyList');
    
    // ========== 輔助函式 ==========
    function addSystemMessage(text, isError = false) {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'system-message';
      if (isError) msgDiv.style.color = '#c62828';
      msgDiv.innerText = text;
      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function addMessage(text, sender, isTemp = false) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.innerHTML = text.replace(/\n/g, '<br>');
      messageDiv.appendChild(contentDiv);
      
      if (isTemp) messageDiv.id = 'temp-message';
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      return messageDiv;
    }
    
    function saveHistory() {
      localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
      renderHistory();
    }
    
    function loadHistory() {
      const saved = localStorage.getItem('chatHistory');
      if (saved) {
        chatHistory = JSON.parse(saved);
        renderHistory();
      }
    }
    
    function renderHistory() {
      if (!historyList) return;
      if (chatHistory.length === 0) {
        historyList.innerHTML = '<div class="system-message">尚無對話記錄</div>';
        return;
      }
      
      historyList.innerHTML = '';
      chatHistory.slice().reverse().forEach((item) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
          <div class="history-question">${escapeHtml(item.question.substring(0, 50))}${item.question.length > 50 ? '...' : ''}</div>
          <div class="history-time">${item.time}</div>
        `;
        div.onclick = () => {
          inputEl.value = item.question;
          closeHistoryPanel();
        };
        historyList.appendChild(div);
      });
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function addToHistory(question, answer) {
      const now = new Date();
      const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
      chatHistory.unshift({
        question: question,
        answer: answer,
        time: timeStr,
        timestamp: now.getTime()
      });
      if (chatHistory.length > 50) chatHistory.pop();
      saveHistory();
    }
    
    function clearHistory() {
      if (confirm('確定要清除所有對話記錄嗎？')) {
        chatHistory = [];
        saveHistory();
        addSystemMessage('已清除對話記錄');
      }
    }
    
    function openHistoryPanel() {
      historySidebar.classList.add('open');
      historyOverlay.classList.add('open');
    }
    
    function closeHistoryPanel() {
      historySidebar.classList.remove('open');
      historyOverlay.classList.remove('open');
    }
    
    function startPolling() {
      if (pollInterval) clearInterval(pollInterval);
      
      pollInterval = setInterval(async () => {
        if (!lineUserId) return;
        try {
          const res = await fetch(`${API_BASE}/webchat/reply?user_id=${lineUserId}`);
          const data = await res.json();
          
          if (data.has_reply) {
            const tempMsg = document.getElementById('temp-message');
            if (tempMsg) tempMsg.remove();
            
            addMessage(data.reply, 'bot');
            isWaiting = false;
            sendBtn.disabled = false;
          }
        } catch (err) {
          console.error('輪詢錯誤:', err);
        }
      }, 1500);
    }
    
    async function sendMessage() {
      if (!lineUserId) {
        alert('請先登入 LINE');
        return;
      }
      
      const message = inputEl.value.trim();
      if (!message || isWaiting) return;
      
      addMessage(message, 'user');
      addToHistory(message, '');
      inputEl.value = '';
      
      isWaiting = true;
      sendBtn.disabled = true;
      addMessage('🌿 蕨積思考中...', 'bot', true);
      
      try {
        const res = await fetch(`${API_BASE}/webchat/send`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: lineUserId, message: message })
        });
        const data = await res.json();
        
        if (!data.success) {
          const tempMsg = document.getElementById('temp-message');
          if (tempMsg) tempMsg.remove();
          addMessage(`❌ ${data.error || '發送失敗'}`, 'bot');
          isWaiting = false;
          sendBtn.disabled = false;
        }
      } catch (err) {
        console.error(err);
        const tempMsg = document.getElementById('temp-message');
        if (tempMsg) tempMsg.remove();
        addMessage('❌ 網路錯誤，請稍後再試', 'bot');
        isWaiting = false;
        sendBtn.disabled = false;
      }
    }
    
    async function initLIFF() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          showLoginScreen();
          return;
        }
        
        const idToken = liff.getIDToken();
        if (!idToken) {
          addSystemMessage('無法取得授權，請重新登入', true);
          liff.logout();
          liff.login();
          return;
        }
        
        const payload = JSON.parse(atob(idToken.split('.')[1]));
        const correctUserId = payload.sub;
        if (!correctUserId.startsWith('U')) {
          addSystemMessage('使用者 ID 格式錯誤，請重新登入', true);
          liff.logout();
          liff.login();
          return;
        }
        
        lineUserId = correctUserId;
        console.log('✅ 使用者 ID:', lineUserId);
        
        addSystemMessage('✅ 已連線，開始對話吧！');
        inputEl.disabled = false;
        sendBtn.disabled = false;
        
        loadHistory();
        startPolling();
        
      } catch (err) {
        console.error('LIFF 錯誤:', err);
        addSystemMessage('連線失敗，請重新整理頁面', true);
      }
    }
    
    function showLoginScreen() {
      messagesDiv.innerHTML = '';
      const container = document.createElement('div');
      container.className = 'login-container';
      container.innerHTML = `
        <div class="login-icon"><img src="favicon-96x96.png">🌿</div>
        <div style="font-weight: bold; margin-bottom: 8px;">歡迎使用蕨積AI智能客服</div>
        <div style="font-size: 14px; color: #5a6e3f;">登入後即可開始專業對話</div>
        <button class="login-btn" id="lineLoginBtn">🔐 使用 LINE 登入</button>
      `;
      messagesDiv.appendChild(container);
      document.getElementById('lineLoginBtn').onclick = () => liff.login();
    }
    
    function handleLogout() {
      if (confirm('確定要登出嗎？下次需要重新登入 LINE。')) {
        liff.logout();
        setTimeout(() => location.reload(), 300);
      }
    }
    
    // ========== 導覽列初始化 ==========
    function initNav() {
      const btn = document.getElementById('hamburger');
      const menu = document.getElementById('mobileMenu');
      if (btn && menu) {
        btn.addEventListener('click', function () {
          btn.classList.toggle('open');
          menu.classList.toggle('open');
        });
        const allMobileLinks = menu.querySelectorAll('.mobile-link, .mobile-sub a');
        allMobileLinks.forEach(link => {
          link.addEventListener('click', () => {
            btn.classList.remove('open');
            menu.classList.remove('open');
          });
        });
      }
      
      if (menu) {
        const mobileParents = menu.querySelectorAll('.mobile-parent');
        mobileParents.forEach(parent => {
          parent.addEventListener('click', function () {
            const targetId = parent.getAttribute('data-target');
            const sub = document.getElementById(targetId);
            const caretId = 'caret-' + targetId?.replace('sub-', '');
            const caret = document.getElementById(caretId);
            const opening = sub && !sub.classList.contains('open');
            
            menu.querySelectorAll('.mobile-sub').forEach(s => s.classList.remove('open'));
            menu.querySelectorAll('.mobile-caret').forEach(c => c.classList.remove('open'));
            
            if (opening && sub) {
              sub.classList.add('open');
              if (caret) caret.classList.add('open');
            }
          });
        });
      }
      
      const mainNav = document.getElementById('mainNav');
      if (mainNav) {
        window.addEventListener('scroll', () => {
          mainNav.classList.toggle('scrolled', window.scrollY > 20);
        });
      }
      
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }
    
    // ========== 載入導覽列 ==========
    document.addEventListener('DOMContentLoaded', function () {
      fetch('nav.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('nav-placeholder').innerHTML = data;
          initNav();
        })
        .catch(err => {
          console.error('無法載入導覽列:', err);
          document.getElementById('nav-placeholder').innerHTML = 
            '<nav style="background:rgba(250,247,242,0.96);border-bottom:1px solid rgba(90,122,74,0.12);padding:0 4vw;height:72px;display:flex;align-items:center;justify-content:space-between;">' +
            '<div class="logo" style="display:flex;align-items:center;gap:10px;"><div class="logo-mark"><svg width="38" height="38" viewBox="0 0 40 40" fill="none" stroke="#3d5a38" stroke-width="1.2"><path d="M12,20 L20,8 L28,20 L20,32 Z" fill="#d4e4c8"/><circle cx="20" cy="20" r="4" fill="#5a7a4a"/></svg></div><div class="logo-text">蕨積<span>FERNBROM</span></div></div>' +
            '<button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>' +
            '</nav>' +
            '<div class="mobile-menu" id="mobileMenu"><ul><li><a href="index.html">首頁</a></li><li><a href="consult.html">綠色顧問</a></li><li><a href="lifestyle.html">生活提案</a></li></ul></div>';
          initNav();
        });
      
      // 綁定聊天室事件
      sendBtn.addEventListener('click', sendMessage);
      inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !inputEl.disabled) sendMessage();
      });
      logoutBtn.addEventListener('click', handleLogout);
      historyBtn.addEventListener('click', openHistoryPanel);
      closeHistory.addEventListener('click', closeHistoryPanel);
      historyOverlay.addEventListener('click', closeHistoryPanel);
      clearHistoryBtn.addEventListener('click', clearHistory);
      
      initLIFF();
    });
  </script>
</body>
</html>
