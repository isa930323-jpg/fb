<!-- ========== 主要頁面 index.html ========== -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>蕨積 — 植物 x 工程 x 碳生活</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
  <style>
    /* ===== 共用樣式 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1a14;
      --moss: #3d5a38;
      --fern: #5a7a4a;
      --sage: #8aab7a;
      --mist: #d4e4c8;
      --cream: #f5f0e8;
      --stone: #9a9080;
      --paper: #faf7f2;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ----- 導覽列 ----- */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4vw; height: 72px;
      background: rgba(250,247,242,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(90,122,74,0.12);
    }
    nav.scrolled { box-shadow: 0 2px 24px rgba(61,90,56,0.10); }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .logo-mark { width: 38px; height: 38px; flex-shrink: 0; }
    .logo-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .logo-text {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--moss);
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }
    .logo-text span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--stone);
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
      white-space: nowrap;
    }
    .nav-links li {
      position: relative;
      padding: 0 2px;
    }
    .nav-links a {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--ink);
      text-decoration: none;
      padding-bottom: 3px;
      opacity: 0.75;
      display: inline-block;
    }
    .nav-links a:hover {
      opacity: 1;
      color: var(--fern);
    }
    .nav-contact {
      padding: 8px 20px !important;
      border: 1px solid var(--fern) !important;
      border-radius: 2px;
      color: var(--fern) !important;
      opacity: 1 !important;
      margin-left: 0.5rem;
    }
    .nav-contact:hover {
      background: var(--fern);
      color: white !important;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      width: 40px; height: 40px;
      cursor: pointer;
      background: none; border: none;
      flex-shrink: 0;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 1.5px;
      background: var(--moss);
      transition: transform 0.2s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    .mobile-menu {
      position: fixed; top: 72px; left: 0; right: 0; bottom: 0;
      background: #faf7f2;
      border-bottom: 1px solid rgba(90,122,74,0.15);
      padding: 0 6vw 40px;
      z-index: 99;
      overflow-y: auto;
      transform: translateX(100%);
      visibility: hidden;
      transition: transform 0.3s ease;
    }
    .mobile-menu.open { transform: translateX(0); visibility: visible; }
    .mobile-menu ul { list-style: none; }
    .mobile-menu > ul > li > a,
    .mobile-parent {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0;
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: var(--moss);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.1);
      cursor: pointer;
    }
    .mobile-sub {
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .mobile-sub.open { max-height: 200px; }
    .mobile-sub li a {
      display: block;
      padding: 11px 0 11px 16px;
      font-size: 0.85rem;
      color: var(--stone);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.06);
      letter-spacing: 0.06em;
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }

    /* ===== 聊天室模組樣式 ===== */
    .chat-section {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .chat-container {
      background: var(--cream);
      border-radius: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      border: 1px solid rgba(90, 122, 74, 0.15);
    }

    .chat-header {
      background: linear-gradient(135deg, var(--moss) 0%, var(--fern) 100%);
      color: white;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chat-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .chat-actions {
      display: flex;
      gap: 8px;
    }

    .chat-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: background 0.2s;
    }

    .chat-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* 歷史記錄側邊欄 */
    .history-sidebar {
      position: fixed;
      left: -320px;
      top: 72px;
      width: 320px;
      height: calc(100vh - 72px);
      background: var(--paper);
      border-right: 1px solid rgba(90, 122, 74, 0.15);
      box-shadow: 2px 0 12px rgba(0, 0, 0, 0.05);
      transition: left 0.3s ease;
      z-index: 98;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .history-sidebar.open {
      left: 0;
    }

    .history-header {
      padding: 20px;
      border-bottom: 1px solid rgba(90, 122, 74, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-header h3 {
      font-family: 'Noto Serif TC', serif;
      color: var(--moss);
      font-size: 1rem;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .history-item {
      padding: 12px;
      border-bottom: 1px solid rgba(90, 122, 74, 0.08);
      cursor: pointer;
      transition: background 0.2s;
    }

    .history-item:hover {
      background: rgba(90, 122, 74, 0.05);
    }

    .history-question {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-time {
      font-size: 0.7rem;
      color: var(--stone);
    }

    /* 聊天訊息區域 */
    .chat-messages {
      height: 450px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f5f0e8;
    }

    .message {
      display: flex;
      max-width: 85%;
    }

    .message.user {
      align-self: flex-end;
    }

    .message.bot {
      align-self: flex-start;
    }

    .message-content {
      padding: 10px 14px;
      border-radius: 20px;
      word-wrap: break-word;
      font-size: 0.9rem;
      line-height: 1.4;
      max-width: 100%;
    }

    .user .message-content {
      background: linear-gradient(135deg, var(--moss) 0%, var(--fern) 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot .message-content {
      background: white;
      color: var(--ink);
      border-bottom-left-radius: 4px;
      border: 1px solid #e0d6c5;
    }

    /* 圖片訊息樣式 */
    .message-image {
      max-width: 200px;
      max-height: 200px;
      border-radius: 12px;
      margin-top: 8px;
      cursor: pointer;
    }

    /* 輸入區域 */
    .chat-input-area {
      display: flex;
      flex-direction: column;
      padding: 16px;
      background: white;
      border-top: 1px solid #e0d6c5;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd0bc;
      border-radius: 30px;
      outline: none;
      font-size: 0.9rem;
      background: #fffef8;
      font-family: inherit;
    }

    .chat-input:focus {
      border-color: var(--fern);
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: none;
      border: 1px solid #ddd0bc;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      color: var(--stone);
    }

    .icon-btn:hover {
      background: var(--mist);
      border-color: var(--fern);
      color: var(--fern);
    }

    .send-button {
      padding: 10px 24px;
      background: linear-gradient(135deg, var(--moss) 0%, var(--fern) 100%);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .send-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* 圖片預覽區域 */
    .image-preview {
      display: none;
      padding: 10px;
      background: var(--mist);
      border-radius: 12px;
      align-items: center;
      gap: 10px;
    }

    .image-preview.active {
      display: flex;
    }

    .preview-img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 8px;
    }

    .preview-remove {
      background: none;
      border: none;
      color: var(--stone);
      cursor: pointer;
      font-size: 18px;
    }

    /* 語音輸入動畫 */
    .recording {
      animation: pulse 1s infinite;
      background: var(--fern);
      color: white;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* 系統訊息 */
    .system-message {
      text-align: center;
      font-size: 0.7rem;
      color: var(--stone);
      padding: 8px;
      font-style: italic;
    }

    /* 登入畫面 */
    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 450px;
      text-align: center;
      padding: 20px;
    }

    .login-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .login-btn {
      margin-top: 24px;
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--moss) 0%, var(--fern) 100%);
      color: white;
      border: none;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    /* 歷史記錄遮罩 */
    .history-overlay {
      position: fixed;
      top: 72px;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 97;
      display: none;
    }

    .history-overlay.open {
      display: block;
    }

    @media (max-width: 768px) {
      .history-sidebar {
        width: 100%;
        left: -100%;
      }
      .chat-messages {
        height: 400px;
      }
    }

    /* Footer */
    footer {
      border-top: 1px solid rgba(90,122,74,0.15);
      padding: 40px 4vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      margin-top: auto;
    }
    .footer-logo {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--moss);
      letter-spacing: 0.05em;
    }
    .footer-copy {
      font-size: 0.75rem;
      color: var(--stone);
      letter-spacing: 0.1em;
    }
    .footer-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }
    .footer-links a {
      font-size: 0.75rem;
      color: var(--stone);
      text-decoration: none;
      letter-spacing: 0.08em;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .footer-links a:hover {
      opacity: 1;
      color: var(--fern);
    }
    @media (max-width: 768px) {
      footer {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
      .footer-links {
        justify-content: center;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <!-- 歷史記錄遮罩 -->
  <div class="history-overlay" id="historyOverlay"></div>

  <!-- 歷史記錄側邊欄 -->
  <div class="history-sidebar" id="historySidebar">
    <div class="history-header">
      <h3>📋 對話記錄</h3>
      <button class="chat-btn" id="closeHistory" style="background: none; color: var(--stone);">✕</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="system-message">尚無對話記錄</div>
    </div>
    <div style="padding: 12px;">
      <button class="chat-btn" id="clearHistory" style="background: var(--mist); color: var(--moss); width: 100%;">清除所有記錄</button>
    </div>
  </div>

  <!-- 頁面主要內容區域 -->
  <main class="content">
    <!-- 聊天室模組 -->
    <div class="chat-section">
      <div class="chat-container">
        <div class="chat-header">
          <div class="chat-title">
            <span>🌿</span>
            <span>蕨積 AI 助手</span>
          </div>
          <div class="chat-actions">
            <button class="chat-btn" id="historyBtn">📋 記錄</button>
            <button class="chat-btn" id="logoutBtn">🚪 登出</button>
          </div>
        </div>

        <div class="chat-messages" id="messages">
          <div class="message bot">
            <div class="message-content">嗨！我是蕨積 🌿<br>可以問我植物問題、查天氣、上傳圖片或使用語音輸入～</div>
          </div>
        </div>

        <div class="chat-input-area">
          <div class="image-preview" id="imagePreview">
            <img class="preview-img" id="previewImg">
            <span id="previewText"></span>
            <button class="preview-remove" id="removeImage">✕</button>
          </div>
          <div class="input-row">
            <input type="text" class="chat-input" id="input" placeholder="輸入訊息..." disabled>
            <div class="action-buttons">
              <button class="icon-btn" id="voiceBtn" title="語音輸入">🎤</button>
              <button class="icon-btn" id="imageBtn" title="上傳圖片">📷</button>
              <button class="send-button" id="sendBtn" disabled>發送</button>
            </div>
          </div>
          <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <ul class="footer-links">
      <li><a href="shop.html">植物選品</a></li>
      <li><a href="consult.html">綠色顧問</a></li>
      <li><a href="fbnote.html">蕨望筆記</a></li>
      <li><a href="about.html">關於蕨積</a></li>
    </ul>
    <p class="footer-copy">© 2026 蕨積 FernBrom . All rights reserved.</p>
  </footer>

  <script>
    // ========== 設定 ==========
    const API_BASE = 'https://fernbrom.onrender.com';
    const LIFF_ID = '2009770025-8rQ8gcnq';
    
    // ========== 全域變數 ==========
    let lineUserId = null;
    let isWaiting = false;
    let pollInterval = null;
    let currentImage = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    
    // 對話歷史記錄
    let chatHistory = [];
    
    // ========== DOM 元素 ==========
    const messagesDiv = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const imageBtn = document.getElementById('imageBtn');
    const fileInput = document.getElementById('fileInput');
    const imagePreview = document.getElementById('imagePreview');
    const previewImg = document.getElementById('previewImg');
    const removeImage = document.getElementById('removeImage');
    const historyBtn = document.getElementById('historyBtn');
    const historySidebar = document.getElementById('historySidebar');
    const historyOverlay = document.getElementById('historyOverlay');
    const closeHistory = document.getElementById('closeHistory');
    const clearHistoryBtn = document.getElementById('clearHistory');
    const historyList = document.getElementById('historyList');
    
    // ========== 輔助函式 ==========
    function addSystemMessage(text, isError = false) {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'system-message';
      if (isError) msgDiv.style.color = '#c62828';
      msgDiv.innerText = text;
      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function addMessage(text, sender, isTemp = false, imageUrl = null) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.innerHTML = text.replace(/\n/g, '<br>');
      messageDiv.appendChild(contentDiv);
      
      if (imageUrl) {
        const img = document.createElement('img');
        img.src = imageUrl;
        img.className = 'message-image';
        img.onclick = () => window.open(imageUrl, '_blank');
        messageDiv.appendChild(img);
      }
      
      if (isTemp) messageDiv.id = 'temp-message';
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      return messageDiv;
    }
    
    // 儲存對話歷史到 localStorage
    function saveHistory() {
      localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
      renderHistory();
    }
    
    // 載入對話歷史
    function loadHistory() {
      const saved = localStorage.getItem('chatHistory');
      if (saved) {
        chatHistory = JSON.parse(saved);
        renderHistory();
      }
    }
    
    // 渲染歷史記錄
    function renderHistory() {
      if (!historyList) return;
      if (chatHistory.length === 0) {
        historyList.innerHTML = '<div class="system-message">尚無對話記錄</div>';
        return;
      }
      
      historyList.innerHTML = '';
      chatHistory.slice().reverse().forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
          <div class="history-question">${escapeHtml(item.question.substring(0, 50))}${item.question.length > 50 ? '...' : ''}</div>
          <div class="history-time">${item.time}</div>
        `;
        div.onclick = () => {
          inputEl.value = item.question;
          closeHistoryPanel();
        };
        historyList.appendChild(div);
      });
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // 新增對話到歷史
    function addToHistory(question, answer) {
      const now = new Date();
      const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
      chatHistory.unshift({
        question: question,
        answer: answer,
        time: timeStr,
        timestamp: now.getTime()
      });
      // 保留最近50筆
      if (chatHistory.length > 50) chatHistory.pop();
      saveHistory();
    }
    
    // 清除歷史
    function clearHistory() {
      if (confirm('確定要清除所有對話記錄嗎？')) {
        chatHistory = [];
        saveHistory();
        addSystemMessage('已清除對話記錄');
      }
    }
    
    // 打開/關閉歷史記錄
    function openHistoryPanel() {
      historySidebar.classList.add('open');
      historyOverlay.classList.add('open');
    }
    
    function closeHistoryPanel() {
      historySidebar.classList.remove('open');
      historyOverlay.classList.remove('open');
    }
    
    // 圖片上傳處理
    function handleImageUpload(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        currentImage = e.target.result;
        previewImg.src = currentImage;
        previewImg.style.display = 'block';
        document.getElementById('previewText').innerText = file.name;
        imagePreview.classList.add('active');
      };
      reader.readAsDataURL(file);
    }
    
    // 上傳圖片到後端並發送
    async function sendImage(imageBase64) {
      if (!lineUserId) {
        alert('請先登入 LINE');
        return false;
      }
      
      isWaiting = true;
      sendBtn.disabled = true;
      addMessage('📷 正在識別圖片...', 'bot', true);
      
      try {
        const response = await fetch(`${API_BASE}/webchat/vision`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: lineUserId, image: imageBase64 })
        });
        const data = await response.json();
        
        const tempMsg = document.getElementById('temp-message');
        if (tempMsg) tempMsg.remove();
        
        if (data.success) {
          addMessage(data.reply, 'bot');
          addToHistory('[圖片識別]', data.reply);
        } else {
          addMessage('圖片識別失敗：' + (data.error || '請稍後再試'), 'bot');
        }
        
        isWaiting = false;
        sendBtn.disabled = false;
        return true;
      } catch (error) {
        console.error('圖片上傳錯誤:', error);
        const tempMsg = document.getElementById('temp-message');
        if (tempMsg) tempMsg.remove();
        addMessage('網路錯誤，請稍後再試', 'bot');
        isWaiting = false;
        sendBtn.disabled = false;
        return false;
      }
    }
    
    // 語音輸入
    async function startVoiceInput() {
      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        addSystemMessage('您的瀏覽器不支援語音輸入', true);
        return;
      }
      
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.lang = 'zh-TW';
      recognition.continuous = false;
      recognition.interimResults = false;
      
      voiceBtn.classList.add('recording');
      voiceBtn.innerHTML = '⏹️';
      
      recognition.start();
      
      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        inputEl.value = transcript;
        voiceBtn.classList.remove('recording');
        voiceBtn.innerHTML = '🎤';
        // 自動發送
        sendMessage();
      };
      
      recognition.onerror = (event) => {
        console.error('語音錯誤:', event.error);
        voiceBtn.classList.remove('recording');
        voiceBtn.innerHTML = '🎤';
        addSystemMessage('語音辨識失敗，請手動輸入', true);
      };
      
      recognition.onend = () => {
        voiceBtn.classList.remove('recording');
        voiceBtn.innerHTML = '🎤';
      };
    }
    
    // ========== 輪詢取得 AI 回覆 ==========
    function startPolling() {
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(async () => {
        if (!lineUserId) return;
        try {
          const res = await fetch(`${API_BASE}/webchat/reply?user_id=${lineUserId}`);
          const data = await res.json();
          if (data.has_reply) {
            const tempMsg = document.getElementById('temp-message');
            if (tempMsg) tempMsg.remove();
            addMessage(data.reply, 'bot');
            isWaiting = false;
            sendBtn.disabled = false;
          }
        } catch (err) {
          console.error('輪詢錯誤:', err);
        }
      }, 1500);
    }
    
    // ========== 送出訊息 ==========
    async function sendMessage() {
      if (!lineUserId) {
        alert('請先登入 LINE');
        return;
      }
      
      const message = inputEl.value.trim();
      if ((!message && !currentImage) || isWaiting) return;
      
      // 如果有圖片，先處理圖片
      if (currentImage) {
        const imageCopy = currentImage;
        currentImage = null;
        imagePreview.classList.remove('active');
        await sendImage(imageCopy);
        inputEl.value = '';
        return;
      }
      
      if (!message) return;
      
      addMessage(message, 'user');
      inputEl.value = '';
      
      isWaiting = true;
      sendBtn.disabled = true;
      addMessage('🌿 蕨積思考中...', 'bot', true);
      
      try {
        const res = await fetch(`${API_BASE}/webchat/send`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: lineUserId, message: message })
        });
        const data = await res.json();
        
        if (!data.success) {
          const tempMsg = document.getElementById('temp-message');
          if (tempMsg) tempMsg.remove();
          addMessage(`❌ ${data.error || '發送失敗'}`, 'bot');
          isWaiting = false;
          sendBtn.disabled = false;
        }
        // 成功時保留 thinking，等輪詢回覆
      } catch (err) {
        console.error(err);
        const tempMsg = document.getElementById('temp-message');
        if (tempMsg) tempMsg.remove();
        addMessage('❌ 網路錯誤，請稍後再試', 'bot');
        isWaiting = false;
        sendBtn.disabled = false;
      }
    }
    
    // ========== LIFF 初始化 ==========
    async function initLIFF() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          showLoginScreen();
          return;
        }
        
        const idToken = liff.getIDToken();
        if (!idToken) {
          addSystemMessage('無法取得授權，請重新登入', true);
          liff.logout();
          liff.login();
          return;
        }
        
        const payload = JSON.parse(atob(idToken.split('.')[1]));
        const correctUserId = payload.sub;
        if (!correctUserId.startsWith('U')) {
          addSystemMessage('使用者 ID 格式錯誤，請重新登入', true);
          liff.logout();
          liff.login();
          return;
        }
        
        lineUserId = correctUserId;
        console.log('✅ 使用者 ID:', lineUserId);
        
        addSystemMessage('✅ 已連線，開始對話吧！');
        inputEl.disabled = false;
        sendBtn.disabled = false;
        
        loadHistory();
        startPolling();
        
      } catch (err) {
        console.error('LIFF 錯誤:', err);
        addSystemMessage('連線失敗，請重新整理頁面', true);
      }
    }
    
    function showLoginScreen() {
      messagesDiv.innerHTML = '';
      const container = document.createElement('div');
      container.className = 'login-container';
      container.innerHTML = `
        <div class="login-icon">🌿</div>
        <div style="font-weight: bold; margin-bottom: 8px;">歡迎來到蕨積</div>
        <div style="font-size: 14px; color: #5a6e3f;">登入後即可開始對話</div>
        <button class="login-btn" id="lineLoginBtn">🔐 使用 LINE 登入</button>
      `;
      messagesDiv.appendChild(container);
      document.getElementById('lineLoginBtn').onclick = () => liff.login();
    }
    
    function handleLogout() {
      if (confirm('確定要登出嗎？下次需要重新登入 LINE。')) {
        liff.logout();
        setTimeout(() => location.reload(), 300);
      }
    }
    
    // ========== 導覽列初始化 ==========
    function initNav() {
      const btn = document.getElementById('hamburger');
      const menu = document.getElementById('mobileMenu');
      if (btn && menu) {
        btn.addEventListener('click', function() {
          btn.classList.toggle('open');
          menu.classList.toggle('open');
        });
      }
      window.addEventListener('scroll', function() {
        const nav = document.getElementById('mainNav');
        if (nav) nav.classList.toggle('scrolled', window.scrollY > 20);
      });
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }
    
    // ========== 載入導覽列 ==========
    document.addEventListener('DOMContentLoaded', function() {
      fetch('nav.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('nav-placeholder').innerHTML = data;
          initNav();
        })
        .catch(err => {
          console.error('無法載入導覽列:', err);
          document.getElementById('nav-placeholder').innerHTML = 
            '<nav style="background:var(--moss);color:white;padding:0 4vw;height:72px;display:flex;align-items:center;">' +
            '<span style="font-family:Noto Serif TC,serif;font-weight:900;">🌿 蕨積</span>' +
            '</nav>';
          initNav();
        });
      
      // 綁定事件
      sendBtn.addEventListener('click', sendMessage);
      inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !inputEl.disabled) sendMessage();
      });
      logoutBtn.addEventListener('click', handleLogout);
      voiceBtn.addEventListener('click', startVoiceInput);
      imageBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
          handleImageUpload(e.target.files[0]);
        }
        fileInput.value = '';
      });
      removeImage.addEventListener('click', () => {
        currentImage = null;
        imagePreview.classList.remove('active');
      });
      historyBtn.addEventListener('click', openHistoryPanel);
      closeHistory.addEventListener('click', closeHistoryPanel);
      historyOverlay.addEventListener('click', closeHistoryPanel);
      clearHistoryBtn.addEventListener('click', clearHistory);
      
      initLIFF();
    });
  </script>
</body>
