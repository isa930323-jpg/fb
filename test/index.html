<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蕨積 — 植物 x 工程 x 碳生活</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="common.css">
  <style>
    .hero { position: relative; height: 100vh; display: flex; align-items: center; padding: 0 4vw; overflow: hidden; background: #e8ede5; }
    .hero-title { font-family: 'Noto Serif TC', serif; font-weight: 900; font-size: clamp(2.5rem, 8vw, 5.5rem); color: var(--moss); line-height: 1.1; margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .hero-title span { display: block; font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: 0.4em; color: var(--stone); margin-top: 0.2em; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    .section { padding: 120px 4vw; position: relative; }
    .about-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 80px; align-items: center; }
    .reveal { opacity: 0; transform: translateY(30px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    @media (max-width: 768px) { .about-grid { grid-template-columns: 1fr; gap: 40px; } }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-title">植感工程<br>碳匯生活<span>Engineering with Nature</span></h1>
    </div>
  </section>

  <section id="about" class="section">
    <div class="about-grid reveal">
      <div>
        <h2>關於蕨積</h2>
        <p>我們致力於將植物美學與碳匯工程結合，創造永續的生活空間。</p>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="main.js"></script>
</body>
</html>
