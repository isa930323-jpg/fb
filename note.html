<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生活隨筆｜植物，生活，永續，碳盤查觀點｜蕨積 FernBrom</title>
<meta name="description" content="植物，生活，永續，碳盤查觀點，記錄生活與自然共處的片刻。">

<link rel="canonical" href="https://www.fernbrom.com/note.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* ===== 共用樣式 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1a14;
      --moss: #3d5a38;
      --fern: #5a7a4a;
      --sage: #8aab7a;
      --mist: #d4e4c8;
      --cream: #f5f0e8;
      --stone: #9a9080;
      --paper: #faf7f2;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ----- 導覽列 (完整保留) ----- */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4vw; height: 72px;
      background: rgba(250,247,242,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(90,122,74,0.12);
    }
    nav.scrolled { box-shadow: 0 2px 24px rgba(61,90,56,0.10); }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .logo-mark { width: 38px; height: 38px; flex-shrink: 0; }
    .logo-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .logo-text {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--moss);
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }
    .logo-text span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--stone);
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
      white-space: nowrap;
    }
    .nav-links li {
      position: relative;
      padding: 0 2px;
    }
    .nav-links a {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--ink);
      text-decoration: none;
      padding-bottom: 3px;
      opacity: 0.75;
      display: inline-block;
    }
    .nav-links a:hover {
      opacity: 1;
      color: var(--fern);
    }
    .nav-contact {
      padding: 8px 20px !important;
      border: 1px solid var(--fern) !important;
      border-radius: 2px;
      color: var(--fern) !important;
      opacity: 1 !important;
      margin-left: 0.5rem;
    }
    .nav-contact:hover {
      background: var(--fern);
      color: white !important;
    }
    .has-dropdown > a::after { display: none; }

    .nav-links li .dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 18px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(250,247,242,0.98);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(90,122,74,0.14);
      border-top: 2px solid var(--fern);
      box-shadow: 0 12px 40px rgba(61,90,56,0.12);
      min-width: 148px;
      list-style: none;
      padding: 8px 0;
      z-index: 300;
    }
    .nav-links li:hover .dropdown,
    .nav-links li:focus-within .dropdown {
      display: block;
    }
    .nav-links li .dropdown::before {
      content: '';
      position: absolute;
      top: -7px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 6px solid var(--fern);
    }
    .dropdown li a {
      display: block;
      padding: 10px 20px;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--ink);
      opacity: 0.7;
      white-space: nowrap;
      text-decoration: none;
    }
    .dropdown li a:hover {
      opacity: 1;
      color: var(--fern);
      padding-left: 26px;
      background: rgba(90,122,74,0.04);
    }
    .dropdown li + li { border-top: 1px solid rgba(90,122,74,0.08); }

    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      width: 40px; height: 40px;
      cursor: pointer;
      background: none; border: none;
      flex-shrink: 0;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 1.5px;
      background: var(--moss);
      transition: transform 0.2s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    .mobile-menu {
      position: fixed; top: 72px; left: 0; right: 0; bottom: 0;
      background: #faf7f2;
      border-bottom: 1px solid rgba(90,122,74,0.15);
      padding: 0 6vw 40px;
      z-index: 99;
      overflow-y: auto;
      transform: translateX(100%);
      visibility: hidden;
      transition: transform 0.3s ease;
    }
    .mobile-menu.open { transform: translateX(0); visibility: visible; }
    .mobile-menu ul { list-style: none; }
    .mobile-menu > ul > li > a,
    .mobile-parent {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0;
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: var(--moss);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.1);
      cursor: pointer;
    }
    .mobile-parent:hover, .mobile-menu > ul > li > a:hover { color: var(--fern); }
    .mobile-caret { display: inline-block; transition: transform 0.2s; }
    .mobile-caret.open { transform: rotate(180deg); }
    .mobile-sub {
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .mobile-sub.open { max-height: 200px; }
    .mobile-sub li a {
      display: block;
      padding: 11px 0 11px 16px;
      font-size: 0.85rem;
      color: var(--stone);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.06);
      letter-spacing: 0.06em;
    }
    .mobile-sub li a:hover { color: var(--fern); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }

    /* ===== 生活隨筆專屬樣式 ===== */
    .blog-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .blog-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .blog-header h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 2.2rem;
      color: var(--moss);
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }
    .intro p {
      color: var(--stone);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      line-height: 1.6;
      margin-top: 8px;
    }

    /* 標籤導航列 — 微調視覺層次 */
    .tag-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 48px;
      padding: 16px 0 8px;
      border-bottom: 1px solid rgba(90,122,74,0.2);
      justify-content: center;
    }
    .tag-link {
      display: inline-block;
      padding: 6px 18px;
      background: var(--cream);
      color: var(--fern);
      border-radius: 40px;
      font-size: 0.8rem;
      text-decoration: none;
      transition: all 0.2s ease;
      border: 1px solid rgba(90,122,74,0.2);
      font-weight: 400;
      letter-spacing: 0.03em;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }
    .tag-link:hover {
      background: var(--mist);
      transform: translateY(-2px);
      border-color: var(--sage);
      box-shadow: 0 4px 10px rgba(61,90,56,0.08);
    }
    .tag-link.active {
      background: var(--fern);
      color: white;
      border-color: var(--fern);
      box-shadow: 0 2px 8px rgba(61,90,56,0.2);
    }

    /* 文章卡片 — 更細膩的留白與層次 */
    .post-card {
      background: white;
      border-radius: 28px;
      padding: 32px 36px;
      margin-bottom: 36px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.03), 0 1px 1px rgba(0,0,0,0.02);
      border: 1px solid rgba(90,122,74,0.1);
      transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
    }
    .post-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 35px -12px rgba(61,90,56,0.12);
      border-color: rgba(90,122,74,0.2);
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 8px;
      border-bottom: 1px dashed rgba(90,122,74,0.12);
    }
    .post-author {
      font-size: 0.8rem;
      color: var(--sage);
      letter-spacing: 0.05em;
      font-weight: 500;
    }
    .post-date {
      font-size: 0.72rem;
      color: var(--stone);
      font-family: 'Cormorant Garamond', serif;
    }
    .post-content {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 24px;
      font-weight: 550;
    }
    
    /* ===== 新增：照片樣式（不影響原有樣式） ===== */
    .post-image {
      margin: 20px 0 24px;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      background: var(--cream);
      transition: all 0.2s ease;
      border: 1px solid rgba(90,122,74,0.1);
    }
    .post-image img {
      width: 100%;
      max-height: 500px;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }
    .post-image:hover img {
      transform: scale(1.02);
    }
    
    /* ===== 新增：圖片預覽 Modal（不影響原有樣式） ===== */
    .image-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      cursor: pointer;
      justify-content: center;
      align-items: center;
    }
    .image-modal.active {
      display: flex;
    }
    .image-modal img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      border-radius: 8px;
    }
    .image-modal-close {
      position: absolute;
      top: 20px;
      right: 40px;
      color: white;
      font-size: 48px;
      font-weight: 300;
      cursor: pointer;
      font-family: monospace;
      transition: opacity 0.2s;
    }
    .image-modal-close:hover {
      opacity: 0.7;
    }
    
    /* 內容中 #標籤 樣式優化 */
    .post-content span[style*="color: var(--fern);"] {
      background: rgba(138,171,122,0.08);
      padding: 0 4px;
      border-radius: 12px;
      font-size: 0.9em;
    }
    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid rgba(90,122,74,0.12);
    }
    .post-tag {
      display: inline-block;
      padding: 4px 14px;
      background: var(--cream);
      color: var(--fern);
      border-radius: 32px;
      font-size: 0.7rem;
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      border: 1px solid rgba(90,122,74,0.15);
    }
    .post-tag:hover {
      background: var(--mist);
      transform: translateY(-1px);
      border-color: var(--sage);
    }

    /* 空狀態 & 載入動畫 — 稍加柔和 */
    .empty-state {
      text-align: center;
      padding: 90px 20px;
      color: var(--stone);
      background: rgba(245,240,232,0.4);
      border-radius: 48px;
      margin: 20px 0;
    }
    .empty-state i {
      display: block;
      font-size: 56px;
      margin-bottom: 20px;
      opacity: 0.7;
    }
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--fern);
      font-size: 0.9rem;
    }
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--mist);
      border-top: 2px solid var(--fern);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 響應式調整 — 保持舒適邊距 */
    @media (max-width: 768px) {
      .blog-container {
        padding: 0 20px;
      }
      .blog-header h1 {
        font-size: 1.8rem;
      }
      .post-card {
        padding: 22px 24px;
        margin-bottom: 28px;
      }
      .tag-nav {
        gap: 10px;
        margin-bottom: 32px;
      }
      .tag-link {
        padding: 5px 14px;
        font-size: 0.72rem;
      }
      .post-content {
        font-size: 0.95rem;
        line-height: 1.7;
      }
      .post-image img {
        max-height: 300px;
      }
    }

    /* ----- 頁面內容區域 ----- */
    .content {
      flex: 1;
      padding-top: 92px;
      padding-bottom: 56px;
    }

    /* ----- Footer (完整保留) ----- */
    footer {
      border-top: 1px solid rgba(90,122,74,0.15);
      padding: 40px 4vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      margin-top: auto;
    }
    .footer-logo {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--moss);
      letter-spacing: 0.05em;
    }
    .footer-copy {
      font-size: 0.75rem;
      color: var(--stone);
      letter-spacing: 0.1em;
    }
    .footer-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }
    .footer-links a {
      font-size: 0.75rem;
      color: var(--stone);
      text-decoration: none;
      letter-spacing: 0.08em;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .footer-links a:hover {
      opacity: 1;
      color: var(--fern);
    }
    @media (max-width: 768px) {
      footer {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
      .footer-links {
        justify-content: center;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <!-- 導覽列佔位 -->
  <div id="nav-placeholder"></div>

  <!-- 主要內容區域 -->
  <main class="content">
    <div class="blog-container">
      <!-- 標題與簡介區塊 -->
      <div class="blog-header">
        <h1>蕨積生活隨筆</h1>

          <p>有些想法不一定完整，也不一定正確。</p>

        </div>
      </div>

      <!-- 標籤導航列 (7個標籤維持不變) -->
      <div class="tag-nav" id="tagNav">
        <a href="note.html" class="tag-link" id="tagAll">📖 全部文章</a>
        <a href="note.html?tag=%23%E7%A2%B3%E7%9B%A4%E6%9F%A5" class="tag-link">#碳盤查</a>
        <a href="note.html?tag=%23%E6%B0%B8%E7%BA%8C" class="tag-link">#永續</a>
        <a href="note.html?tag=%23%E5%87%80%E9%9B%B6" class="tag-link">#淨零</a>
        <a href="note.html?tag=%23%E7%94%9F%E6%B4%BB" class="tag-link">#生活</a>
        <a href="note.html?tag=%23%E9%B9%BF%E8%A7%92%E8%95%A8" class="tag-link">#鹿角蕨</a>
        <a href="note.html?tag=%23%E7%A9%8D%E6%B0%B4%E9%B3%B3%E6%A2%A8" class="tag-link">#積水鳳梨</a>

      <!-- 文章列表渲染區塊 -->
      <div id="postsContainer"></div>
    </div>
  </main>

  <!-- ===== 新增：圖片預覽 Modal ===== -->
  <div id="imageModal" class="image-modal" onclick="closeImageModal()">
    <span class="image-modal-close">&times;</span>
    <img id="modalImage" src="" alt="預覽圖片">
  </div>

  <!-- Footer 結構完整保留 -->
  <footer>
    <ul class="footer-links">
      <li><a href="shop.html">植物選品</a></li>

      <li><a href="fbnote.html">蕨望筆記</a></li>

    </ul>
    <p class="footer-copy">© 2026 蕨積 FernBrom . All rights reserved.</p>
  </footer>

  <script>
    // ===== 生活隨筆核心功能（新增照片顯示）=====
    
    function getUrlParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }
    
    const currentTag = getUrlParam('tag');
    
    function setActiveTag() {
      if (currentTag) {
        const allLinks = document.querySelectorAll('.tag-link');
        allLinks.forEach(link => {
          const href = link.getAttribute('href');
          if (href && href.includes(encodeURIComponent(currentTag))) {
            link.classList.add('active');
          } else {
            link.classList.remove('active');
          }
        });
      } else {
        const tagAll = document.getElementById('tagAll');
        if (tagAll) tagAll.classList.add('active');
      }
    }
    
    // 格式化內容 #標籤 高亮
    function formatContentWithTags(text) {
      return text.replace(/(#[#\u4e00-\u9fa5a-zA-Z0-9]+)/g, '<span style="color: var(--fern); font-weight: 500; background: rgba(138,171,122,0.1); padding: 0 2px; border-radius: 10px;">$1</span>');
    }
    
    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
    
    // ===== 新增：圖片預覽功能 =====
    function showImageModal(imageUrl) {
      const modal = document.getElementById('imageModal');
      const modalImg = document.getElementById('modalImage');
      modal.classList.add('active');
      modalImg.src = imageUrl;
    }
    
    function closeImageModal() {
      const modal = document.getElementById('imageModal');
      modal.classList.remove('active');
    }
    
    // 載入文章 (API 路徑與原有完全一致)
    async function loadMessages() {
      const container = document.getElementById('postsContainer');
      if (!container) return;
      
      container.innerHTML = '<div class="loading">載入文章</div>';
      
      try {
        let apiUrl = 'https://linephotobot.onrender.com/api/messages';
        if (currentTag) {
          apiUrl += `?tag=${encodeURIComponent(currentTag)}`;
        }
        
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const messages = await response.json();
        
        if (messages.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i>🌿</i>
              <p>${currentTag ? `沒有關於「${escapeHtml(currentTag)}」的記錄` : '此刻靜謐，尚無文章'}</p>
              <p style="font-size:0.8rem; margin-top:12px; opacity:0.7;">${currentTag ? '試試其他標籤，或成為第一個分享的人' : '用 LINE 傳遞隨筆，加入 #標籤 吧'}</p>
            </div>
          `;
          return;
        }
        
        // 渲染文章 — 新增照片顯示
        container.innerHTML = messages.map(post => {
          const displayName = post.displayName || '蕨友';
          const time = new Date(post.timestamp);
          const dateStr = `${time.getFullYear()}.${String(time.getMonth()+1).padStart(2,'0')}.${String(time.getDate()).padStart(2,'0')}`;
          // 處理內容中的換行與標籤樣式
          const formattedText = formatContentWithTags(escapeHtml(post.text || ''));
          
          // ===== 新增：檢查是否有照片 =====
          const hasImage = post.imageUrl && post.imageUrl.trim() !== '';
          
          return `
            <article class="post-card">
              <div class="post-header">
                <span class="post-author">✍️ ${escapeHtml(displayName)}</span>
                <span class="post-date">${dateStr}</span>
              </div>
              <div class="post-content">${formattedText.replace(/\n/g, '<br>')}</div>
              ${hasImage ? `
                <div class="post-image" onclick="showImageModal('${post.imageUrl}')">
                  <img src="${post.imageUrl}" alt="隨筆照片" loading="lazy">
                </div>
              ` : ''}
              ${post.tags && post.tags.length > 0 ? `
                <div class="post-tags">
                  ${post.tags.map(tag => `<a href="note.html?tag=${encodeURIComponent(tag)}" class="post-tag">${escapeHtml(tag)}</a>`).join('')}
                </div>
              ` : ''}
            </article>
          `;
        }).join('');
        
      } catch (error) {
        console.error('載入失敗:', error);
        container.innerHTML = `
          <div class="empty-state">
            <i>🍃</i>
            <p>連線不穩，請稍後重試</p>
            <p style="font-size:0.75rem; margin-top:8px;">${error.message}</p>
          </div>
        `;
      }
    }
    
    // ===== 導覽列載入 (保持原樣，未更動) =====
    document.addEventListener('DOMContentLoaded', function () {
      fetch('nav.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('nav-placeholder').innerHTML = data;
          initNav();
        })
        .catch(err => {
          console.error('導覽列載入錯誤:', err);
          document.getElementById('nav-placeholder').innerHTML = 
            '<nav style="background:var(--moss);color:white;padding:0 4vw;height:72px;display:flex;align-items:center;">' +
            '<span style="font-family:Noto Serif TC,serif;font-weight:900;">⚠️ 導覽列暫缺，請檢查 nav.html</span>' +
            '</nav>';
        });

      function initNav() {
        var btn = document.getElementById('hamburger');
        var menu = document.getElementById('mobileMenu');
        if (btn && menu) {
          btn.addEventListener('click', function () {
            btn.classList.toggle('open');
            menu.classList.toggle('open');
          });
          menu.querySelectorAll('.mobile-link').forEach(function (a) {
            a.addEventListener('click', function () {
              btn.classList.remove('open');
              menu.classList.remove('open');
            });
          });
        }
        if (menu) {
          menu.querySelectorAll('.mobile-parent').forEach(function (parent) {
            parent.addEventListener('click', function () {
              var id = parent.getAttribute('data-target');
              var sub = document.getElementById(id);
              var caretId = 'caret-' + id.replace('sub-', '');
              var caret = document.getElementById(caretId);
              var opening = !sub.classList.contains('open');
              menu.querySelectorAll('.mobile-sub').forEach(function (s) { s.classList.remove('open'); });
              menu.querySelectorAll('.mobile-caret').forEach(function (c) { c.classList.remove('open'); });
              if (opening) {
                sub.classList.add('open');
                if (caret) caret.classList.add('open');
              }
            });
          });
        }
        window.addEventListener('scroll', function () {
          var nav = document.getElementById('mainNav');
          if (nav) nav.classList.toggle('scrolled', window.scrollY > 20);
        });
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }
      
      setActiveTag();
      loadMessages();
      
      // ===== 新增：ESC 鍵關閉圖片預覽 =====
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          closeImageModal();
        }
      });
    });
  </script>
</body>
</html>
