<!-- ========== 主要頁面 index.html ========== -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蕨積 — 植物 x 工程 x 碳生活</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* ===== 共用樣式 (含導覽列、行動選單) ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1a14;
      --moss: #3d5a38;
      --fern: #5a7a4a;
      --sage: #8aab7a;
      --mist: #d4e4c8;
      --cream: #f5f0e8;
      --stone: #9a9080;
      --paper: #faf7f2;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      overflow-x: hidden;
    }

    /* ----- 導覽列 (與原本完全相同) ----- */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4vw; height: 72px;
      background: rgba(250,247,242,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(90,122,74,0.12);
    }
    nav.scrolled { box-shadow: 0 2px 24px rgba(61,90,56,0.10); }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .logo-mark { width: 38px; height: 38px; flex-shrink: 0; }
    .logo-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .logo-text {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--moss);
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }
    .logo-text span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--stone);
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
      white-space: nowrap;
    }
    .nav-links li {
      position: relative;
      padding: 0 2px;
    }
    .nav-links a {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--ink);
      text-decoration: none;
      padding-bottom: 3px;
      opacity: 0.75;
      display: inline-block;
    }
    .nav-links a:hover {
      opacity: 1;
      color: var(--fern);
    }
    .nav-contact {
      padding: 8px 20px !important;
      border: 1px solid var(--fern) !important;
      border-radius: 2px;
      color: var(--fern) !important;
      opacity: 1 !important;
      margin-left: 0.5rem;
    }
    .nav-contact:hover {
      background: var(--fern);
      color: white !important;
    }
    .has-dropdown > a::after { display: none; }

    .nav-links li .dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 18px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(250,247,242,0.98);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(90,122,74,0.14);
      border-top: 2px solid var(--fern);
      box-shadow: 0 12px 40px rgba(61,90,56,0.12);
      min-width: 148px;
      list-style: none;
      padding: 8px 0;
      z-index: 300;
    }
    .nav-links li:hover .dropdown,
    .nav-links li:focus-within .dropdown {
      display: block;
    }
    .nav-links li .dropdown::before {
      content: '';
      position: absolute;
      top: -7px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 6px solid var(--fern);
    }
    .dropdown li a {
      display: block;
      padding: 10px 20px;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--ink);
      opacity: 0.7;
      white-space: nowrap;
      text-decoration: none;
    }
    .dropdown li a:hover {
      opacity: 1;
      color: var(--fern);
      padding-left: 26px;
      background: rgba(90,122,74,0.04);
    }
    .dropdown li + li { border-top: 1px solid rgba(90,122,74,0.08); }

    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      width: 40px; height: 40px;
      cursor: pointer;
      background: none; border: none;
      flex-shrink: 0;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 1.5px;
      background: var(--moss);
      transition: transform 0.2s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    .mobile-menu {
      position: fixed; top: 72px; left: 0; right: 0; bottom: 0;
      background: #faf7f2;
      border-bottom: 1px solid rgba(90,122,74,0.15);
      padding: 0 6vw 40px;
      z-index: 99;
      overflow-y: auto;
      transform: translateX(100%);
      visibility: hidden;
      transition: transform 0.3s ease;
    }
    .mobile-menu.open { transform: translateX(0); visibility: visible; }
    .mobile-menu ul { list-style: none; }
    .mobile-menu > ul > li > a,
    .mobile-parent {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0;
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: var(--moss);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.1);
      cursor: pointer;
    }
    .mobile-parent:hover, .mobile-menu > ul > li > a:hover { color: var(--fern); }
    .mobile-caret { display: inline-block; transition: transform 0.2s; }
    .mobile-caret.open { transform: rotate(180deg); }
    .mobile-sub {
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .mobile-sub.open { max-height: 200px; }
    .mobile-sub li a {
      display: block;
      padding: 11px 0 11px 16px;
      font-size: 0.85rem;
      color: var(--stone);
      text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.06);
      letter-spacing: 0.06em;
    }
    .mobile-sub li a:hover { color: var(--fern); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }

    /* ----- Hero 區域 (其餘樣式保持原樣) ----- */
    .hero {
      min-height: 100vh; position: relative; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden; padding-top: 72px;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-image: url('bg.png'); background-size: cover; background-position: center;
    }
    .hero-bg::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(250,247,242,0.58); backdrop-filter: blur(3px);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero-title {
      font-family: 'Noto Serif TC', serif; font-weight: 900;
      font-size: clamp(6rem, 18vw, 16rem); line-height: 0.9;
      letter-spacing: -0.02em; text-align: center;
      background: linear-gradient(135deg, #1e2e1a 20%, #2e4a28 50%, #3d5a38 80%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; filter: drop-shadow(0 6px 12px rgba(0,0,0,0.08));
      opacity: 0; animation: fadeUp 1s ease 0.5s forwards;
    }
    .hero-slogan {
      margin-top: 32px; font-family: 'Noto Serif TC', serif; font-weight: 500;
      font-size: clamp(1rem, 2.5vw, 1.6rem); letter-spacing: 0.35em;
      color: #0e1a0c; text-align: center; opacity: 0;
      animation: fadeUp 1s ease 0.8s forwards;
    }
    .hero-slogan em { font-style: normal; color: #0e1a0c; font-weight: 600; }
    .hero-service {
      margin-top: 18px; font-size: 1rem; letter-spacing: 0.22em;
      color: var(--moss); text-align: center; opacity: 0;
      animation: fadeUp 1s ease 0.95s forwards;
    }
    .hero-tagline {
      margin-top: 18px; font-family: 'Noto Serif TC', serif; font-weight: 400;
      font-size: clamp(1.05rem, 2.2vw, 1.45rem); letter-spacing: 0.45em;
      color: var(--moss); text-align: center; opacity: 0;
      animation: fadeUp 1s ease 1.1s forwards;
    }
    .hero-cta {
      display: inline-block; margin-top: 36px; font-family: 'Noto Serif TC', serif;
      font-weight: 600; font-size: 0.9rem; letter-spacing: 0.25em;
      color: white; background: var(--moss); padding: 16px 48px;
      text-decoration: none; border: 1px solid var(--moss); position: relative;
      overflow: hidden; opacity: 0; animation: fadeUp 1s ease 1.3s forwards;
    }
    .hero-cta::before {
      content: ''; position: absolute; inset: 0; background: var(--fern);
      transform: translateX(-100%); transition: transform 0.4s ease;
    }
    .hero-cta:hover::before { transform: translateX(0); }
    .hero-cta:hover { color: white; }

    /* ----- 關於與服務區塊 ----- */
    .about-grid {
      max-width: 1200px; margin: 0 auto; display: grid;
      grid-template-columns: 1fr 1fr; gap: 80px; align-items: start;
    }
    @media (max-width:900px){
      .about-grid { grid-template-columns: 1fr; gap:60px; }
    }
    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    .service-card {
      padding: 24px 20px;
      background: var(--cream);
      border: 1px solid rgba(90,122,74,0.12);
      transition: all .3s ease;
    }
    .service-card:hover {
      transform: translateY(-4px);
      background: var(--mist);
    }
    .service-card h3 {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.2rem;
      color: var(--moss);
      margin-bottom: 8px;
    }
    .service-card p {
      font-size: 1.15rem;
      line-height: 1.6;
      color: var(--stone);
    }
    .about-right h2 {
      margin-bottom: 40px;
    }
    .about-text-cards {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .about-text-card {
      padding: 24px 20px;
      background: var(--cream);
      border: 1px solid rgba(90,122,74,0.12);
      transition: all .3s ease;
      font-size: 1.15em;
      line-height: 1.6;
      color: var(--stone);
    }
    .about-text-card:hover {
      transform: translateY(-4px);
      background: var(--mist);
    }

    #contact {
      background-color: var(--moss); color: var(--paper);
      padding: 100px 4vw; text-align: center;
    }
    .contact-container { max-width: 900px; margin: 0 auto; }
    .contact-label {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 0.85rem; letter-spacing: 0.3em; color: var(--sage);
      margin-bottom: 20px; display: flex; align-items: center;
      justify-content: center; gap: 12px;
    }
    .contact-label::before, .contact-label::after {
      content: ''; display: block; width: 32px; height: 1px; background: var(--sage);
    }
    .contact-heading {
      font-family: 'Noto Serif TC', serif; font-weight: 900;
      font-size: clamp(2.2rem, 5vw, 3.8rem); color: var(--paper);
      letter-spacing: 0.04em; margin-bottom: 16px;
    }
    .contact-sub {
      font-size: 0.95rem; line-height: 1.8; color: var(--mist);
      max-width: 500px; margin: 0 auto 56px; font-weight: 300;
    }
    .contact-circle-grid {
      display: flex; justify-content: center; gap: 24px;
      margin-bottom: 56px; flex-wrap: wrap;
    }
    .contact-circle {
      width: 100px; height: 100px; border-radius: 50%;
      background-color: rgba(250,247,242,0.1); backdrop-filter: blur(2px);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s ease; text-decoration: none; color: var(--sage);
    }
    .contact-circle:hover {
      background-color: var(--fern); transform: translateY(-4px); color: white;
    }
    .contact-circle i { width: 48px; height: 48px; stroke: currentColor; stroke-width: 1.5; }
    @media (max-width: 600px) {
      .contact-circle-grid { gap: 12px; }
      .contact-circle { width: 70px; height: 70px; }
      .contact-circle i { width: 36px; height: 36px; }
    }
    .contact-cta-wrapper { margin-top: 20px; }
    .contact-cta {
      display: inline-block; font-family: 'Noto Serif TC', serif;
      font-weight: 600; font-size: 0.9rem; letter-spacing: 0.2em;
      color: var(--moss); background: var(--paper); padding: 18px 56px;
      text-decoration: none; border: 1px solid var(--paper); position: relative;
      overflow: hidden; transition: background 0.3s, color 0.3s;
    }
    .contact-cta::before {
      content: ''; position: absolute; inset: 0; background: var(--sage);
      transform: translateX(-100%); transition: transform 0.4s ease; z-index: 0;
    }
    .contact-cta:hover::before { transform: translateX(0); }
    .contact-cta span { position: relative; z-index: 1; }
    .contact-cta:hover { color: white; border-color: var(--sage); }

    footer {
      border-top: 1px solid rgba(90,122,74,0.15);
      padding: 40px 4vw; display: flex; align-items: center;
      justify-content: space-between; background: var(--paper);
    }
    .footer-logo {
      font-family: 'Noto Serif TC', serif; font-weight: 900;
      font-size: 1.1rem; color: var(--moss); letter-spacing: 0.05em;
    }
    .footer-copy {
      font-size: 0.75rem; color: var(--stone); letter-spacing: 0.1em;
    }
    .footer-links {
      display: flex; gap: 24px; list-style: none;
    }
    .footer-links a {
      font-size: 0.75rem; color: var(--stone); text-decoration: none;
      letter-spacing: 0.08em; opacity: 0.7; transition: opacity 0.2s;
    }
    .footer-links a:hover { opacity: 1; color: var(--fern); }
    @media (max-width: 768px) {
      footer { flex-direction: column; gap: 20px; text-align: center; }
      .footer-links { justify-content: center; flex-wrap: wrap; }
    }

    .reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.8s ease, transform 0.8s ease; }
    .reveal.visible { opacity: 1; transform: none; }
    .reveal-delay-1 { transition-delay: 0.15s; }
    .reveal-delay-2 { transition-delay: 0.3s; }
    .reveal-delay-3 { transition-delay: 0.45s; }
  </style>
</head>
<body>
  <!-- 放置導覽列的佔位元素 -->
  <div id="nav-placeholder"></div>
  <div></div> <!-- 佔位 -->
  <div style="height:72px;"></div>

  <!-- 購物車主要內容 -->
 
<!-- 購物車主要內容 -->
<h1 style="text-align:center;">植物選品</h1>
<br><br>
<p style="text-align:center; line-height:1.8; max-width:700px; margin:0 auto 30px;">
每一株植物都有自己的生長節奏。<br>

如果你願意慢一點，它們會陪你很久。<br>

這些植物，大多來自一個持續多年的屋頂栽培計畫。<br>

在城市裡，我們嘗試讓植物重新回到生活中。
</p>

  <div class="filter-container">
    <button class="filter-btn active" onclick="filterProducts('全部', this)">全部</button>
    <button class="filter-btn" onclick="filterProducts('鹿角蕨', this)">鹿角蕨</button>
    <button class="filter-btn" onclick="filterProducts('積水鳳梨', this)">積水鳳梨</button>
    <button class="filter-btn" onclick="filterProducts('其他植物', this)">其他植物</button>
  </div>

  <!-- 商品列表容器 -->
  <div id="product-list"></div>

  <!-- 分頁控制（僅電腦版顯示） -->
  <div class="pagination" id="pagination-controls">
    <button id="prev-page" onclick="changePage(currentPage - 1)">◀ 上一頁</button>
    <span class="page-info" id="page-info">第 1 頁</span>
    <button id="next-page" onclick="changePage(currentPage + 1)">下一頁 ▶</button>
  </div>

  <!-- 手機版載入中提示（隱藏於電腦版） -->
  <div class="loading-more" id="loading-more" style="display: none;">載入更多商品中...</div>

  <div id="cart-section">
    <h3>🛒 購物清單</h3>
    <ul id="cart-items"></ul>
    <p>總金額：$ <span id="total-price">0</span></p>
    <input type="text" id="cust-name" class="form-input" placeholder="姓名">
    <input type="text" id="cust-phone" class="form-input" placeholder="電話">
    <input type="email" id="cust-email" class="form-input" placeholder="Email">
    <button class="btn-add" onclick="submitOrder()">送出訂單</button>
  </div>

  <!-- 頁尾 -->
  <footer>
    <ul class="footer-links">
      <li><a href="#">植物選品</a></li>
      <li><a href="#">綠色顧問</a></li>
      <li><a href="#">蕨望筆記</a></li>
      <li><a href="#">關於蕨積</a></li>
    </ul>
    <p class="footer-copy">© 2026 蕨積 FernBrom . All rights reserved.</p>
  </footer>

  <script>
    // Supabase 初始化
    const mySupabase = supabase.createClient(
      'https://wrreydnppkhhssbnmnno.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndycmV5ZG5wcGtoaHNzYm5tbm5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjI0MjYsImV4cCI6MjA4ODc5ODQyNn0.7520TxecGoqhjkIcY497sCt4oG7eqDtShK1OQJe3N7o',
      { auth: { persistSession: false, detectSessionInUrl: false } }
    );

    // 全域變數
    let allProducts = [];                 // 所有商品（不分頁，用於篩選）
    let filteredProducts = [];             // 篩選後的商品
    let currentPage = 1;                   // 目前頁碼（從1開始）
    let isLoadingMore = false;              // 避免重複載入
    let hasMoreMobile = true;               // 手機板是否還有更多資料
    const ITEMS_PER_PAGE = 8;               // 每頁 8 筆

    // 判斷是否為手機版（簡易判斷：視窗寬度 ≤ 768px）
    function isMobile() {
      return window.innerWidth <= 768;
    }

    // 渲染商品列表（根據目前模式與頁碼）
    async function renderProducts() {
      const list = document.getElementById('product-list');
      const cartItems = Cart.getItems();

      let productsToRender = filteredProducts;

      if (!isMobile()) {
        // 電腦版：只顯示當前頁面的 8 筆
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const end = start + ITEMS_PER_PAGE;
        productsToRender = filteredProducts.slice(start, end);
      }

      if (productsToRender.length === 0) {
        list.innerHTML = "<p style='text-align:center;'>目前沒有商品。</p>";
      } else {
        list.innerHTML = productsToRender.map(p => {
          const cartItem = cartItems.find(item => item.id === p.id);
          const cartQty = cartItem ? cartItem.quantity : 0;
          const disabled = cartQty >= p.quantity || p.quantity <= 0;

          let buttonText = '加入購物車';
          if (p.quantity <= 0) {
            buttonText = '庫存不足';
          } else if (cartQty >= p.quantity) {
            buttonText = '已達上限';
          }

          return `
            <div class="product-card">
              <img src="${p.image_url}" style="width:100%; height:180px; object-fit:cover; border-radius:8px;">
              <h3>${p.name}</h3>
              <p>庫存: ${p.quantity} | $${p.price}</p>
              <button class="btn-add" 
                      onclick="Cart.addItem('${p.id}', '${p.name}', ${p.price}, ${p.quantity})"
                      ${disabled ? 'disabled' : ''}>
                ${buttonText}
              </button>
            </div>
          `;
        }).join('');
      }

      // 更新分頁資訊（電腦版）
      if (!isMobile()) {
        updatePaginationUI();
      }
    }

    // 更新分頁按鈕狀態
    function updatePaginationUI() {
      const prevBtn = document.getElementById('prev-page');
      const nextBtn = document.getElementById('next-page');
      const pageInfo = document.getElementById('page-info');
      
      const totalPages = Math.ceil(filteredProducts.length / ITEMS_PER_PAGE) || 1;
      pageInfo.innerText = `第 ${currentPage} 頁 / 共 ${totalPages} 頁`;

      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
    }

    // 切換頁碼（電腦版專用）
    function changePage(newPage) {
      if (isMobile()) return; // 手機板不支援按鈕分頁
      const totalPages = Math.ceil(filteredProducts.length / ITEMS_PER_PAGE) || 1;
      if (newPage < 1 || newPage > totalPages) return;
      currentPage = newPage;
      renderProducts();
    }

    // 手機板：載入更多（無限滾動）
    async function loadMoreMobile() {
      if (!isMobile() || isLoadingMore || !hasMoreMobile) return;

      const nextStart = filteredProducts.length; // 已載入的商品數（即下一批的起始索引）
      if (nextStart >= allProducts.length) {
        hasMoreMobile = false;
        document.getElementById('loading-more').style.display = 'none';
        return;
      }

      isLoadingMore = true;
      document.getElementById('loading-more').style.display = 'block';

      // 從 allProducts 取得下一批商品（依目前篩選類別）
      const nextBatch = allProducts.slice(nextStart, nextStart + ITEMS_PER_PAGE);
      
      // 將新商品加入 filteredProducts（因為手機版會逐步累積）
      filteredProducts = [...filteredProducts, ...nextBatch];
      
      await renderProducts(); // 重新渲染
      
      isLoadingMore = false;
      if (filteredProducts.length >= allProducts.length) {
        hasMoreMobile = false;
        document.getElementById('loading-more').style.display = 'none';
      }
    }

    // 篩選類別
    async function filterProducts(category, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      if (category === '全部') {
        filteredProducts = [...allProducts];
      } else {
        filteredProducts = allProducts.filter(p => p.category === category);
      }

      // 重置狀態
      currentPage = 1;
      hasMoreMobile = true;
      
      // 重新渲染（電腦版自動分頁，手機版只顯示第一批）
      if (isMobile()) {
        // 手機版：只載入第一批 8 筆，後續靠滾動
        filteredProducts = filteredProducts.slice(0, ITEMS_PER_PAGE);
      }
      await renderProducts();

      // 隱藏載入中提示
      document.getElementById('loading-more').style.display = 'none';
    }

    // 載入所有商品（從 Supabase）
    async function fetchProducts() {
      const { data } = await mySupabase.from('products').select('*').order('created_at', { ascending: true }); // 假設有 created_at 欄位，若無可改用 'id'
      allProducts = data || [];
      
      // 預設顯示全部
      filteredProducts = [...allProducts];
      
      if (isMobile()) {
        // 手機版只顯示第一頁
        filteredProducts = filteredProducts.slice(0, ITEMS_PER_PAGE);
      }
      
      await renderProducts();
    }

    // 更新購物車 UI
    function updateCartUI() {
      const list = document.getElementById('cart-items');
      if (!list) return;
      const items = Cart.getItems();
      list.innerHTML = items.map((p, i) => `
        <li>${p.name} x ${p.quantity} - $${p.price * p.quantity} 
        <button onclick="Cart.removeItem(${i})" style="color:red; border:none; background:none;">刪除</button></li>
      `).join('');
      document.getElementById('total-price').innerText = Cart.getTotal();
    }

    // 送出訂單
    async function submitOrder() {
      const items = Cart.getItems();
      if (items.length === 0) return alert('購物車是空的');
      const orderData = {
        name: document.getElementById('cust-name').value,
        phone: document.getElementById('cust-phone').value,
        email: document.getElementById('cust-email').value,
        items: items,
        total: Cart.getTotal()
      };
      if (!orderData.name || !orderData.phone || !orderData.email) return alert('請填寫完整資訊');
      const res = await fetch('https://linebot-oh5o.onrender.com/order', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(orderData)
      });
      if (res.ok) {
        alert('✅ 訂單已送出！');
        localStorage.removeItem('myCart');
        await fetchProducts();
        updateCartUI();
      } else {
        alert('發送失敗');
      }
    }

    // 監聽手機板滾動事件
    window.addEventListener('scroll', () => {
      if (!isMobile()) return;
      
      const scrollY = window.scrollY;
      const windowHeight = window.innerHeight;
      const documentHeight = document.documentElement.scrollHeight;
      
      // 當距離底部小於 200px 時觸發載入更多
      if (scrollY + windowHeight > documentHeight - 200) {
        loadMoreMobile();
      }
    });

    // 監聽視窗大小變化，切換模式時重新渲染
    window.addEventListener('resize', () => {
      // 簡單延遲，避免頻繁重繪
      clearTimeout(window.resizeTimer);
      window.resizeTimer = setTimeout(() => {
        // 重新設定 filteredProducts 根據目前模式
        if (isMobile()) {
          // 切到手機板：只保留第一頁
          filteredProducts = allProducts.slice(0, ITEMS_PER_PAGE);
          currentPage = 1;
          hasMoreMobile = true;
        } else {
          // 切到電腦板：顯示完整 filteredProducts（但會由 renderProducts 自動分頁）
          filteredProducts = allProducts; // 假設目前是全部類別，若有篩選需額外處理
        }
        renderProducts();
      }, 300);
    });

    // 導覽列互動
    document.addEventListener('DOMContentLoaded', function () {
      var btn = document.getElementById('hamburger');
      var menu = document.getElementById('mobileMenu');
      btn.addEventListener('click', function () {
        btn.classList.toggle('open');
        menu.classList.toggle('open');
      });
      menu.querySelectorAll('.mobile-link').forEach(function (a) {
        a.addEventListener('click', function () {
          btn.classList.remove('open');
          menu.classList.remove('open');
        });
      });
      menu.querySelectorAll('.mobile-parent').forEach(function (parent) {
        parent.addEventListener('click', function () {
          var id = parent.getAttribute('data-target');
          var sub = document.getElementById(id);
          var caretId = 'caret-' + id.replace('sub-', '');
          var caret = document.getElementById(caretId);
          var opening = !sub.classList.contains('open');
          menu.querySelectorAll('.mobile-sub').forEach(function (s) { s.classList.remove('open'); });
          menu.querySelectorAll('.mobile-caret').forEach(function (c) { c.classList.remove('open'); });
          if (opening) {
            sub.classList.add('open');
            if (caret) caret.classList.add('open');
          }
        });
      });
      window.addEventListener('scroll', function () {
        document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 20);
      });
      lucide.createIcons();
    });

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      fetchProducts();
      updateCartUI();
    });
  </script>
</body>
</html>
