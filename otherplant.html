<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
 <title>蘭花，其他植物選品｜室內綠植｜蕨積 FernBrom</title>
<meta name="description" content="蘭花，多樣室內植物選品，為生活空間增添自然氣息與綠意層次。">

<link rel="canonical" href="https://www.fernbrom.com/otherplant.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
  <script src="cart.js"></script>
  <style>
    /* ========= 全域變數與重置 (完全保留原風格) ========= */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1a14;
      --moss: #3d5a38;
      --fern: #5a7a4a;
      --sage: #8aab7a;
      --mist: #d4e4c8;
      --cream: #f5f0e8;
      --stone: #9a9080;
      --paper: #faf7f2;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      overflow-x: hidden;
    }

    /* ========= 導覽列（與原版一致） ========= */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4vw; height: 72px;
      background: rgba(250,247,242,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(90,122,74,0.12);
    }
    nav.scrolled { box-shadow: 0 2px 24px rgba(61,90,56,0.10); }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .logo-mark { width: 38px; height: 38px; flex-shrink: 0; }
    .logo-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .logo-text {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--moss);
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }
    .logo-text span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--stone);
      margin-top: 2px;
    }

    .nav-links {
      display: flex; gap: 2rem; list-style: none; align-items: center; white-space: nowrap;
    }
    .nav-links li { position: relative; padding: 0 2px; }
    .nav-links a {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem; font-weight: 400; letter-spacing: 0.1em;
      color: var(--ink); text-decoration: none; padding-bottom: 3px;
      opacity: 0.75; display: inline-block;
    }
    .nav-links a:hover { opacity: 1; color: var(--fern); }
    .nav-contact {
      padding: 8px 20px !important;
      border: 1px solid var(--fern) !important;
      border-radius: 2px;
      color: var(--fern) !important;
      opacity: 1 !important;
      margin-left: 0.5rem;
    }
    .nav-contact:hover { background: var(--fern); color: white !important; }
    .has-dropdown > a::after { display: none; }

    .nav-links li .dropdown {
      display: none;
      position: absolute; top: calc(100% + 18px); left: 50%;
      transform: translateX(-50%);
      background: rgba(250,247,242,0.98); backdrop-filter: blur(16px);
      border: 1px solid rgba(90,122,74,0.14); border-top: 2px solid var(--fern);
      box-shadow: 0 12px 40px rgba(61,90,56,0.12);
      min-width: 148px; list-style: none; padding: 8px 0; z-index: 300;
    }
    .nav-links li:hover .dropdown,
    .nav-links li:focus-within .dropdown { display: block; }
    .nav-links li .dropdown::before {
      content: ''; position: absolute; top: -7px; left: 50%; transform: translateX(-50%);
      border-left: 6px solid transparent; border-right: 6px solid transparent;
      border-bottom: 6px solid var(--fern);
    }
    .dropdown li a {
      display: block; padding: 10px 20px; font-size: 0.78rem; font-weight: 400;
      letter-spacing: 0.08em; color: var(--ink); opacity: 0.7; white-space: nowrap;
      text-decoration: none;
    }
    .dropdown li a:hover {
      opacity: 1; color: var(--fern); padding-left: 26px;
      background: rgba(90,122,74,0.04);
    }
    .dropdown li + li { border-top: 1px solid rgba(90,122,74,0.08); }

    .hamburger {
      display: none; flex-direction: column; justify-content: center; gap: 6px;
      width: 40px; height: 40px; cursor: pointer; background: none; border: none;
      flex-shrink: 0;
    }
    .hamburger span {
      display: block; width: 24px; height: 1.5px; background: var(--moss);
      transition: transform 0.2s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    .mobile-menu {
      position: fixed; top: 72px; left: 0; right: 0; bottom: 0;
      background: #faf7f2; border-bottom: 1px solid rgba(90,122,74,0.15);
      padding: 0 6vw 40px; z-index: 99; overflow-y: auto;
      transform: translateX(100%); visibility: hidden; transition: transform 0.3s ease;
    }
    .mobile-menu.open { transform: translateX(0); visibility: visible; }
    .mobile-menu ul { list-style: none; }
    .mobile-menu > ul > li > a,
    .mobile-parent {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; font-family: 'Noto Serif TC', serif; font-weight: 600;
      font-size: 1rem; letter-spacing: 0.08em; color: var(--moss);
      text-decoration: none; border-bottom: 1px solid rgba(90,122,74,0.1);
      cursor: pointer;
    }
    .mobile-parent:hover, .mobile-menu > ul > li > a:hover { color: var(--fern); }
    .mobile-caret { display: inline-block; transition: transform 0.2s; }
    .mobile-caret.open { transform: rotate(180deg); }
    .mobile-sub {
      list-style: none; max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .mobile-sub.open { max-height: 200px; }
    .mobile-sub li a {
      display: block; padding: 11px 0 11px 16px; font-size: 0.85rem;
      color: var(--stone); text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.06); letter-spacing: 0.06em;
    }
    .mobile-sub li a:hover { color: var(--fern); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }

    /* ========= 購物車與商品卡片（保留原本樣式，稍作整合） ========= */
    :root { --primary: #2d5a27; } /* 相容 cart.js 變數 */
    h1 { text-align: center; color: var(--primary); }
    .filter-container { text-align: center; margin: 20px 0; }
    .filter-btn {
      background: white; border: 1px solid var(--primary); color: var(--primary);
      padding: 8px 16px; margin: 5px; cursor: pointer; border-radius: 20px;
      transition: 0.3s;
    }
    .filter-btn.active { background: var(--primary); color: white; }
    #product-list {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px; max-width: 1000px; margin: 0 auto;
    }
    .product-card {
      background: white; padding: 15px; border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center;
    }
    .btn-add {
      background: var(--primary); color: white; border: none; padding: 10px;
      width: 100%; border-radius: 8px; cursor: pointer;
    }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }
    #cart-section {
      max-width: 500px; margin: 50px auto; padding: 25px; border-radius: 15px;
      border: 1px solid #ddd;
    }
    .form-input {
      width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd;
      border-radius: 5px;
    }
    .pagination {
      display: flex; justify-content: center; gap: 12px; margin: 40px 0;
    }
    .pagination button {
      padding: 8px 20px; background: white; border: 1px solid var(--primary);
      color: var(--primary); border-radius: 30px; cursor: pointer; font-weight: 500;
      transition: 0.2s;
    }
    .pagination button:hover:not(:disabled) { background: var(--primary); color: white; }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-info { font-size: 0.9rem; color: var(--stone); align-self: center; }

    footer {
      border-top: 1px solid rgba(90,122,74,0.15);
      padding: 40px 4vw;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--paper);
      margin-top: 60px;
    }
    .footer-links { display: flex; gap: 24px; list-style: none; }
    .footer-links a {
      font-size: 0.75rem; color: var(--stone); text-decoration: none;
      letter-spacing: 0.08em; opacity: 0.7;
    }
    .footer-links a:hover { opacity: 1; color: var(--fern); }
    .footer-copy { font-size: 0.75rem; color: var(--stone); letter-spacing: 0.1em; }

    .loading-more { text-align: center; color: var(--stone); padding: 20px; font-size: 0.9rem; }

    /* 微調標題區域 */
    .content { padding-top: 72px; }
  </style>
  
  <!-- 新增：手機版專用樣式 -->
  <style>
    /* 確保手機版漢堡選單顯示 */
    @media (max-width: 768px) {
      .hamburger {
        display: flex !important;
      }
      .nav-links {
        display: none !important;
      }
    }
    
    /* 手機版商品列表改為 2 欄 */
    @media (max-width: 640px) {
      #product-list {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 12px !important;
        padding: 0 12px !important;
      }
      
      .product-card {
        padding: 10px !important;
      }
      
      .product-card img {
        height: 140px !important;
        object-fit: cover !important;
        border-radius: 8px !important;
      }
      
      .product-card h3 {
        font-size: 0.85rem !important;
        margin: 8px 0 4px !important;
      }
      
      .product-card p {
        font-size: 0.75rem !important;
        margin: 4px 0 !important;
      }
      
      .btn-add {
        padding: 8px !important;
        font-size: 0.75rem !important;
        border-radius: 20px !important;
      }
      
      /* 篩選按鈕改為可滾動並置中 */
      .filter-container {
        overflow-x: auto !important;
        white-space: nowrap !important;
        -webkit-overflow-scrolling: touch !important;
        padding: 0 12px 12px !important;
        margin: 15px 0 !important;
        text-align: center !important;
      }
      
      .filter-btn {
        display: inline-block !important;
        padding: 6px 16px !important;
        margin: 0 4px !important;
        font-size: 0.8rem !important;
      }
      
      /* 手機版 footer 垂直排列 */
      footer {
        flex-direction: column !important;
        text-align: center !important;
        padding: 30px 20px !important;
        gap: 16px !important;
      }
      
      .footer-links {
        justify-content: center !important;
        flex-wrap: wrap !important;
        gap: 16px !important;
      }
      
      /* 標題區手機版調整 */
      .content > div:first-child {
        padding: 40px 16px 20px !important;
      }
      
      .content > div:first-child h1 {
        font-size: 1.8rem !important;
      }
      
      .content > div:first-child p {
        font-size: 0.85rem !important;
        padding: 0 12px !important;
      }
      
      /* 購物車手機版 */
      #cart-section {
        margin: 30px 16px !important;
        padding: 20px !important;
      }
      
      #cart-section h3 {
        font-size: 1.2rem !important;
      }
      
      .form-input {
        padding: 10px 12px !important;
        font-size: 0.85rem !important;
      }
    }
    
    /* 超小手機改為 1 欄 */
    @media (max-width: 480px) {
      #product-list {
        grid-template-columns: 1fr !important;
      }
      
      .product-card img {
        height: 180px !important;
      }
    }
  </style>
</head>
<body>
  <!-- 導覽列佔位 (nav.html 將載入) -->
  <div id="nav-placeholder"></div>

  <main class="content">
    <!-- 標題改為其他植物 -->
    <div style="text-align: center; padding:60px 20px 20px; color: var(--stone);">
      <h1 style="font-family: 'Noto Serif TC', serif; color: var(--moss); font-size: 2.2rem;">其他植物 · 選集</h1>
      <p style="max-width:600px; margin:20px auto; line-height:1.8; color: var(--fern);">
        不屬於前兩類的獨特植物們，每一株都有自己的個性與故事。
      </p>
    </div>

    <!-- active 移到「其他植物」按鈕，並加入 emoji -->
    <div class="filter-container">
      <button class="filter-btn" onclick="filterProducts('全部', this)">全部</button>
      <button class="filter-btn" onclick="filterProducts('鹿角蕨', this)">蕨類</button>
      <button class="filter-btn" onclick="filterProducts('積水鳳梨', this)">積水鳳梨</button>
     
    </div>

    <!-- 商品列表容器 -->
    <div id="product-list"></div>

    <!-- 分頁控制（電腦版） -->
    <div class="pagination" id="pagination-controls">
      <button id="prev-page" onclick="changePage(currentPage - 1)">◀ 上一頁</button>
      <span class="page-info" id="page-info">第 1 頁</span>
      <button id="next-page" onclick="changePage(currentPage + 1)">下一頁 ▶</button>
    </div>

    <!-- 手機載入提示 -->
    <div class="loading-more" id="loading-more" style="display: none;">載入更多其他植物…</div>

    <!-- 購物車區塊 (與原版相同) -->
   
  </main>

  <footer>
    <ul class="footer-links">
      <li><a href="shop.html">植物選品</a></li>
      <li><a href="consult.html">綠色服務</a></li>
      <li><a href="fbnote.html">蕨望筆記</a></li>
      <li><a href="about.html">關於蕨積</a></li>
    </ul>
    <p class="footer-copy">© 2026 蕨積 FernBrom . All rights reserved.</p>
  </footer>

  <script>
    // ========= Supabase 初始化 (與原版相同) =========
    const mySupabase = supabase.createClient(
      'https://wrreydnppkhhssbnmnno.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndycmV5ZG5wcGtoaHNzYm5tbm5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjI0MjYsImV4cCI6MjA4ODc5ODQyNn0.7520TxecGoqhjkIcY497sCt4oG7eqDtShK1OQJe3N7o',
      { auth: { persistSession: false, detectSessionInUrl: false } }
    );

    // 全域變數
    let allProducts = [];
    let filteredProducts = [];
    let currentPage = 1;
    let isLoadingMore = false;
    let hasMoreMobile = true;
    const ITEMS_PER_PAGE = 8;

    // 手機判斷
    function isMobile() {
      return window.innerWidth <= 768;
    }

    // 取得完整篩選列表
    function getFullFilteredList() {
      const activeBtn = document.querySelector('.filter-btn.active');
      if (!activeBtn) return allProducts;
      const category = activeBtn.innerText.trim().replace(/[🌿🪴💧🌱]/g, '').trim();
      if (category === '全部') return allProducts;
      return allProducts.filter(p => p.category === category);
    }

    // 渲染商品
    async function renderProducts() {
      const list = document.getElementById('product-list');
      const cartItems = Cart.getItems();

      let productsToRender = filteredProducts;

      if (!isMobile()) {
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const end = start + ITEMS_PER_PAGE;
        productsToRender = filteredProducts.slice(start, end);
      }

      if (productsToRender.length === 0) {
        list.innerHTML = "<p style='text-align:center; padding:40px;'>🌱 此分類暫無商品，或庫存補貨中。</p>";
      } else {
        list.innerHTML = productsToRender.map(p => {
          const cartItem = cartItems.find(item => item.id === p.id);
          const cartQty = cartItem ? cartItem.quantity : 0;
          const disabled = cartQty >= p.quantity || p.quantity <= 0;
          let buttonText = '加入購物車';
          if (p.quantity <= 0) buttonText = '庫存不足';
          else if (cartQty >= p.quantity) buttonText = '已達上限';

          return `
            <div class="product-card">
              <img src="${p.image_url}" style="width:100%; height:180px; object-fit:cover; border-radius:8px;">
              <h3>${p.name}</h3>
              <p>庫存: ${p.quantity} | $${p.price}</p>
              <button class="btn-add" 
                      onclick="Cart.addItem('${p.id}', '${p.name}', ${p.price}, ${p.quantity})"
                      ${disabled ? 'disabled' : ''}>
                ${buttonText}
              </button>
            </div>
          `;
        }).join('');
      }

      if (!isMobile()) updatePaginationUI();
    }

    function updatePaginationUI() {
      const prevBtn = document.getElementById('prev-page');
      const nextBtn = document.getElementById('next-page');
      const pageInfo = document.getElementById('page-info');
      const totalPages = Math.ceil(filteredProducts.length / ITEMS_PER_PAGE) || 1;
      pageInfo.innerText = `第 ${currentPage} 頁 / 共 ${totalPages} 頁`;
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
    }

    function changePage(newPage) {
      if (isMobile()) return;
      const totalPages = Math.ceil(filteredProducts.length / ITEMS_PER_PAGE) || 1;
      if (newPage < 1 || newPage > totalPages) return;
      currentPage = newPage;
      renderProducts();
    }

    // 手機無限載入
    async function loadMoreMobile() {
      if (!isMobile() || isLoadingMore || !hasMoreMobile) return;

      const nextStart = filteredProducts.length;
      const fullFilteredList = getFullFilteredList(); 
      if (nextStart >= fullFilteredList.length) {
        hasMoreMobile = false;
        document.getElementById('loading-more').style.display = 'none';
        isLoadingMore = false;
        return;
      }

      isLoadingMore = true;
      document.getElementById('loading-more').style.display = 'block';

      const nextBatch = fullFilteredList.slice(nextStart, nextStart + ITEMS_PER_PAGE);
      filteredProducts = [...filteredProducts, ...nextBatch];

      await renderProducts();
      isLoadingMore = false;
      if (filteredProducts.length >= fullFilteredList.length) {
        hasMoreMobile = false;
        document.getElementById('loading-more').style.display = 'none';
      }
    }

    // 篩選函數
    async function filterProducts(category, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      let fullList = [];
      if (category === '全部') fullList = allProducts;
      else fullList = allProducts.filter(p => p.category === category);

      if (isMobile()) {
        filteredProducts = fullList.slice(0, ITEMS_PER_PAGE);
      } else {
        filteredProducts = fullList;
      }

      currentPage = 1;
      hasMoreMobile = true;
      document.getElementById('loading-more').style.display = 'none';
      await renderProducts();
    }

    // 從 Supabase 載入所有商品
    async function fetchProducts() {
      const { data } = await mySupabase.from('products').select('*').order('created_at', { ascending: true });
      allProducts = data || [];

      // 預設顯示「其他植物」
      const defaultCategory = '其他植物';
      const fullDefault = allProducts.filter(p => p.category === defaultCategory);
      
      if (isMobile()) {
        filteredProducts = fullDefault.slice(0, ITEMS_PER_PAGE);
      } else {
        filteredProducts = fullDefault;
      }

      await renderProducts();
    }

    // 購物車 UI 更新
    function updateCartUI() {
      const list = document.getElementById('cart-items');
      if (!list) return;
      const items = Cart.getItems();
      list.innerHTML = items.map((p, i) => `
        <li>${p.name} x ${p.quantity} - $${p.price * p.quantity} 
        <button onclick="Cart.removeItem(${i})" style="color:red; border:none; background:none;">刪除</button></li>
      `).join('');
      document.getElementById('total-price').innerText = Cart.getTotal();
    }

    // 送出訂單
    async function submitOrder() {
      const items = Cart.getItems();
      if (items.length === 0) return alert('購物車是空的');
      const orderData = {
        name: document.getElementById('cust-name').value,
        phone: document.getElementById('cust-phone').value,
        email: document.getElementById('cust-email').value,
        items: items,
        total: Cart.getTotal()
      };
      if (!orderData.name || !orderData.phone || !orderData.email) return alert('請填寫完整資訊');
      const res = await fetch('https://linebot-oh5o.onrender.com/order', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(orderData)
      });
      if (res.ok) {
        alert('✅ 謝謝您 ! 訂單已送出！我會盡快與您聯絡 !');
        localStorage.removeItem('myCart');
        await fetchProducts();
        updateCartUI();
      } else {
        alert('發送失敗');
      }
    }

    // ========= 導覽列載入與初始化 =========
    function initNav() {
      var btn = document.getElementById('hamburger');
      var menu = document.getElementById('mobileMenu');
      if (btn && menu) {
        btn.addEventListener('click', function () {
          btn.classList.toggle('open');
          menu.classList.toggle('open');
        });
        menu.querySelectorAll('.mobile-link').forEach(function (a) {
          a.addEventListener('click', function () {
            btn.classList.remove('open');
            menu.classList.remove('open');
          });
        });
      }
      if (menu) {
        menu.querySelectorAll('.mobile-parent').forEach(function (parent) {
          parent.addEventListener('click', function () {
            var id = parent.getAttribute('data-target');
            var sub = document.getElementById(id);
            var caretId = 'caret-' + id.replace('sub-', '');
            var caret = document.getElementById(caretId);
            var opening = !sub.classList.contains('open');
            menu.querySelectorAll('.mobile-sub').forEach(function (s) { s.classList.remove('open'); });
            menu.querySelectorAll('.mobile-caret').forEach(function (c) { c.classList.remove('open'); });
            if (opening) {
              sub.classList.add('open');
              if (caret) caret.classList.add('open');
            }
          });
        });
      }
      window.addEventListener('scroll', function () {
        var nav = document.getElementById('mainNav');
        if (nav) nav.classList.toggle('scrolled', window.scrollY > 20);
      });
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    // ========= 主要啟動流程 =========
    document.addEventListener('DOMContentLoaded', async function () {
      // 載入導覽列
      try {
        const response = await fetch('nav.html');
        const data = await response.text();
        document.getElementById('nav-placeholder').innerHTML = data;
        initNav();
      } catch (err) {
        console.warn('無法載入導覽列，略過');
      }

      // 載入商品 (預設顯示其他植物)
      await fetchProducts();
      updateCartUI();

      // 監聽購物車更新
      document.addEventListener('cartUpdated', function() {
        updateCartUI();
        renderProducts();
      });

      // 手機無限滾動
      if (isMobile()) {
        window.addEventListener('scroll', function() {
          if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            loadMoreMobile();
          }
        });
      }

      const reveals = document.querySelectorAll('.reveal');
      const observer = new IntersectionObserver(function (entries) {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
        });
      }, { threshold: 0.15 });
      reveals.forEach(el => observer.observe(el));

      if (typeof lucide !== 'undefined') lucide.createIcons();
    });

    // 將函式暴露給全域
    window.filterProducts = filterProducts;
    window.changePage = changePage;
    window.submitOrder = submitOrder;
  </script>
</body>
</html>
