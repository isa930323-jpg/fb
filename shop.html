<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蕨積 - 植物選品</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
  <script src="cart.js"></script>
  <style>
    /* ========= 全域變數與重置 ========= */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1a1a14;
      --moss: #3d5a38;
      --fern: #5a7a4a;
      --sage: #8aab7a;
      --mist: #d4e4c8;
      --cream: #f5f0e8;
      --stone: #9a9080;
      --paper: #faf7f2;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      overflow-x: hidden;
    }

    /* ========= 導覽列（與專區頁風格一致） ========= */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4vw; height: 72px;
      background: rgba(250,247,242,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(90,122,74,0.12);
    }
    nav.scrolled { box-shadow: 0 2px 24px rgba(61,90,56,0.10); }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .logo-mark { width: 38px; height: 38px; flex-shrink: 0; }
    .logo-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .logo-text {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--moss);
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }
    .logo-text span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--stone);
      margin-top: 2px;
    }

    .nav-links {
      display: flex; gap: 2rem; list-style: none; align-items: center; white-space: nowrap;
    }
    .nav-links li { position: relative; padding: 0 2px; }
    .nav-links a {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem; font-weight: 400; letter-spacing: 0.1em;
      color: var(--ink); text-decoration: none; padding-bottom: 3px;
      opacity: 0.75; display: inline-block;
    }
    .nav-links a:hover { opacity: 1; color: var(--fern); }
    .nav-contact {
      padding: 8px 20px !important;
      border: 1px solid var(--fern) !important;
      border-radius: 2px;
      color: var(--fern) !important;
      opacity: 1 !important;
      margin-left: 0.5rem;
    }
    .nav-contact:hover { background: var(--fern); color: white !important; }

    /* 下拉選單樣式（與專區頁一致） */
    .has-dropdown > a::after { display: none; }
    .nav-links li .dropdown {
      display: none;
      position: absolute; top: calc(100% + 18px); left: 50%;
      transform: translateX(-50%);
      background: rgba(250,247,242,0.98); backdrop-filter: blur(16px);
      border: 1px solid rgba(90,122,74,0.14); border-top: 2px solid var(--fern);
      box-shadow: 0 12px 40px rgba(61,90,56,0.12);
      min-width: 148px; list-style: none; padding: 8px 0; z-index: 300;
    }
    .nav-links li:hover .dropdown,
    .nav-links li:focus-within .dropdown { display: block; }
    .nav-links li .dropdown::before {
      content: ''; position: absolute; top: -7px; left: 50%; transform: translateX(-50%);
      border-left: 6px solid transparent; border-right: 6px solid transparent;
      border-bottom: 6px solid var(--fern);
    }
    .dropdown li a {
      display: block; padding: 10px 20px; font-size: 0.78rem; font-weight: 400;
      letter-spacing: 0.08em; color: var(--ink); opacity: 0.7; white-space: nowrap;
      text-decoration: none;
    }
    .dropdown li a:hover {
      opacity: 1; color: var(--fern); padding-left: 26px;
      background: rgba(90,122,74,0.04);
    }
    .dropdown li + li { border-top: 1px solid rgba(90,122,74,0.08); }

    /* 漢堡選單 */
    .hamburger {
      display: none; flex-direction: column; justify-content: center; gap: 6px;
      width: 40px; height: 40px; cursor: pointer; background: none; border: none;
      flex-shrink: 0;
    }
    .hamburger span {
      display: block; width: 24px; height: 1.5px; background: var(--moss);
      transition: transform 0.2s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    .mobile-menu {
      position: fixed; top: 72px; left: 0; right: 0; bottom: 0;
      background: #faf7f2; border-bottom: 1px solid rgba(90,122,74,0.15);
      padding: 0 6vw 40px; z-index: 99; overflow-y: auto;
      transform: translateX(100%); visibility: hidden; transition: transform 0.3s ease;
    }
    .mobile-menu.open { transform: translateX(0); visibility: visible; }
    .mobile-menu ul { list-style: none; }
    .mobile-menu > ul > li > a,
    .mobile-parent {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; font-family: 'Noto Serif TC', serif; font-weight: 600;
      font-size: 1rem; letter-spacing: 0.08em; color: var(--moss);
      text-decoration: none; border-bottom: 1px solid rgba(90,122,74,0.1);
      cursor: pointer;
    }
    .mobile-parent:hover, .mobile-menu > ul > li > a:hover { color: var(--fern); }
    .mobile-caret { display: inline-block; transition: transform 0.2s; }
    .mobile-caret.open { transform: rotate(180deg); }
    .mobile-sub {
      list-style: none; max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .mobile-sub.open { max-height: 200px; }
    .mobile-sub li a {
      display: block; padding: 11px 0 11px 16px; font-size: 0.85rem;
      color: var(--stone); text-decoration: none;
      border-bottom: 1px solid rgba(90,122,74,0.06); letter-spacing: 0.06em;
    }
    .mobile-sub li a:hover { color: var(--fern); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }

    /* ========= 主要內容區（美化重點） ========= */
    .content {
      padding-top: 72px;
    }

    /* 頁首區塊 - 靈感來自專區頁 */
    .page-header {
      text-align: center;
      padding: 60px 20px 20px;
      color: var(--stone);
    }

    .page-header h1 {
      font-family: 'Noto Serif TC', serif;
      color: var(--moss);
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }

    .page-header h2 {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--fern);
      line-height: 1.6;
      max-width: 800px;
      margin: 0 auto 20px;
    }

    .page-header .subhead {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      letter-spacing: 0.15em;
      color: var(--stone);
      margin-top: 10px;
    }

    .story-text {
      text-align: center;
      line-height: 1.8;
      max-width: 700px;
      margin: 0 auto 40px;
      padding: 0 20px;
      color: var(--stone);
      font-size: 1rem;
    }

    .story-text p {
      margin-bottom: 1em;
    }

    /* 篩選按鈕 - 與專區頁完全一致 */
    .filter-container {
      text-align: center;
      margin: 30px 0 40px;
    }

    .filter-btn {
      background: white;
      border: 1px solid var(--primary, #2d5a27);
      color: var(--primary, #2d5a27);
      padding: 8px 20px;
      margin: 0 6px;
      cursor: pointer;
      border-radius: 30px;
      transition: 0.3s;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    .filter-btn.active {
      background: var(--primary, #2d5a27);
      color: white;
    }

    /* 商品列表 - 與專區頁一致 */
    #product-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 25px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .product-card {
      background: white;
      padding: 18px 15px 20px;
      border-radius: 16px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.05);
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(61,90,56,0.12);
    }

    .product-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .product-card h3 {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--moss);
      margin: 10px 0 6px;
    }

    .product-card p {
      color: var(--stone);
      font-size: 0.9rem;
      margin-bottom: 15px;
    }

    .btn-add {
      background: var(--primary, #2d5a27);
      color: white;
      border: none;
      padding: 10px 0;
      width: 100%;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }

    .btn-add:hover:not(:disabled) {
      background: var(--moss);
    }

    .btn-add:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 分頁 */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 50px 0;
    }

    .pagination button {
      padding: 8px 28px;
      background: white;
      border: 1px solid var(--primary, #2d5a27);
      color: var(--primary, #2d5a27);
      border-radius: 30px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
      font-size: 0.9rem;
    }

    .pagination button:hover:not(:disabled) {
      background: var(--primary, #2d5a27);
      color: white;
    }

    .pagination button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-info {
      font-size: 0.9rem;
      color: var(--stone);
      align-self: center;
    }

    /* 購物車區塊 */
    #cart-section {
      max-width: 500px;
      margin: 60px auto;
      padding: 30px 25px;
      border-radius: 20px;
      border: 1px solid rgba(90,122,74,0.2);
      background: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02);
    }

    #cart-section h3 {
      font-family: 'Noto Serif TC', serif;
      color: var(--moss);
      font-size: 1.4rem;
      margin-bottom: 20px;
    }

    #cart-items {
      list-style: none;
      margin: 20px 0;
    }

    #cart-items li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px dashed rgba(90,122,74,0.2);
      font-size: 0.95rem;
    }

    #total-price {
      font-weight: 600;
      color: var(--fern);
      font-size: 1.2rem;
    }

    .form-input {
      width: 100%;
      padding: 12px 15px;
      margin: 8px 0;
      border: 1px solid rgba(90,122,74,0.2);
      border-radius: 40px;
      font-size: 0.95rem;
      background: var(--cream);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--fern);
    }

    /* 載入提示 */
    .loading-more {
      text-align: center;
      color: var(--stone);
      padding: 30px;
      font-size: 0.95rem;
    }

    /* 頁尾 */
    footer {
      border-top: 1px solid rgba(90,122,74,0.15);
      padding: 40px 6vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      margin-top: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .footer-links {
      display: flex;
      gap: 28px;
      list-style: none;
      flex-wrap: wrap;
    }

    .footer-links a {
      font-size: 0.8rem;
      color: var(--stone);
      text-decoration: none;
      letter-spacing: 0.08em;
      opacity: 0.7;
    }

    .footer-links a:hover {
      opacity: 1;
      color: var(--fern);
    }

    .footer-copy {
      font-size: 0.75rem;
      color: var(--stone);
      letter-spacing: 0.1em;
    }

    /* 響應式微調 */
    @media (max-width: 600px) {
      .page-header h1 { font-size: 2rem; }
      .page-header h2 { font-size: 1.4rem; }
      .filter-container { display: flex; flex-wrap: wrap; justify-content: center; }
      .filter-btn { margin: 5px; }
      footer { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>
  <!-- 導覽列佔位元素 -->
  <div id="nav-placeholder"></div>

  <!-- 主要內容區 -->
  <main class="content">
    <!-- 頁首區塊：完全比照專區頁的優雅風格 -->
   <div style="text-align: center; padding: 40px; color: var(--stone);">
      <h1 style="font-family: 'Noto Serif TC', serif; color: var(--moss);">植物選品</h1>
     <p>
     <h2 style="font-family: 'Noto Serif TC', serif; color: var(--moss);">這些植物，不是被挑選，是被留下來的。</h2>
      <div class="subhead">—— 屋頂栽培 · 自然共生 ——</div>
    </div>


    <!-- 篩選按鈕 -->
    <div class="filter-container">
      <button class="filter-btn active" onclick="filterProducts('全部', this)">全部</button>
      <button class="filter-btn" onclick="filterProducts('鹿角蕨', this)">蕨類</button>
      <button class="filter-btn" onclick="filterProducts('積水鳳梨', this)">積水鳳梨</button>
      <button class="filter-btn" onclick="filterProducts('其他植物', this)">其他植物</button>
    </div>

    <!-- 商品列表 -->
    <div id="product-list"></div>

    <!-- 分頁控制 -->
    <div class="pagination" id="pagination-controls">
      <button id="prev-page" onclick="changePage(currentPage - 1)">◀ 上一頁</button>
      <span class="page-info" id="page-info">第 1 頁</span>
      <button id="next-page" onclick="changePage(currentPage + 1)">下一頁 ▶</button>
    </div>

    <!-- 手機載入提示 -->
    <div class="loading-more" id="loading-more" style="display: none;">載入更多商品中…</div>

    <!-- 購物車區塊 -->
    <div id="cart-section">
      <h3>🛒 購物清單</h3>
      <ul id="cart-items"></ul>
      <p>總金額：$ <span id="total-price">0</span></p>
      <input type="text" id="cust-name" class="form-input" placeholder="姓名">
      <input type="text" id="cust-phone" class="form-input" placeholder="電話">
      <input type="email" id="cust-email" class="form-input" placeholder="Email">
      <button class="btn-add" onclick="submitOrder()">送出訂單</button>
    </div>
  </main>

  <!-- 頁尾 -->
  <footer>
    <ul class="footer-links">
      <li><a href="shop.html">植物選品</a></li>
      <li><a href="consult.html">綠色顧問</a></li>
      <li><a href="fbnote.html">蕨望筆記</a></li>
      <li><a href="about.html">關於蕨積</a></li>
    </ul>
    <p class="footer-copy">© 2026 蕨積 FernBrom . All rights reserved.</p>
  </footer>

  <script>
    // Supabase 初始化
    const mySupabase = supabase.createClient(
      'https://wrreydnppkhhssbnmnno.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndycmV5ZG5wcGtoaHNzYm5tbm5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjI0MjYsImV4cCI6MjA4ODc5ODQyNn0.7520TxecGoqhjkIcY497sCt4oG7eqDtShK1OQJe3N7o',
      { auth: { persistSession: false, detectSessionInUrl: false } }
    );

    // 全域變數
    let allProducts = [];
    let filteredProducts = [];
    let currentPage = 1;
    let isLoadingMore = false;
    let hasMoreMobile = true;
    const ITEMS_PER_PAGE = 8;

    function isMobile() {
      return window.innerWidth <= 768;
    }

    async function renderProducts() {
      const list = document.getElementById('product-list');
      const cartItems = Cart.getItems();

      let productsToRender = filteredProducts;

      if (!isMobile()) {
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const end = start + ITEMS_PER_PAGE;
        productsToRender = filteredProducts.slice(start, end);
      }

      if (productsToRender.length === 0) {
        list.innerHTML = "<p style='text-align:center; padding:40px; color: var(--stone);'>🌱 此分類暫無商品</p>";
      } else {
        list.innerHTML = productsToRender.map(p => {
          const cartItem = cartItems.find(item => item.id === p.id);
          const cartQty = cartItem ? cartItem.quantity : 0;
          const disabled = cartQty >= p.quantity || p.quantity <= 0;
          let buttonText = '加入購物車';
          if (p.quantity <= 0) buttonText = '庫存不足';
          else if (cartQty >= p.quantity) buttonText = '已達上限';

          return `
            <div class="product-card">
              <img src="${p.image_url}" alt="${p.name}">
              <h3>${p.name}</h3>
              <p>庫存: ${p.quantity} | $${p.price}</p>
              <button class="btn-add" 
                      onclick="Cart.addItem('${p.id}', '${p.name}', ${p.price}, ${p.quantity})"
                      ${disabled ? 'disabled' : ''}>
                ${buttonText}
              </button>
            </div>
          `;
        }).join('');
      }

      if (!isMobile()) updatePaginationUI();
    }

    function updatePaginationUI() {
      const prevBtn = document.getElementById('prev-page');
      const nextBtn = document.getElementById('next-page');
      const pageInfo = document.getElementById('page-info');
      const totalPages = Math.ceil(filteredProducts.length / ITEMS_PER_PAGE) || 1;
      pageInfo.innerText = `第 ${currentPage} 頁 / 共 ${totalPages} 頁`;
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
    }

    function changePage(newPage) {
      if (isMobile()) return;
      const totalPages = Math.ceil(filteredProducts.length / ITEMS_PER_PAGE) || 1;
      if (newPage < 1 || newPage > totalPages) return;
      currentPage = newPage;
      renderProducts();
    }

    async function loadMoreMobile() {
      if (!isMobile() || isLoadingMore || !hasMoreMobile) return;

      const nextStart = filteredProducts.length;
      if (nextStart >= allProducts.length) {
        hasMoreMobile = false;
        document.getElementById('loading-more').style.display = 'none';
        return;
      }

      isLoadingMore = true;
      document.getElementById('loading-more').style.display = 'block';

      const nextBatch = allProducts.slice(nextStart, nextStart + ITEMS_PER_PAGE);
      filteredProducts = [...filteredProducts, ...nextBatch];
      
      await renderProducts();

      isLoadingMore = false;
      if (filteredProducts.length >= allProducts.length) {
        hasMoreMobile = false;
        document.getElementById('loading-more').style.display = 'none';
      }
    }

    async function filterProducts(category, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      if (category === '全部') {
        filteredProducts = [...allProducts];
      } else {
        filteredProducts = allProducts.filter(p => p.category === category);
      }

      currentPage = 1;
      hasMoreMobile = true;
      
      if (isMobile()) {
        filteredProducts = filteredProducts.slice(0, ITEMS_PER_PAGE);
      }
      await renderProducts();
      document.getElementById('loading-more').style.display = 'none';
    }

    async function fetchProducts() {
      const { data } = await mySupabase.from('products').select('*').order('created_at', { ascending: true });
      allProducts = data || [];
      filteredProducts = [...allProducts];
      
      if (isMobile()) {
        filteredProducts = filteredProducts.slice(0, ITEMS_PER_PAGE);
      }
      
      await renderProducts();
    }

    function updateCartUI() {
      const list = document.getElementById('cart-items');
      if (!list) return;
      const items = Cart.getItems();
      list.innerHTML = items.map((p, i) => `
        <li>
          <span>${p.name} x ${p.quantity}</span>
          <span>$${p.price * p.quantity} 
            <button onclick="Cart.removeItem(${i})" style="color:#b85c5c; border:none; background:none; margin-left:10px; cursor:pointer;">✕</button>
          </span>
        </li>
      `).join('');
      document.getElementById('total-price').innerText = Cart.getTotal();
    }

    async function submitOrder() {
      const items = Cart.getItems();
      if (items.length === 0) return alert('購物車是空的');
      const orderData = {
        name: document.getElementById('cust-name').value,
        phone: document.getElementById('cust-phone').value,
        email: document.getElementById('cust-email').value,
        items: items,
        total: Cart.getTotal()
      };
      if (!orderData.name || !orderData.phone || !orderData.email) return alert('請填寫完整資訊');
      const res = await fetch('https://linebot-oh5o.onrender.com/order', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(orderData)
      });
      if (res.ok) {
        alert('✅ 訂單已送出！');
        localStorage.removeItem('myCart');
        await fetchProducts();
        updateCartUI();
      } else {
        alert('發送失敗');
      }
    }

    function initNav() {
      const btn = document.getElementById('hamburger');
      const menu = document.getElementById('mobileMenu');
      if (btn && menu) {
        btn.addEventListener('click', function () {
          btn.classList.toggle('open');
          menu.classList.toggle('open');
        });
        menu.querySelectorAll('.mobile-link').forEach(a => {
          a.addEventListener('click', () => {
            btn.classList.remove('open');
            menu.classList.remove('open');
          });
        });
      }
      
      if (menu) {
        menu.querySelectorAll('.mobile-parent').forEach(parent => {
          parent.addEventListener('click', function () {
            const id = parent.getAttribute('data-target');
            const sub = document.getElementById(id);
            const caretId = 'caret-' + id.replace('sub-', '');
            const caret = document.getElementById(caretId);
            const opening = !sub.classList.contains('open');
            
            menu.querySelectorAll('.mobile-sub').forEach(s => s.classList.remove('open'));
            menu.querySelectorAll('.mobile-caret').forEach(c => c.classList.remove('open'));
            
            if (opening) {
              sub.classList.add('open');
              if (caret) caret.classList.add('open');
            }
          });
        });
      }

      window.addEventListener('scroll', () => {
        const nav = document.getElementById('mainNav');
        if (nav) nav.classList.toggle('scrolled', window.scrollY > 20);
      });
      
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    // 頁面載入
    document.addEventListener('DOMContentLoaded', async function () {
      // 載入導覽列
      try {
        const response = await fetch('nav.html');
        const data = await response.text();
        document.getElementById('nav-placeholder').innerHTML = data;
        initNav();
      } catch (err) {
        console.warn('無法載入導覽列');
      }

      // 初始化購物車
      try {
        await fetchProducts();
        updateCartUI();
        
        document.addEventListener('cartUpdated', function() {
          updateCartUI();
          renderProducts();
        });

        if (isMobile()) {
          window.addEventListener('scroll', function() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
              loadMoreMobile();
            }
          });
        }
      } catch (error) {
        console.error('初始化失敗：', error);
      }

      if (typeof lucide !== 'undefined') lucide.createIcons();
    });

    // 暴露全域函數
    window.filterProducts = filterProducts;
    window.changePage = changePage;
    window.submitOrder = submitOrder;
  </script>
</body>
</html>
